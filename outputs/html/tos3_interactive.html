tes": "title/text information is insufficient for interpretation", "abstract": "", "author": "", "author_full_names": "", "country": "", "source_title": "JOURNAL OF INVESTIGATIVE SURGERY : THE OFFICIAL JOURNAL OF THE ACADEMY OF SURGICAL RESEARCH"}, {"id": "ARLI D, 2018, IND MARKET MANAG", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - peripheral", "branch_member_role": "peripheral", "title": "RELATIONAL SELLING: PAST, PRESENT AND FUTURE", "year": 2018, "journal": "INDUSTRIAL MARKETING MANAGEMENT", "doi": "10.1016/J.INDMARMAN.2017.07.018", "branch_core_score": 0.3879709397955901, "semantic_similarity_to_branch": 0.359507159397303, "trunk_connection_score": 0.0386244816059204, "notes": "related to branch but weaker as a defining paper", "abstract": "", "author": "", "author_full_names": "DENNI ARLI; CARLOS BAUER; ROBERT W. PALMATIER", "country": "", "source_title": "IND MARKET MANAG"}, {"id": "REZAEI R, 2017, J AGR SCI TECH-IRAN", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - missing_metadata", "branch_member_role": "missing_metadata", "title": "REZAEI R, 2017, J AGR SCI TECH-IRAN", "year": 2017, "journal": "", "doi": "", "branch_core_score": 0.0, "semantic_similarity_to_branch": 0.0, "trunk_connection_score": 0.0, "notes": "title/text information is insufficient for interpretation", "abstract": "", "author": "", "author_full_names": "", "country": "", "source_title": "J AGR SCI TECH-IRAN"}, {"id": "KHASMAFKAN-NEZAM MH, 2025, VINE J INF KNOWL MAN", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_2", "subgroup_label": "branch_2 - core", "branch_member_role": "core", "title": "DOES ETHICAL CLIMATE OF THE ORGANIZATION FOSTER ENTREPRENEURIAL MARKETING? THE ROLE OF WORK ENGAGEMENT AND EFFECTIVE KNOWLEDGE TRANSFER", "year": 2025, "journal": "VINE JOURNAL OF INFORMATION AND KNOWLEDGE MANAGEMENT SYSTEMS", "doi": "10.1108/VJIKMS-02-2023-0029", "branch_core_score": 0.8984782421709641, "semantic_similarity_to_branch": 0.4050992004229428, "trunk_connection_score": 0.9977642971650876, "notes": "direct topical signal and strong branch fit", "abstract": "PURPOSETHIS STUDY AIMS TO EXPLORE HOW AN ORGANIZATION'S ETHICAL CLIMATE DETERMINES THE TYPE AND EFFECTIVENESS OF ENTREPRENEURIAL MARKETING ACTIVITIES. ALSO, THIS STUDY SEEKS TO IDENTIFY THE MOST CRITICAL INTRA-ORGANIZATIONAL CAPABILITIES RELATED TO ENTREPRENEURIAL MARKETING COMPONENTS AND EXPLAIN THEIR ROLE IN THE PATH OF ETHICAL CLIMATE TO ENTREPRENEURIAL MARKETING, WHICH MEANS MOVING FROM THE INTRA- TO THE EXTRA-ORGANIZATIONAL ENVIRONMENT.DESIGN/METHODOLOGY/APPROACHDATA WERE COLLECTED FROM MANAGERS WORKING IN 100 SCIENTIFIC AND RESEARCH COMPANIES IN IRAN THROUGH SURVEY QUESTIONNAIRES. LATENT VARIABLE STRUCTURAL EQUATION MODELING WAS USED TO TEST THE HYPOTHESIZED RELATIONSHIPS.FINDINGSTHE FINDINGS REVEAL THAT THE LINKAGE BETWEEN THE ETHICAL CLIMATE OF THE ORGANIZATION AND ENTREPRENEURIAL MARKETING IS PARTIALLY MEDIATED BY WORK ENGAGEMENT. IN ADDITION, THE MEDIATING ROLE OF KNOWLEDGE TRANSFER WAS NOT CONFIRMED. THESE RESULTS IMPLY THAT THE ETHICAL CLIMATE OF THE ORGANIZATION FOSTERS ENTREPRENEURIAL MARKETING BY ENABLING EMPLOYEES WITH ABSORPTION, VIGOR AND DEDICATION.RESEARCH LIMITATIONS/IMPLICATIONSSCIENTIFIC AND RESEARCH COMPANIES IN THIS RESEARCH ARE DIFFERENT IN SIZE, RESOURCES, KNOWLEDGE MANAGEMENT SYSTEM, ORGANIZATIONAL STRUCTURE AND PRODUCTS OFFERED TO THE MARKET; THEY HAVE DIFFERENT EMPHASIS ON INNOVATION AND ENTREPRENEURSHIP AS WELL. THIS ISSUE INCREASES THE VARIETY OF DATA AND THE ABILITY TO GENERALIZE THE RESULTS. STILL, ON THE OTHER HAND, IT REDUCES THE ABILITY TO CATEGORIZE DATA AND INCREASES THE AMOUNT OF OUTLIER DATA. FUTURE RESEARCH IN A COMPARATIVE MANNER BETWEEN DIFFERENT INDUSTRIES IS NEEDED.PRACTICAL IMPLICATIONSTHIS STUDY INDICATES THAT AN ORGANIZATION'S ETHICAL CLIMATE CAN BE A CRITICAL PREDICTOR OF ITS ENTREPRENEURIAL MARKETING AS WELL AS EFFECTIVE KNOWLEDGE TRANSFER AND WORK ENGAGEMENT. IN THIS REGARD, ORGANIZATIONS SHOULD PAY ATTENTION TO EMPLOYEE'S PERCEPTION OF THE ORGANIZATION'S ETHICAL CLIMATE AND CREATE AN ENVIRONMENT THAT SUPPORTS PRODUCTIVE BEHAVIORS, COMMITMENT, TRUST, COMMUNICATION, WORK DEDICATION, ETC., TO FACILITATE KNOWLEDGE TRANSFER EFFECTIVELY SO THAT THE ORGANIZATION CAN IDENTIFY MARKET OPPORTUNITIES AND TURN IT INTO CUSTOMER-ORIENTED INNOVATION, COCREATE VALUE FOR THEIR CUSTOMERS AND INCREASE MARKET SHARE.ORIGINALITY/VALUEIN TURBULENT MARKETS, COMPANIES NEED TO INTRODUCE QUALITY AND RELIABLE PRODUCTS. STILL, BECAUSE THE LIFE CYCLE OF PRODUCTS HAS SHORTENED AND THE SPEED OF INTRODUCING NEW PRODUCTS HAS INCREASED, THE SUPPLY OF PRODUCTS WILL FAIL IF COMPANIES ARE NOT EQUIPPED WITH NEW MARKETING METHODS. IN THIS REGARD, THE CURRENT RESEARCH WILL SEEK TO PROVIDE A MECHANISM FOR ORGANIZATIONAL CAPABILITIES ON THE ROAD TO ENTREPRENEURIAL MARKETING BY EXPRESSING ENTREPRENEURIAL MARKETING AS AN INNOVATIVE APPROACH AND TRYING TO IDENTIFY FACTORS AFFECTING IT.", "author": "KHASMAFKAN-NEZAM MH", "author_full_names": "MOHAMMAH HOSSEIN KHASMAFKAN-NEZAM", "country": "IRAN", "source_title": "VINE J INF KNOWL MAN"}, {"id": "KHASMAFKAN-NEZAM MH, 2025, SOC RESPONSIB J", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_2", "subgroup_label": "branch_2 - core", "branch_member_role": "core", "title": "THE INTERSECTION OF RESPONSIBLE LEADERSHIP AND ENTREPRENEURIAL MARKETING: THE ROLES OF ETHICAL CLIMATE, EFFECTIVE KNOWLEDGE TRANSFER AND PERSON-ORGANIZATION FIT", "year": 2025, "journal": "SOCIAL RESPONSIBILITY JOURNAL", "doi": "10.1108/SRJ-01-2025-0008", "branch_core_score": 0.7579869755897181, "semantic_similarity_to_branch": 0.380013383579392, "trunk_connection_score": 0.5349367203372717, "notes": "direct topical signal and strong branch fit", "abstract": "PURPOSETHIS STUDY AIMS TO EXPLORE HOW RESPONSIBLE LEADERSHIP (RL) DETERMINES THE TYPE AND EFFECTIVENESS OF ENTREPRENEURIAL MARKETING (EM) ACTIVITIES AND IDENTIFY KEY INTRA-ORGANIZATIONAL CAPABILITIES THAT FACILITATE THIS RELATIONSHIP, WHICH MEANS MOVING FROM THE INTRA- TO THE EXTRA-ORGANIZATIONAL ENVIRONMENT. THIS STUDY ALSO EXAMINES THE MODERATING ROLE OF PERSON-ORGANIZATION FIT (P-O FIT) ON THE IMPACT OF ETHICAL CLIMATE (EC) AND EFFECTIVE KNOWLEDGE TRANSFER (EKT) ON EM.DESIGN/METHODOLOGY/APPROACHUSING A CROSS-SECTIONAL SURVEY, DATA WERE COLLECTED FROM 100 SMALL AND MEDIUM-SIZED ENTERPRISES IN IRAN, FOCUSING ON SCIENTIFIC AND RESEARCH SECTORS. STRUCTURAL EQUATION MODELING WAS USED TO ANALYZE THE MEDIATION EFFECTS OF EC AND EKT ON THE RL-EM RELATIONSHIP, ALONGSIDE THE MODERATING INFLUENCE OF P-O FIT.FINDINGSTHE RESULTS OF THIS STUDY DEMONSTRATE THAT RL SIGNIFICANTLY PROMOTES EM, MEDIATED BY AN EC AND EKT. THE RESULTS ALSO CONFIRM THE SIGNIFICANT POSITIVE EFFECT OF EC ON EKT. FURTHERMORE, P-O FIT ENHANCES THE EFFECTS OF BOTH EC AND EKT ON EM, SUGGESTING THAT RL FOSTERS AN ENVIRONMENT CONDUCIVE TO ETHICAL PRACTICES AND KNOWLEDGE SHARING, WHICH IN TURN DRIVES MARKETING INNOVATION.RESEARCH LIMITATIONS/IMPLICATIONSTHE DIVERSITY IN SIZE, RESOURCES AND ORGANIZATIONAL STRUCTURES AMONG SMALL AND MEDIUM-SIZED ENTERPRISES STUDIED MAY ENHANCE THE GENERALIZABILITY OF THE FINDINGS; HOWEVER, IT MAY ALSO COMPLICATE THE CATEGORIZATION OF DATA AND INCREASE THE NUMBER OF OUTLIER DATA POINTS. FUTURE RESEARCH SHOULD EXPLORE VARIOUS INDUSTRIES AND USE LONGITUDINAL DESIGNS TO BETTER UNDERSTAND THE EVOLVING DYNAMICS OF THESE RELATIONSHIPS.PRACTICAL IMPLICATIONSTHIS STUDY SHOWS THAT RL IS CRUCIAL FOR EM, KNOWLEDGE TRANSFER AND A POSITIVE EC. ORGANIZATIONS SHOULD FOCUS ON EMPLOYEES' PERCEPTIONS OF ETHICS AND FOSTER AN ENVIRONMENT THAT PROMOTES COMMITMENT, TRUST, COMMUNICATION AND DEDICATION. THIS APPROACH AIDS KNOWLEDGE TRANSFER, HELPING IDENTIFY MARKET OPPORTUNITIES, INNOVATE CUSTOMER-ORIENTED SOLUTIONS AND CO-CREATE VALUE, ULTIMATELY BOOSTING MARKET SHARE. FURTHERMORE, ALIGNING INDIVIDUALS WITH ORGANIZATIONAL VALUES ENHANCES KNOWLEDGE TRANSFER AND ETHICAL PRACTICES, DRIVING MARKETING INNOVATION AND INCREASING CUSTOMER SATISFACTION.ORIGINALITY/VALUEIN TURBULENT MARKETS, COMPANIES MUST INTRODUCE QUALITY, RELIABLE PRODUCTS. HOWEVER, SHORTENED PRODUCT LIFE CYCLES AND FASTER NEW PRODUCT INTRODUCTIONS CAN LEAD TO SUPPLY FAILURES WITHOUT NEW MARKETING METHODS. THIS RESEARCH AIMS TO IDENTIFY FACTORS INFLUENCING EM AS AN INNOVATIVE APPROACH THROUGH ORGANIZATIONAL CAPABILITIES. THIS STUDY CONTRIBUTES TO THE LITERATURE BY INTEGRATING RL, EC, KNOWLEDGE TRANSFER AND P-O FIT WITHIN THE EM FRAMEWORK, OFFERING INSIGHTS INTO HOW LEADERSHIP CAN SHAPE EFFECTIVE MARKETING STRATEGIES.", "author": "KHASMAFKAN-NEZAM MH", "author_full_names": "MOHAMMAD HOSSEIN KHASMAFKAN-NEZAM", "country": "IRAN", "source_title": "SOC RESPONSIB J"}, {"id": "RIGGS R, 2024, J BUS RES", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_2", "subgroup_label": "branch_2 - peripheral", "branch_member_role": "peripheral", "title": "INFORMATION SYSTEMS CAPABILITIES VALUE CREATION THROUGH CIRCULAR ECONOMY PRACTICES IN UNCERTAIN ENVIRONMENTS: A CONDITIONAL MEDIATION MODEL", "year": 2024, "journal": "JOURNAL OF BUSINESS RESEARCH", "doi": "10.1016/J.JBUSRES.2024.114526", "branch_core_score": 0.4227369402657196, "semantic_similarity_to_branch": 0.2552271411387724, "trunk_connection_score": 0.0506896679620692, "notes": "related to branch but weaker as a defining paper", "abstract": "", "author": "", "author_full_names": "RANDY RIGGS; CARMEN M. FELIPE; JOSE L. ROLDAN; JUAN C. REAL", "country": "", "source_title": "J BUS RES"}, {"id": "MAKHLOUFI L, 2024, J RES MARK ENTREP", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_2", "subgroup_label": "branch_2 - core", "branch_member_role": "core", "title": "MEDIATING EFFECT OF ABSORPTIV es": "direct topical signal with strong/moderate trunk connection", "abstract": "PURPOSE THIS PAPER AIMS TO EXPLORE THE LEARNING STYLES OF NASCENT ENTREPRENEURS IN DEVELOPING THEIR ENTREPRENEURIAL MARKETING (EM) SKILLS IN TEAMS WHILE STUDYING FOR THE ENTREPRENEURIAL BUSINESS DEGREE IN ONE UK UNIVERSITY. IT ADVANCES THE INTERLINK BETWEEN EM AND ENTREPRENEURIAL LEARNING (EL) THEORIES AND DEMONSTRATES HOW WORKING IN TEAMS ASSISTS IN DEVELOPING EM SKILLS THROUGH EL IN THE EDUCATIONAL CONTEXT. DESIGN/METHODOLOGY/APPROACH THIS QUALITATIVE CASE STUDY ADOPTS A THEMATIC APPROACH TO ANALYSING 9 AUDIO-RECORDED WORKSHOPS OF 13 ENTREPRENEURIAL STUDENTS WHO WORK IN TEAMS TO DEVELOP ENTREPRENEURIAL VENTURES. AUDIO-RECORDED SESSIONS WERE USED TO MONITOR THE ENTREPRENEURIAL AND MARKETING BEHAVIOUR OF THE YOUNG ENTREPRENEURS AND REVEAL THE CONTEXT AND SKILLS USED IN THEIR LEARNING PROCESS. FINDINGS THE FINDINGS SHOW THAT THE OBSERVED UNDERGRADUATE ENTREPRENEURIAL STUDENTS DEVELOP THEIR EM COMPETENCE THROUGH COLLECTIVE, EXPLORATORY AND EXPLOITATIVE, AS WELL AS SUPPORTIVE AND INDIVIDUAL LEARNING. THESE LEARNING STYLES INTERSECT AND PROVE TO BE EFFECTIVE IN MASTERING BOTH MARKETING AND VENTURE DEVELOPMENT SKILLS IN TEAMPRENEURIAL EDUCATIONAL SETTING. ORIGINALITY/VALUE THIS CASE STUDY DEMONSTRATES HOW THE CONCEPTS OF EM AND EL ARE LINKED IN BOTH THEORY AND PRACTICE. IT MAKES SUGGESTIONS ON HOW ENTREPRENEURIAL COURSES AT THE UNIVERSITY COULD BE FURTHER DEVELOPED TO ASSIST THE YOUNG ENTREPRENEURS IN EFFECTIVELY ACQUIRING BUSINESS KNOWLEDGE AND SKILLS. THIS KNOWLEDGE CAN ALSO BE IMPLEMENTED BY SMALL AND LARGE ORGANISATIONS TO FOSTER A CO-CREATIVE COLLECTIVE LEARNING ENVIRONMENT LEADING TO MORE INNOVATIONS, EXPERIMENTATIONS AND CREATIVE THINKING.", "author": "PETRYLAITE E;RUSK M", "author_full_names": "EDITA PETRYLAITE; MICHELE RUSK", "country": "UNITED KINGDOM", "source_title": "J RES MARK ENTREP"}, {"id": "YASIN R, 2021, J KNOWL MANAG", "role": "branch", "role_label": "Branches", "visual_s UNITED KINGDOM; AUSTRALIA", "source_title": "J RES MARK ENTREP"}, {"id": "FILLIS I, 2021, ARTS MARK", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - core", "branch_member_role": "core", "title": "ART COLLECTING AS CONSUMPTION AND ENTREPRENEURIAL MARKETING AS STRATEGY", "year": 2021, "journal": "ARTS AND THE MARKET", "doi": "10.1108/AAM-09-2020-0035", "branch_core_score": 0.4432256574131525, "semantic_similarity_to_branch": 0.2611047370246169, "trunk_connection_score": 0.9559672574408368, "notes": "direct topical signal and strong semantic fit", "abstract": "PURPOSE THE AUTHORS ADOPT A BIOGRAPHICAL METHODOLOGY TO INVESTIGATE HOW A PRIVATELY FUNDED ART MUSEUM HAS RISEN TO BECOME A KEY VISITOR DESTINATION ON THE ISLAND OF TASMANIA, AUSTRALIA. DESIGN/METHODOLOGY/APPROACH THE AUTHORS UTILISE BOTH ENTREPRENEURSHIP AND CONSUMPTION AS COLLECTING LENSES TO GAIN INSIGHT INTO THE SUCCESS OF A NEW ARTS VENTURE. IN ADDITION TO BIOGRAPHICAL METHODOLOGY THE AUTHORS UTILISE IN-DEPTH INTERVIEWS AND PARTICIPANT OBSERVATION. FINDINGS THE ANALYSIS SHOWS WHAT CAN BE ACHIEVED WHEN ALTERNATIVE PATHS TO CREATIVITY AND INNOVATION ARE PURSUED. THE CREATIVITY INHERENT IN SUCH ACTIONS DOES NOT NECESSARILY HAVE TO BE SUBSTANTIAL. SOMETIMES INCREMENTAL APPROACHES TO ACHIEVING SOMETHING DIFFERENT FROM THE NORM ARE SUFFICIENT. RESEARCH LIMITATIONS/IMPLICATIONS IMPLICATIONS INCLUDE THE CONTINUED MERITS OF ADOPTING A BIOGRAPHICAL APPROACH TO UNCOVERING LONGITUDINAL INSIGHT INTO INTERLINKING ENTREPRENEURSHIP AND CONSUMPTION PRACTICES. THIS APPROACH ENABLES KEY IMPACTING EVENTS OVER TIME TO BE IDENTIFIED AS THEY IMPACT ON THE DIRECTION TAKEN BY THE ART ENTREPRENEUR. PRACTICAL IMPLICATIONS THERE IS GROWING EVIDENCE THAT ADMINISTRATIVE APPROACHES TO ARTS GOVERNANCE ARE LIMITING IN THEIR EFFECTIVENESS. THIS PAPER ADDRESSES THE CALL TO BE MORE ENTREPRENEURIAL IN ARTS GOVERNANCE PRACTICES. ORIGINALITY/VALUE THERE ARE ONLY A VENTURE", "year": 2017, "journal": "JOURNAL OF VACATION MARKETING", "doi": "10.1177/1356766716634153", "branch_core_score": 0.6295424355393168, "semantic_similarity_to_branch": 0.4450048923739084, "trunk_connection_score": 1.0, "notes": "direct topical signal and strong branch fit", "abstract": "ENTREPRENEURIAL MARKETING IS USED TO UNDERSTAND NEW VENTURE CREATION IN THE VACATION TOURISM SECTOR THROUGH A CASE STUDY OF PRIVATE ART MUSEUM IN TASMANIA THAT HAS BECOME A TOURIST DESTINATION OF MAJOR INTERNATIONAL SIGNIFICANCE. THE MUSEUM OF OLD AND NEW ART (MONA) HAS EMERGED AS A MAJOR DRIVER OF TOURISM IN THE REGION. INTERROGATION OF THE ARTS AND CULTURAL TOURISM LITERATURE SETS UP A KEY RESEARCH PROPOSITION - IN ARTS AND CULTURAL TOURISM, THE UNIQUE ARTISTIC TASTES OF THE ENTREPRENEUR OFTEN TRUMP CUSTOMER NEEDS AND PREFERENCES BY SHAPING THE VISITOR'S EXPERIENCE THROUGH CREATIVE ARTISTIC INNOVATION. THE FINDINGS SUPPORT OUR PROPOSITION, WITH ADDITIONAL GROUNDING THROUGH THE IMPACT OF THE OWNER/MANAGER AND ASSOCIATED ENTREPRENEURIAL MARKETING AND EFFECTUATION IMPACTS.", "author": "FILLIS I;LEHMAN K;MILES MP", "author_full_names": "IAN FILLIS; KIM LEHMAN; MORGAN P. MILES", "country": "UNITED KINGDOM; AUSTRALIA; NEW ZEALAND", "source_title": "J VACAT MARK"}, {"id": "BOOTH K, 2017, VISIT STUD", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - peripheral", "branch_member_role": "peripheral", "title": "IT'S A MUSEUM, BUT NOT AS WE KNOW IT: ISSUES FOR LOCAL RESIDENTS ACCESSING THE MUSEUM OF OLD AND NEW ART", "year": 2017, "journal": "VISITOR STUDIES", "doi": "10.1080/10645578.2017.1297121", "branch_core_score": 0.3526211441092302, "semantic_similarity_to_branch": 0.3605738306485349, "trunk_connection_score": 0.0228803425476571, "notes": "related to branch but weaker as a defining paper", "abstract": "", "author": "", "author_full_names": "KATE BOOTH; JUSTIN O’CONNOR; ADRIAN FRANKLIN; NIKOS PAPAST ES, AND \r\nYET WE STILL ADHERE TO MODELS OF MARKETING THAT DO NOT FI T WITHIN TODAY’S KNOWLEDGE-BASED GLOBAL \r\nECONOMY. ALTHOUGH THERE IS SOME HISTORY OF THE INTERROGATION OF RELATIONSHIP BETWEEN MARKETING AND ART, THERE IS STILL MUCH MORE TO BE ACHIEVED BEYOND APPLICATION OF THE TRADITIONAL MARKETING CONCEPT TO ART (CHONG 2002 ) AND THE UTILIZATION OF ART WITHIN CONSUMPTION STUDIES \r\n(SCHROEDER 2001 ).", "author": "FILLIS I.", "author_full_names": "IAN FILLIS", "country": "", "source_title": ""}, {"id": "LEHMAN K, 2014, J RES MARK ENTREP", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - core", "branch_member_role": "core", "title": "THE ART OF ENTREPRENEURIAL MARKET CREATION", "year": 2014, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/JRME-09-2013-0024", "branch_core_score": 0.526631272267036, "semantic_similarity_to_branch": 0.517998753505201, "trunk_connection_score": 0.1331563613351797, "notes": "direct topical signal and strong semantic fit", "abstract": "", "author": "", "author_full_names": "KIM LEHMAN; IAN FILLIS; MORGAN P. MILES", "country": "", "source_title": "J RES MARK ENTREP"}, {"id": "FROST V, 2014, THEGUARDIAN", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - missing_metadata", "branch_member_role": "missing_metadata", "title": "FROST V, 2014, THEGUARDIAN", "year": 2014, "journal": "", "doi": "", "branch_core_score": 0.0, "semantic_similarity_to_branch": 0.0, "trunk_connection_score": 0.0, "notes": "title/text information is insufficient for interpretation", "abstract": "", "author": "", "author_full_names": "", "country": "", "source_title": "THEGUARDIAN"}, {"id": "CROSSICK G, 2014, CULT TRENDS", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - peripheral", "bran rown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - core", "branch_member_role": "core", "title": "ENTREPRENEURIAL MARKETING OF NONPROFIT ARTS ORGANISATIONS", "year": 2013, "journal": "SOCIAL BUSINESS", "doi": "10.1362/204440813X13747454648777", "branch_core_score": 0.4708791051960691, "semantic_similarity_to_branch": 0.4567542942022258, "trunk_connection_score": 0.1499776045497692, "notes": "direct topical signal and strong semantic fit", "abstract": "", "author": "KIRCHNER T.A.; FORD J.B.; MOTTNER S.", "author_full_names": "THERESA A. KIRCHNER; JOHN B. FORD; SANDRA MOTTNER", "country": "", "source_title": ""}, {"id": "HALLAK R, 2012, TOURISM MANAGE", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_3", "subgroup_label": "branch_3 - background_methodological", "branch_member_role": "background_methodological", "title": "THE PLACE IDENTITY – PERFORMANCE RELATIONSHIP AMONG TOURISM ENTREPRENEURS: A STRUCTURAL EQUATION MODELLING ANALYSIS", "year": 2012, "journal": "TOURISM MANAGEMENT", "doi": "10.1016/J.TOURMAN.2011.02.013", "branch_core_score": 0.3114786264128139, "semantic_similarity_to_branch": 0.3028675221161241, "trunk_connection_score": 0.0956737743113912, "notes": "methodological or background-oriented title/source", "abstract": "", "author": "", "author_full_names": "ROB HALLAK; GRAHAM BROWN; NOEL LINDSAY", "country": "", "source_title": "TOURISM MANAGE"}, {"id": "ABBAS A, 2026, J SMALL BUS ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ABBAS A, 2026, J SMALL BUS ENTREP", "year": 2026, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 109.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "RAHIMI A, 2026, J HOSP LEIS SPORT TO", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING EDUCATION AND INTENTIONS IN SPORT: INVESTIGATING THE MODERATING EFFECT OF SPORTING CAPITAL", "year": 2026, "journal": "JOURNAL OF HOSPITALITY LEISURE SPORT & TOURISM EDUCATION", "source_title": "J HOSP LEIS SPORT TO", "doi": "10.1016/j.jhlste.2026.100598", "internal_indegree": 0.0, "internal_outdegree": 34.0, "sap_rank": 5861782232.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "AS SPORT INCREASINGLY INTERSECTS WITH ENTREPRENEURSHIP, UNDERSTANDING HOW SPORT STUDENTS TRANSLATE ENTREPRENEURIAL LEARNING INTO INTENTION BECOMES A PRESSING ACADEMIC AND PRACTICAL CONCERN. THIS STUDY EXPLORES THE EXTENT TO WHICH ENTREPRENEURIAL MARKETING EDUCATION (EME) SHAPES ENTREPRENEURIAL INTENTIONS (EI) AMONG SPORT SCIENCE STUDENTS, FOCUSING ON TWO KEY COGNITIVE PREDICTORS: PERCEIVED DESIRABILITY (PD) AND PERCEIVED FEASIBILITY (PF). DRAWING ON A NATIONAL SAMPLE OF 435 UNDERGRADUATES ACROSS IRANIAN UNIVERSITIES, STRUCTURAL EQUATION MODELING REVEALED THAT EME SIGNIFICANTLY ENHANCES BOTH PD AND PF-THOUGH NOT ALL PEDAGOGICAL ELEMENTS CONTRIBUTED EQUALLY. WHAT ELEVATES THIS RESEARCH IS ITS REVELATION OF SPORTING CAPITAL (SC) AS A DECISIVE MODERATING FORCE. CONCEPTUALIZED AS A MULTIDIMENSIONAL BLEND OF PHYSICAL ABILITY, PSYCHOLOGICAL RESILIENCE, AND SOCIAL CONNECTIVITY, SC NOT ONLY AMPLIFIES THE EFFECT OF EME, BUT DOES SO MORE POWERFULLY AMONG FEMALE STUDENTS-WHERE IT APPEARS TO COUNTERBALANCE STRUCTURAL AND CULTURAL BARRIERS THROUGH EMBODIED CONFIDENCE AND SOCIAL REINFORCEMENT. THESE FINDINGS REFRAME ENTREPRENEURSHIP EDUCATION AS A LIVED, CONTEXT-SENSITIVE PROCESS SHAPED NOT ONLY BY COGNITIVE FACTORS BUT BY SPORT-ROOTED EXPERIENCES. THEORETICALLY, THIS STUDY BRIDGES ENTREPRENEURIAL COGNITION WITH EMBODIED CAPITAL; PRACTICALLY, IT CALLS FOR LEARNING ENVIRONMENTS THAT ACTIVATE THE PHYSICAL, EMOTIONAL, AND RELATIONAL STRENGTHS OF SPORT STUDENTS IN PURSUIT OF ENTREPRENEURIAL FUTURES.", "author": "RAHIMI A;GANDOMANI RA;SHAHBAZPOUR L;KHANYOURDI MN;HASANZADEH N", "author_full_names": "AMIR RAHIMI; ROHOLLAH ASGARI GANDOMANI; LEILA SHAHBAZPOUR; MEYSAM NOORI KHANYOURDI; NIMA HASANZADEH", "country": "IRAN; IRAN; IRAN; IRAN"}, {"id": "RAHIMI A, 2026", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "RAHIMI A, 2026", "year": 2026, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 28.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "OLAN F, 2026, INFORM SYST FRONT", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SOCIAL ENTREPRENEURIAL MARKETING AND INNOVATION IN B2B SERVICES: BUILDING RESILIENCE WITH EXPLAINABLE ARTIFICIAL INTELLIGENCE", "year": 2026, "journal": "INFORMATION SYSTEMS FRONTIERS", "source_title": "INFORM SYST FRONT", "doi": "10.1007/s10796-025-10583-5", "internal_indegree": 0.0, "internal_outdegree": 16.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "EXPLAINABLE ARTIFICIAL INTELLIGENCE (XAI) AND OTHER DIGITAL TECHNOLOGIES ARE ALTERING THE NATURE OF SOCIAL ENTREPRENEURSHIP, MARKETING, AND OTHER SERVICE ACTIVITIES. THE STRUCTURES AND STRATEGIES OF ENTREPRENEURS UNDERGO RADICAL CHANGE AS A RESULT OF THE IMPACT OF XAI ON MARKETING AND INNOVATION. DESPITE THE INCREASED INTEREST IN BUSINESS TO BUSINESS (B2B) LITERATURE, THERE ARE LIMITATIONS ON HOW AND WHAT CIRCUMSTANCES THE ACTIVITIES OF B2B MARKETING ON SOCIAL ENTREPRENEURSHIP. THEREFORE, THIS STUDY OUTLINES HOW XAI WILL IMPACT B2B SERVICES BY BUILDING RESILIENCE DURING AND AFTER CRISIS EVENTS SUCH AS THE COVID-19 PANDEMIC. TO DEVELOP AN IN-DEPTH UNDERSTANDING ON THE THEORIES OF SOCIAL ENTREPRENEURSHIP, B2B MARKETING, AND EMERGING TECHNOLOGIES, THIS STUDY SET APART AND CONCEPTUALIZE RELEVANT FACTORS AND LINKAGES. THE RESULT SHOWS THAT BASED ON A SURVEY OF 295 SAMPLES OF B2B SERVICES ENTREPRENEURIAL BUSINESSES, XAI ENHANCES THE ESTABLISHMENT OF A SUSTAINABLE RESILIENCE FOR B2B MARKETING ACTIVITIES AND CONTRIBUTE TO BUILDING SOCIAL ENTREPRENEURIAL STRATEGIES FOR B2B MARKETING INNOVATION.", "author": "OLAN F;PAPADOPOULOS T;SPANAKI K;JAYAWICKRAMA U", "author_full_names": "FEMI OLAN; THOMAS PAPADOPOULOS; KONSTANTINA SPANAKI; UCHITHA JAYAWICKRAMA", "country": "UNITED KINGDOM; UNITED KINGDOM; FRANCE; UNITED KINGDOM"}, {"id": "YANG M, 2025, INT BUS REV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "TURNING DECISION-MAKING LOGIC INTO INTERNATIONAL PERFORMANCE AMONG SMES: REVEALING THE IMPORTANCE OF INTERNATIONAL ENTREPRENEURIAL MARKETING", "year": 2025, "journal": "INTERNATIONAL BUSINESS REVIEW", "source_title": "INT BUS REV", "doi": "10.1016/j.ibusrev.2025.102457", "internal_indegree": 0.0, "internal_outdegree": 97.0, "sap_rank": 26968632791.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE INTERNATIONAL BUSINESS FIELD LACKS RESEARCH ON HOW DECISION-MAKING LOGICS LEAD TO SMES' INTERNATIONAL PERFORMANCE AND WHAT MECHANISMS ARE INVOLVED. THIS STUDY EXAMINES THE RELATIONSHIP BETWEEN DECISION-MAKING LOGICS (EFFECTUATION AND CAUSATION) AND INTERNATIONAL PERFORMANCE OF SMES AND CONTRIBUTES BY HIGHLIGHTING THE CRUCIAL ROLE OF INTERNATIONAL ENTREPRENEURIAL MARKETING. WE USED STRUCTURAL EQUATION PARTIAL LEAST SQUARES IN THE EMPIRICAL STUDY WITH A CROSS-COUNTRY SAMPLE OF 489 INTERNATIONALIZING SMES FROM CHINA, FINLAND, AND NEW ZEALAND. THE RESULTS REVEAL THAT INTERNATIONAL ENTREPRENEURIAL MARKETING FULLY MEDIATES THE POSITIVE EFFECTUATION-PERFORMANCE RELATIONSHIP AND THE MEDIATION EFFECT IS STRONGER AMONG SMES FROM DEVELOPING MARKETS AND OFFERING SERVICES. WE SHOW THAT INTERNATIONAL ENTREPRENEURIAL MARKETING PARTIALLY MEDIATES THE POSITIVE CAUSATION-PERFORMANCE RELATIONSHIP AND THE MEDIATION EFFECT IS STRONGER AMONG SMES FROM DEVELOPED MARKETS AND AMONG THOSE THAT OFFER PRODUCTS.", "author": "YANG M;GABRIELSSON P;GABRIELSSON M;PYNNONEN S", "author_full_names": "MAN YANG; PETER GABRIELSSON; MIKA GABRIELSSON; SEPPO PYNNONEN", "country": "FINLAND; FINLAND; FINLAND; FINLAND"}, {"id": "CHOOSET N, 2025, COGENT BUS MANAG", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "DEVELOPING ENTREPRENEURIAL MARKETING DIMENSIONS FOR SMES IN THE DIGITAL ERA: A GROUNDED THEORY APPROACH", "year": 2025, "journal": "COGENT BUSINESS & MANAGEMENT", "source_title": "COGENT BUS MANAG", "doi": "10.1080/23311975.2025.2480748", "internal_indegree": 0.0, "internal_outdegree": 95.0, "sap_rank": 133921114566.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "CONVENTIONAL ENTREPRENEURIAL MARKETING PRINCIPLES, FORMULATED IN DEVELOPED NATIONS, MAY INSUFFICIENTLY FACE THE DIGITAL-ERA CHALLENGES ENCOUNTERED BY SMALL AND MEDIUM-SIZED ENTERPRISES (SMES) IN DEVELOPING COUNTRIES. THIS RESEARCH SEEKS TO ESTABLISH A NOVEL CONCEPTUAL FRAMEWORK THAT IS MORE APPROPRIATE FOR THE CHALLENGES OF THE DIGITAL ERA, EMPLOYING A QUALITATIVE STUDY GROUNDED IN THEORY METHODOLOGY. COMPREHENSIVE INTERVIEWS WERE PERFORMED WITH 30 ENTREPRENEURS FROM FIVE REGIONS OF THAILAND, REPRESENTING MICRO, SMALL, AND MEDIUM-SIZED ENTERPRISES IN THE AGRICULTURAL, SERVICE, MANUFACTURING, AND TRADING SECTORS. THE RESEARCH PRODUCED THREE NOTABLE FINDINGS: (1) THE EXTENSION OF ENTREPRENEURIAL MARKETING COMPONENTS FROM TWO CONVENTIONAL DIMENSIONS (ENTREPRENEURIAL ORIENTATION AND MARKET ORIENTATION) TO FOUR DIMENSIONS BY INTEGRATING NETWORKING CAPABILITIES AND DIGITAL LITERACY; (2) THE ESTABLISHMENT OF NEW METRICS THAT ILLUSTRATE THE AMALGAMATION OF TRADITIONAL METHODOLOGIES WITH DIGITAL TECHNOLOGIES, INCLUDING THE USE OF ONLINE DATA FOR IDENTIFYING BUSINESS OPPORTUNITIES, FOSTERING CUSTOMER RELATIONSHIPS THROUGH ONLINE COMMUNITIES, AND CREATING PRODUCTS INFORMED BY DIGITAL DATA ANALYTICS; AND (3) THE FORMULATION OF SPECIFIC PRACTICAL GUIDELINES AIMED AT IMPROVING THE MARKETING CAPABILITIES OF SMES, ESPECIALLY IN CULTIVATING COLLABORATIVE NETWORKS AND ENHANCING DIGITAL SKILLS. THIS RESEARCH EXPANDS THE THEORETICAL FRAMEWORK OF ENTREPRENEURIAL MARKETING AND OFFERS PRACTICAL GUIDELINES FOR THE DEVELOPMENT OF SMES IN DEVELOPING NATIONS.", "author": "CHOOSET N;SUKHABOT S", "author_full_names": "NOPPADON CHOOSET; SASIWEMON SUKHABOT", "country": "THAILAND; THAILAND"}, {"id": "BREIT L, 2025, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "BREIT L, 2025, J RES MARK ENTREP", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 87.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "ALIAKBARI A, 2025, INT J ENTREP BEHAV R", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "UNPACKING THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING ACTIVITIES AND SMALL FIRM PERFORMANCE", "year": 2025, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURIAL BEHAVIOR & RESEARCH", "source_title": "INT J ENTREP BEHAV R", "doi": "10.1108/IJEBR-10-2024-1173", "internal_indegree": 0.0, "internal_outdegree": 61.0, "sap_rank": 4211908731.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSEA QUESTION REMAINS UNRESOLVED IN EXISTING CROSS-DISCIPLINARY RESEARCH AT THE MARKETING/ENTREPRENEURSHIP INTERFACE (MEI). THIS FEATURES CIRCUMSTANCES WHEN EMPLOYING A COMBINATION OF MARKET-ORIENTED AND ENTREPRENEURIALLY-ORIENTED ACTIVITIES, KNOWN AS ENTREPRENEURIAL MARKETING (EM) BEHAVIOR, IS LIKELY TO LEAD TO POSITIVE PERFORMANCE OUTCOMES. EARLIER MIXED FINDINGS PROVIDE THE NEED TO UNPACK THE NUANCES OF EM PRACTICES, IN TERMS OF THEIR BOUNDARY CONDITIONS, REGARDING CIRCUMSTANCES WHERE THIS BEHAVIOR DOES OR DOES NOT LEAD TO PERFORMANCE-ENHANCING OUTCOMES. CONSEQUENTLY, THE PURPOSE OF THIS STUDY IS TO EXAMINE THE COMPLEXITIES OF THE ASSOCIATION BETWEEN EM ACTIVITIES AND SMALL FIRM PERFORMANCE BY ASSESSING QUADRATIC AND MODERATING EFFECTS.DESIGN/METHODOLOGY/APPROACHTHIS STUDY WAS UNDERPINNED BY RESOURCE-BASED THEORY (RBT). SURVEY RESPONSES WERE COLLECTED FROM 214 SMALLER-SIZED COMPANIES IN THE UNITED KINGDOM. THE STATISTICAL DATA PASSED ALL MAJOR CHECKS FOR RELIABILITY, DIFFERENT FORMS OF VALIDITY, COMMON METHOD VARIANCE AND ENDOGENEITY BIAS.FINDINGSEM ACTIVITIES HAD A QUADRATIC CONNECTION WITH SMALL FIRM PERFORMANCE, WITH THIS RELATIONSHIP BEING ENHANCED (IN TERMS OF A POSITIVE TWO-WAY INTERACTION EFFECT) BY MARKET DYNAMISM (A COUNTER-INTUITIVE RESULT REGARDING ENVIRONMENTAL CONDITIONS). SURPRISINGLY, THROUGH A POST-HOC TEST, COOPETITION (COOPERATION AMONG COMPETITORS TO LEVERAGE ASSETS AND OVERCOME RESOURCE CONSTRAINTS) DID NOT PLAY ANY INFLUENTIAL PART IN HELPING OWNER-MANAGERS TO OVERCOME THE POTENTIAL DOWNSIDES OF EM PRACTICES, LIKE THE TIME AND COST IMPLICATIONS OF IDENTIFYING AND EXPLOITING OPPORTUNITIES (I.E., A NON-SIGNIFICANT THREE-WAY INTERACTION EFFECT).ORIGINALITY/VALUEUNIQUE INSIGHTS OUTLINE HOW DECISION-MAKERS IN SMALLER-SIZED ORGANIZATIONS CAN HARNESS THE POTENTIAL BENEFITS, AND MINIMISE THE LIKELY DRAWBACKS, OF EMPLOYING EM ACTIVITIES. HOWEVER, OWNER-MANAGERS SHOULD BE CAUTIOUS WHEN IMPLEMENTING THESE ORGANIZATION-WIDE PRACTICES, SINCE THEY ARE LIKELY TO ENHANCE PERFORMANCE, BUT ONLY UP TO A FIXED POINT. INDEED, EXCESSIVE FORMS OF EM ACTIVITIES CAN WEAKEN SMALL FIRMS' PERFORMANCE. A COUNTER-INTUITIVE POSITIVE MODERATION EFFECT REGARDING MARKET DYNAMISM CHALLENGES CERTAIN EARLIER FINDINGS. SPECIFICALLY, IN SOME DYNAMIC MARKET CONDITIONS, EM ACTIVITIES COULD BE PERFORMANCE-ENHANCING, SINCE CERTAIN ENVIRONMENTAL-LEVEL FORCES MIGHT ASSIST OWNER-MANAGERS TO AMPLIFY THE MERITS OF BEHAVIOR AT THE MEI WHEN IMPLEMENTED EFFECTIVELY.", "author": "ALIAKBARI A;CRICK JM;CHEN WF;CRICK D", "author_full_names": "ALIASGHAR ALIAKBARI; JAMES M. CRICK; WEI‐FEN CHEN; DAVE CRICK", "country": "UNITED KINGDOM; CANADA"}, {"id": "ALIAKBARI A, 2025, INT J ENTREP BEHAV RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ALIAKBARI A, 2025, INT J ENTREP BEHAV RES", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 59.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "GOYAL A, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "GOYAL A, 2025", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 55.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "GOYAL A, 2025, TOUR HOSP MANAG-CROA", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "INFLUENCE OF ENTREPRENEURIAL MARKETING ON HOTEL INDUSTRY PERFORMANCE: A MEDIATION ANALYSIS", "year": 2025, "journal": "TOURISM AND HOSPITALITY MANAGEMENT-CROATIA", "source_title": "TOUR HOSP MANAG-CROA", "doi": "10.20867/thm.31.3.6", "internal_indegree": 0.0, "internal_outdegree": 53.0, "sap_rank": 593860149.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE - THROUGH MARKETING COMPETENCE AS A MEDIATING FACTOR, THIS RESEARCH SEEKS TO EXAMINE THE EFFECTS OF ENTREPRENEURIAL MARKETING PERSPECTIVE ON THE FINANCIAL PERFORMANCE OF THE HOTEL INDUSTRY. METHODOLOGY - A SAMPLE OF 255 HOTEL MANAGERS, HUMAN RESOURCE DIRECTORS, AND OTHER STAFF MEMBERS FROM RAJASTHAN, INDIA, AND THE SMALL-SIZED HOTEL INDUSTRY GAVE DATA USING A STANDARDIZED QUESTIONNAIRE. THE DEVELOPED RESEARCH HYPOTHESES WERE TESTED USING THE STRUCTURAL EQUATION MODELING (SEM) METHOD. FINDINGS - AS PER THE EMPIRICAL RESULTS, ENTREPRENEURIAL ORIENTATION (EO) FACTORS SIGNIFICANTLY IMPACT BUSINESS SUCCESS. THE ABILITY OF THE SERVICE SECTOR TO MARKET ITS PRODUCTS PARTIALLY MEDIATES THE EFFECTS OF ENTREPRENEURIAL ORIENTATION CHARACTERISTICS ON HOTEL INDUSTRY SUCCESS. ORIGINALITY OF THE RESEARCH - THIS RESEARCH WAS CONDUCTED WITH ENTREPRENEURS OF A SINGLE INDUSTRY IN A SPECIFIC COUNTRY USING CROSS-SECTIONAL DATA. THE EXISTING RESEARCH MODEL MAY BE EXTENDED WITH LONGITUDINAL DATA OF OTHER SERVICE SECTORS ESTABLISHED IN DIFFERENT NATIONS. MOREOVER, NEW RESEARCH CONSTRUCTS MAY BE ADDED TO IT FOR FURTHER INVESTIGATION. THE STUDY CONTRIBUTES TO DEVELOPING NATIONS' ENTREPRENEURIAL MARKETING BY EVALUATING THE SIGNIFICANCE OF ENTREPRENEURIAL ATTITUDE IN PREDICTING BUSINESS PERFORMANCE IN EMERGING ECONOMIES. THIS STUDY ALSO SHOWS HOW RESEARCH FINDINGS OF DEVELOPED ECONOMIES CAN BE APPLIED TO EMERGING ECONOMIES.", "author": "GOYAL A;SUCHARITA S;DHAL S;MISHRA US", "author_full_names": "ARPITA GOYAL; SMITA SUCHARITA MAHAPATRA; SANGHAMITRA DHAL; UMA SANKAR MISHRA", "country": "INDIA; INDIA; INDIA"}, {"id": "ROBLEDO S, 2025, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "EXAMINING THE ROLE OF MONETARY INCENTIVES AND TIE STRENGTH IN MEDIATING SATISFACTION AND WORD OF MOUTH IN MULTILEVEL MARKETING COMPANIES: AN ENTREPRENEURIAL MARKETING PERSPECTIVE", "year": 2025, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "source_title": "J RES MARK ENTREP", "doi": "10.1108/JRME-07-2023-0117", "internal_indegree": 0.0, "internal_outdegree": 48.0, "sap_rank": 919748601.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSETHIS STUDY AIMS TO EXPLORE THE MEDIATING ROLES OF MONETARY INCENTIVES AND TIE STRENGTH IN THE RELATIONSHIP BETWEEN SATISFACTION AND THE WORD-OF-MOUTH (WOM) PROCESS WITHIN A MULTILEVEL MARKETING (MLM) ORGANIZATION.DESIGN/METHODOLOGY/APPROACHTHIS STUDY CONDUCTED A PERSONAL SURVEY WITH 240 DISTRIBUTORS FROM A MLM COMPANY. THE CONCEPTUAL FRAMEWORK WAS TESTED USING STRUCTURAL EQUATION MODELING.FINDINGSTHESE EMPIRICAL FINDINGS SUBSTANTIATE THE VITAL ROLE OF SATISFACTION IN GENERATING WOM. MOREOVER, MONETARY INCENTIVES AND A STRONG INTERPERSONAL CONNECTION BETWEEN THE INFORMATION PROVIDER AND RECIPIENT (TIE STRENGTH) SERVE AS PIVOTAL DRIVERS IN INITIATING THE WOM PROCESS. THESE FACTORS WERE FOUND TO MEDIATE THE RELATIONSHIP BETWEEN SATISFACTION AND WOM, UNDERSCORING THEIR STRATEGIC IMPORTANCE.RESEARCH LIMITATIONS/IMPLICATIONSTHIS RESEARCH FOCUSES ON A SINGLE MLM COMPANY, LIMITING ITS GENERALIZABILITY TO NON-MLM OR OTHER COMPANIES. THIS AREA HOLDS PROMISE FOR FUTURE RESEARCH.PRACTICAL IMPLICATIONSMLM ENTREPRENEURS SHOULD PRIORITIZE OFFERING HIGH-QUALITY PRODUCTS, WELL-DESIGNED MONETARY INCENTIVES, AND FOSTERING STRONG RELATIONSHIPS WITH CLIENTS TO ACTIVATE THE WOM PROCESS.ORIGINALITY/VALUETHE RESULTS OF THIS STUDY INDICATE THAT SATISFACTION PLAYS A SIGNIFICANT ROLE IN WOM. IN ADDITION, THIS STUDY EMPHASIZES THE IMPORTANCE OF A WELL-STRUCTURED COMPENSATION PLAN (MONETARY INCENTIVES) AND THE NEED FOR MLM ENTREPRENEURS TO STRENGTHEN RELATIONSHIPS WITH CUSTOMERS TO ENHANCE THE LIKELIHOOD OF WOM ACTIVATION.", "author": "ROBLEDO S;GIL-SILVA DC;VILLEGAS-JARAMILLO EJ;OSORIO C", "author_full_names": "SEBASTIAN ROBLEDO; DIANA-CAROLINA GIL-SILVA; EDUARDO-JOSE VILLEGAS-JARAMILLO; CARLOS OSORIO", "country": "COLOMBIA; COLOMBIA; COLOMBIA; COLOMBIA; MEXICO"}, {"id": "KAKEESH D, 2025, J MARKETING ANALYTICS", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "KAKEESH D, 2025, J MARKETING ANALYTICS", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 48.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CRICK JM, 2025, J STRATEG MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "MANAGING AN ENTREPRENEURIAL MARKETING ORIENTATION IN TURBULENT COMPETITIVE BUSINESS ENVIRONMENTS", "year": 2025, "journal": "JOURNAL OF STRATEGIC MARKETING", "source_title": "J STRATEG MARK", "doi": "10.1080/0965254X.2024.2445655", "internal_indegree": 0.0, "internal_outdegree": 45.0, "sap_rank": 2425785322.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "MIXED PRIOR FINDINGS EXIST CONCERNING THE RELATIONSHIP BETWEEN AN ENTREPRENEURIAL MARKETING ORIENTATION (EMO) AND SMALL-TO-MEDIUM-SIZED ENTERPRISES' (SMES') PERFORMANCE. THIS IS A PROBLEM, SINCE THE PERFORMANCE-ENHANCING CIRCUMSTANCES REMAIN UNCLEAR CONCERNING THE UTILITY OF DECISION-MAKERS EMPLOYING EMO BEHAVIOURS. THIS STUDY UNPACKS THE RELATIONSHIP BETWEEN AN EMO AND SMES' PERFORMANCE UNDER THE MODERATING ROLE OF MARKET DYNAMISM. SURVEY RESPONSES WERE COLLECTED FROM 916 SMES IN MALAYSIA, AND ALL MAJOR ROBUSTNESS CHECKS WERE ADDRESSED. THE FINDINGS SHOWED THAT CONSISTENT WITH MUCH OF THE EXISTING RESEARCH, AN EMO DROVE SMES' PERFORMANCE. IN CONTRAST, THIS LINK WAS POSITIVELY MODERATED BY MARKET DYNAMISM (A COUNTER-INTUITIVE RESULT). CONSEQUENTLY, THIS INVESTIGATION OFFERS UNIQUE INSIGHTS REGARDING THE CIRCUMSTANCES WHERE EFFECTIVELY MANAGING AN EMO IS LIKELY TO ASSIST SMES TO YIELD ENHANCED PERFORMANCE ACROSS DYNAMIC MARKETS. FURTHERMORE, IMPROVED EVIDENCE IS PROVIDED ABOUT THE OUTSIDE-THE-FIRM PERSPECTIVE OF RESOURCE-BASED THEORY, AS A LENS TO CONCEPTUALISE THE NUANCES OF EMO PRACTICES IN TURBULENT ENVIRONMENTS.", "author": "CRICK JM;HAMZAH MI;CRICK D", "author_full_names": "JAMES M. CRICK; MUHAMMAD ISKANDAR HAMZAH; DAVE CRICK", "country": "UNITED KINGDOM; MALAYSIA; CANADA"}, {"id": "CRICK J, 2025, J STRATEG MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "CRICK J, 2025, J STRATEG MARK", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 45.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CAPELI C, 2025, J SMALL BUS ENTERP DEV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "CAPELI C, 2025, J SMALL BUS ENTERP DEV", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 43.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CAPELI CMD, 2025, J SMALL BUS ENTERP D", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE MUTUAL INFLUENCE BETWEEN ENTREPRENEURIAL MARKETING AND CAUSAL AND EFFECTUAL ENTREPRENEURSHIP: AN EMPIRICAL STUDY IN AN EMERGING AND DEVELOPING ECONOMY", "year": 2025, "journal": "JOURNAL OF SMALL BUSINESS AND ENTERPRISE DEVELOPMENT", "source_title": "J SMALL BUS ENTERP D", "doi": "10.1108/JSBED-04-2024-0197", "internal_indegree": 0.0, "internal_outdegree": 41.0, "sap_rank": 23463284833.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE - ENTREPRENEURIAL MARKETING (EM) LITERATURE HAS EVOLVED RECENTLY, BUT MORE UNDERSTANDING IS NEEDED ON HOW THE SEVEN DIMENSIONS OF EM IMPACT CAUSAL AND EFFECTUAL ENTREPRENEURIAL BEHAVIOR AND, SIMILARLY, HOW ENTREPRENEURIAL BEHAVIOR INFLUENCES THE RESULTS OF ALL DIMENSIONS OF THE EM CONSTRUCT. THIS STUDY INVESTIGATES THE ASSOCIATION AND MUTUAL INFLUENCE BETWEEN EM AND ENTREPRENEURSHIP. DESIGN/METHODOLOGY/APPROACH - THIS STUDY USES A QUALITATIVE STRATEGY, ADDRESSING GAPS DUE TO ITS LOW INCIDENCE AND EMPLOYS THEORETICAL REPLICATION, WHICH IS PRACTICALLY UNEXPLORED. IT INVESTIGATES TWO CASES IN BRAZIL: SMALL COMPANIES (EIGHT CASES SELECTED BY LITERAL REPLICATION) AND A STRUCTURED NETWORK OF COMPANIES (ONE CASE SELECTED BY THEORETICAL REPLICATION), PREDICTING A POSITIVE INFLUENCE OF EM IN THE FIRST CASE AND A NEGATIVE OR NEUTRAL INFLUENCE IN THE SECOND.<BR /> FINDINGS - THE INFLUENCE OF EM ON ENTREPRENEURSHIP IS CONTEXT-DEPENDENT AND VARIES ACCORDING TO THE EMPIRICAL OBJECT. IN TURN, THE IMPACT OF ENTREPRENEURSHIP ON THE RESULTS OF THE EM DIMENSIONS IS MORE STABLE, PRIMARILY CAUSAL AND VARIES SLIGHTLY BETWEEN STRUCTURES.<BR /> ORIGINALITY/VALUE - FIRST, BY STUDYING HOW THE DIMENSIONS OF EM IMPACT CAUSAL/EFFECTUAL BEHAVIOR, THIS STUDY BROADENS THE UNDERSTANDING OF THE AREA, WHICH WAS PREVIOUSLY FOCUSED ON ONLY A FEW DIMENSIONS. SECOND, BY INVESTIGATING THE IMPACT OF ENTREPRENEURSHIP ON EM OUTCOMES, THIS STUDY SHEDS LIGHT ON THE INFLUENCE OF AND DIFFERENCES IN CAUSAL/EFFECTUAL BEHAVIOR IN EACH OF THE SEVEN DIMENSIONS. FINALLY, IT EXTENDS THE UNDERSTANDING OF EM AND ENTREPRENEURSHIP IN SMALL BUSINESSES AND A STRUCTURED NETWORK BY IDENTIFYING SIMILARITIES AND DISTINCTIONS HITHERTO UNEXPLORED.", "author": "CAPELI CMD;CORREA VS;SHIGAKI HB;MELO PLD", "author_full_names": "CARLA MARIELI DELMIRO CAPELI; VICTOR SILVA CORREA; HELENA BELINTANI SHIGAKI; PEDRO LUCAS DE RESENDE MELO", "country": "BRAZIL; BRAZIL"}, {"id": "SUN Y, 2025, INT J ENTREP BEHAV RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SUN Y, 2025, INT J ENTREP BEHAV RES", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 36.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "KHAN H, 2025, INT J ENTREP BEHAV RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "KHAN H, 2025, INT J ENTREP BEHAV RES", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 35.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "KHASMAFKAN-NEZAM MH, 2025, SOC RESPONSIB J", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE INTERSECTION OF RESPONSIBLE LEADERSHIP AND ENTREPRENEURIAL MARKETING: THE ROLES OF ETHICAL CLIMATE, EFFECTIVE KNOWLEDGE TRANSFER AND PERSON-ORGANIZATION FIT", "year": 2025, "journal": "SOCIAL RESPONSIBILITY JOURNAL", "source_title": "SOC RESPONSIB J", "doi": "10.1108/SRJ-01-2025-0008", "internal_indegree": 0.0, "internal_outdegree": 33.0, "sap_rank": 164176424.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSETHIS STUDY AIMS TO EXPLORE HOW RESPONSIBLE LEADERSHIP (RL) DETERMINES THE TYPE AND EFFECTIVENESS OF ENTREPRENEURIAL MARKETING (EM) ACTIVITIES AND IDENTIFY KEY INTRA-ORGANIZATIONAL CAPABILITIES THAT FACILITATE THIS RELATIONSHIP, WHICH MEANS MOVING FROM THE INTRA- TO THE EXTRA-ORGANIZATIONAL ENVIRONMENT. THIS STUDY ALSO EXAMINES THE MODERATING ROLE OF PERSON-ORGANIZATION FIT (P-O FIT) ON THE IMPACT OF ETHICAL CLIMATE (EC) AND EFFECTIVE KNOWLEDGE TRANSFER (EKT) ON EM.DESIGN/METHODOLOGY/APPROACHUSING A CROSS-SECTIONAL SURVEY, DATA WERE COLLECTED FROM 100 SMALL AND MEDIUM-SIZED ENTERPRISES IN IRAN, FOCUSING ON SCIENTIFIC AND RESEARCH SECTORS. STRUCTURAL EQUATION MODELING WAS USED TO ANALYZE THE MEDIATION EFFECTS OF EC AND EKT ON THE RL-EM RELATIONSHIP, ALONGSIDE THE MODERATING INFLUENCE OF P-O FIT.FINDINGSTHE RESULTS OF THIS STUDY DEMONSTRATE THAT RL SIGNIFICANTLY PROMOTES EM, MEDIATED BY AN EC AND EKT. THE RESULTS ALSO CONFIRM THE SIGNIFICANT POSITIVE EFFECT OF EC ON EKT. FURTHERMORE, P-O FIT ENHANCES THE EFFECTS OF BOTH EC AND EKT ON EM, SUGGESTING THAT RL FOSTERS AN ENVIRONMENT CONDUCIVE TO ETHICAL PRACTICES AND KNOWLEDGE SHARING, WHICH IN TURN DRIVES MARKETING INNOVATION.RESEARCH LIMITATIONS/IMPLICATIONSTHE DIVERSITY IN SIZE, RESOURCES AND ORGANIZATIONAL STRUCTURES AMONG SMALL AND MEDIUM-SIZED ENTERPRISES STUDIED MAY ENHANCE THE GENERALIZABILITY OF THE FINDINGS; HOWEVER, IT MAY ALSO COMPLICATE THE CATEGORIZATION OF DATA AND INCREASE THE NUMBER OF OUTLIER DATA POINTS. FUTURE RESEARCH SHOULD EXPLORE VARIOUS INDUSTRIES AND USE LONGITUDINAL DESIGNS TO BETTER UNDERSTAND THE EVOLVING DYNAMICS OF THESE RELATIONSHIPS.PRACTICAL IMPLICATIONSTHIS STUDY SHOWS THAT RL IS CRUCIAL FOR EM, KNOWLEDGE TRANSFER AND A POSITIVE EC. ORGANIZATIONS SHOULD FOCUS ON EMPLOYEES' PERCEPTIONS OF ETHICS AND FOSTER AN ENVIRONMENT THAT PROMOTES COMMITMENT, TRUST, COMMUNICATION AND DEDICATION. THIS APPROACH AIDS KNOWLEDGE TRANSFER, HELPING IDENTIFY MARKET OPPORTUNITIES, INNOVATE CUSTOMER-ORIENTED SOLUTIONS AND CO-CREATE VALUE, ULTIMATELY BOOSTING MARKET SHARE. FURTHERMORE, ALIGNING INDIVIDUALS WITH ORGANIZATIONAL VALUES ENHANCES KNOWLEDGE TRANSFER AND ETHICAL PRACTICES, DRIVING MARKETING INNOVATION AND INCREASING CUSTOMER SATISFACTION.ORIGINALITY/VALUEIN TURBULENT MARKETS, COMPANIES MUST INTRODUCE QUALITY, RELIABLE PRODUCTS. HOWEVER, SHORTENED PRODUCT LIFE CYCLES AND FASTER NEW PRODUCT INTRODUCTIONS CAN LEAD TO SUPPLY FAILURES WITHOUT NEW MARKETING METHODS. THIS RESEARCH AIMS TO IDENTIFY FACTORS INFLUENCING EM AS AN INNOVATIVE APPROACH THROUGH ORGANIZATIONAL CAPABILITIES. THIS STUDY CONTRIBUTES TO THE LITERATURE BY INTEGRATING RL, EC, KNOWLEDGE TRANSFER AND P-O FIT WITHIN THE EM FRAMEWORK, OFFERING INSIGHTS INTO HOW LEADERSHIP CAN SHAPE EFFECTIVE MARKETING STRATEGIES.", "author": "KHASMAFKAN-NEZAM MH", "author_full_names": "MOHAMMAD HOSSEIN KHASMAFKAN-NEZAM", "country": "IRAN"}, {"id": "KHASMAFKAN-NEZAM M, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "KHASMAFKAN-NEZAM M, 2025", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 32.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CORREA V, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE INFLUENCE OF CAUSAL AND EFFECTUAL ENTREPRENEURSHIP ON THE DIMENSIONS OF ENTREPRENEURIAL MARKETING: AN EXPLORATORY STUDY OF WOMEN ENTREPRENEURS IN BRAZIL", "year": 2025, "journal": "INTERNATIONAL JOURNAL OF GENDER AND ENTREPRENEURSHIP", "source_title": "", "doi": "10.1108/IJGE-04-2025-0140", "internal_indegree": 0.0, "internal_outdegree": 30.0, "sap_rank": 180512084.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE  ALTHOUGH THE LITERATURE HAS EXAMINED THE RELATIONSHIP BETWEEN ENTREPRENEURSHIP AND ENTREPRENEURIAL MARKETING (EM), THE THEORETICAL INFLUENCE OF THE FOUR DIMENSIONS AND FIVE PRINCIPLES OF CAUSAL AND EFFECTUAL BEHAVIOR ON THE SEVEN DIMENSIONS OF EM REMAINS UNCLEAR. THIS EXPLORATORY STUDY INVESTIGATES HOW THE FOUR CAUSAL ENTREPRENEURSHIP DIMENSIONS AND FIVE EFFECTUAL ENTREPRENEURSHIP PRINCIPLES INFLUENCE THE SEVEN DIMENSIONS OF EM. DESIGN/METHODOLOGY/APPROACH  THIS STUDY EMPLOYS A QUALITATIVE, INTEGRATED, MULTIPLE-CASE STUDY DESIGN. EIGHT BRAZILIAN WOMEN ENTREPRENEURS PARTICIPATED IN THIS STUDY. FINDINGS  WOMEN ENTREPRENEURS LEVERAGE THEIR RESOURCES THROUGH BOTH CAUSAL AND EFFECTUAL BEHAVIORS. HOWEVER, THEY TEND TO INNOVATE AND EXPLORE NEW MARKETS LESS FREQUENTLY. THEIR EFFECTUAL INITIATIVES ARE PARTICULARLY NOTICEABLE IN THEIR PROACTIVE BEHAVIOR. ADDITIONALLY, THERE IS A BALANCED RELATIONSHIP BETWEEN PLANNED AND UNPLANNED PRACTICES WITH RESPECT TO VALUE CREATION AND CUSTOMER ENGAGEMENT. ORIGINALITY/VALUE  THIS STUDY ELUCIDATES THE UNDER-THEORIZED MECHANISMS OF EM BY EXAMINING HOW CAUSAL AND EFFECTUAL BEHAVIORS SHAPE ITS SEVEN DIMENSIONS. IN DOING SO, IT ALLOWS FOR THREE KEY CONTRIBUTIONS TO THE LITERATURE. FIRST, BOTH CAUSAL AND EFFECTUAL BEHAVIORS INFLUENCE EM DIMENSIONS DISTINCTLY, UNDERSCORING THE NEED TO CONSIDER BOTH TYPES FOR A COMPREHENSIVE UNDERSTANDING OF EM. SECOND, THIS STUDY IDENTIFIES WHICH DIMENSIONS OF CAUSAL BEHAVIOR AND WHICH PRINCIPLES OF EFFECTUAL BEHAVIOR MOST STRONGLY AFFECT EACH OF THE SEVEN EM DIMENSIONS, PROVIDING NEW INSIGHTS INTO THEORETICAL AND EMPIRICAL RELATIONSHIPS THAT HAVE NOT YET BEEN EXAMINED. FINALLY, WE PROPOSE FUTURE RESEARCH AGENDAS TO EXPLORE THIS FIELD AND ADDRESS THESE GAPS IN THE LITERATURE.  2026 EMERALD PUBLISHING LIMITED", "author": "CORREA V.S.; DELMIRO CAPELI C.M.; NASSIF V.M.J.", "author_full_names": "VICTOR SILVA CORREA; CARLA MARIELI DELMIRO CAPELI; VANIA MARIA JORGE NASSIF", "country": "BRAZIL; BRAZIL"}, {"id": "TIAN HY, 2025, J COMPETITIVENESS", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "DATA-DRIVEN DISRUPTIVE COMPETITIVENESS: EXPLORING THE ROLE OF BIG DATA ANALYTICS CAPABILITY AND ENTREPRENEURIAL MARKETING IN DISRUPTIVE INNOVATION", "year": 2025, "journal": "JOURNAL OF COMPETITIVENESS", "source_title": "J COMPETITIVENESS", "doi": "10.7441/joc.2025.01.12", "internal_indegree": 0.0, "internal_outdegree": 29.0, "sap_rank": 231050002.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "BIG DATA ANALYTICS CAPABILITY HAS GARNERED SIGNIFICANT ATTENTION IN BOTH ACADEMIC AND MANAGERIAL CIRCLES AS A MAJOR DRIVER OF INNOVATION-DRIVEN COMPETITIVE ADVANTAGE. HOWEVER, THE EXISTING LITERATURE ON THE BDAC-INNOVATION RELATIONSHIP IS STILL INCONCLUSIVE, WITH INDUSTRY REPORTS HIGHLIGHTING THAT MANY FIRMS STRUGGLE TO DERIVE SIGNIFICANT VALUE FROM IT. ROOTED IN RESOURCE-BASED THEORY AND DYNAMIC CAPABILITIES, THIS STUDY EXAMINES THE ROLE OF BIG DATA ANALYTICS CAPABILITY IN DISRUPTIVE INNOVATION, CONSIDERING THE MEDIATION OF ENTREPRENEURIAL MARKETING, A STRATEGIC ORIENTATION REPRESENTING THE INTERFACE OF ENTREPRENEURSHIP AND MARKETING. THE PROPOSED RELATIONSHIPS ARE VALIDATED THROUGH THE ANALYSIS OF 216 MANUFACTURERS IN PAKISTAN USING PARTIAL LEAST SQUARES-BASED STRUCTURAL EQUATION MODELING. THE RESULTS REVEAL THAT BIG DATA ANALYTICS CAPABILITY POSITIVELY INFLUENCES BOTH ENTREPRENEURIAL MARKETING AND DISRUPTIVE INNOVATION, WHILE ENTREPRENEURIAL MARKETING ALSO POSITIVELY INFLUENCES DISRUPTIVE INNOVATION. MOREOVER, ENTREPRENEURIAL MARKETING FULLY MEDIATES THE RELATIONSHIP BETWEEN BIG DATA ANALYTICS CAPABILITY AND DISRUPTIVE INNOVATION. THESE FINDINGS HAVE SIGNIFICANT IMPLICATIONS FOR BOTH THEORY AND PRACTICE.", "author": "TIAN HY;ALI S;IQBAL S;AKHTAR S;ASHRAF SF;ALI S", "author_full_names": "TIAN, HONGYUN;ALI, SHABAHAT;IQBAL, SHUJA;AKHTAR, SHAMIM;ASHRAF, SHEIKH FARHAN;ALI, SADAQAT", "country": "CHINA; CHINA; UNITED KINGDOM; PAKISTAN"}, {"id": "NEILL S, 2025, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE INTEGRATION OF ENTREPRENEURIAL MARKETING PROCESSES AND CONTROLS", "year": 2025, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "source_title": "J RES MARK ENTREP", "doi": "10.1108/JRME-06-2024-0138", "internal_indegree": 0.0, "internal_outdegree": 27.0, "sap_rank": 25191685.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSETHIS STUDY AIMS TO EXPLORE THE EVOLVING RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING (EM) PROCESSES AND CONTROL MECHANISMS ACROSS THREE PHASES OF OPPORTUNITY DEVELOPMENT: EXPLORATION, EVALUATION AND EXPLOITATION. BY EXAMINING HOW CONTROL MECHANISMS RESPOND TO THE UNCERTAINTIES INHERENT IN EACH PHASE, THIS RESEARCH ILLUSTRATES HOW CONTROLS EMERGE AND ADAPT, ENABLING ENTREPRENEURS TO EFFECTIVELY NAVIGATE THE CHALLENGES SPECIFIC TO EACH STAGE OF THEIR VENTURE'S GROWTH.DESIGN/METHODOLOGY/APPROACHUSING A QUALITATIVE, INDUCTIVE APPROACH, THIS STUDY USES SEMISTRUCTURED INTERVIEWS WITH FOUNDERS OF NINE HIGH-GROWTH, EARLY-STAGE STARTUPS BASED IN CALIFORNIA. THE SELECTED VENTURES VARY BY INDUSTRY AND BUSINESS MODEL BUT SHARE EARLY MARKET TRACTION. THE GIOIA METHODOLOGY, A STRUCTURED INDUCTIVE APPROACH FOR THEME DEVELOPMENT, GUIDES DATA ANALYSIS, REVEALING HOW CONTROL MECHANISMS EVOLVE TO ADDRESS THE CHALLENGES OF EACH EM PHASE.FINDINGSCONTROLS ADAPT ACROSS THE EM PHASES, BECOMING PROGRESSIVELY STRUCTURED TO MANAGE UNCERTAINTIES. IN THE EXPLORATION PHASE, CONTROLS ARE BELIEF-DRIVEN AND FLEXIBLE, GUIDING RESOURCE ALLOCATION AND FRAMING OPPORTUNITY SPACES. DURING EVALUATION, CONTROLS BECOME MORE STRUCTURED, ALIGNING MARKET FEEDBACK WITH PRODUCT-MARKET FIT. IN THE EXPLOITATION PHASE, CONTROLS FOCUS ON SCALABILITY AND EFFICIENCY, SUPPORTING ALIGNMENT BETWEEN STRATEGIC OBJECTIVES AND OPERATIONAL CAPABILITIES.ORIGINALITY/VALUETHIS RESEARCH PROVIDES NOVEL INSIGHTS BY DEMONSTRATING THAT CONTROLS DO NOT STIFLE OPPORTUNITY DEVELOPMENT BUT RATHER EVOLVE WITH IT. THE FINDINGS CONTRIBUTE TO THEORY AND PRACTICE AT THE MARKETING/ENTREPRENEURSHIP INTERFACE, OFFERING A NUANCED UNDERSTANDING OF THE ROLE OF CONTROLS IN SUPPORTING THE EM PROCESS.", "author": "NEILL S;DANG L", "author_full_names": "STERN NEILL; LI DANG", "country": "UNITED STATES"}, {"id": "KHASMAFKAN-NEZAM M, 2025, VINE J INFORM KNOWL MANAG", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "KHASMAFKAN-NEZAM M, 2025, VINE J INFORM KNOWL MANAG", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 27.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "ALFORD P, 2025, INT J ENTREP BEHAV R", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "DIGITAL ENTREPRENEURIAL MARKETING BRICOLAGE: SHAPING TECHNOLOGY-IN-PRACTICE", "year": 2025, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURIAL BEHAVIOR & RESEARCH", "source_title": "INT J ENTREP BEHAV R", "doi": "10.1108/IJEBR-07-2024-0746", "internal_indegree": 0.0, "internal_outdegree": 25.0, "sap_rank": 596740707.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE THE USE OF DIGITAL MARKETING TECHNOLOGIES REMAINS LOW IN SMALL MEDIUM ENTERPRISES (SMES), WITH DIGITAL TRANSFORMATION BEING A CONCERN FOR GOVERNMENTS GLOBALLY. THIS STUDY REPORTS ON THE HUMAN-TECHNOLOGY INTERACTION PROCESS, USING DIGITAL ENTREPRENEURIAL MARKETING (DEM) BRICOLAGE AND A SOCIOMATERIALITY LENS TO EXAMINE MORE DEEPLY ORGANISATIONAL INTERACTION BETWEEN MARKETERS AND DIGITAL MARKETING TECHNOLOGIES IN THESE FIRMS.DESIGN/METHODOLOGY/APPROACH A QUALITATIVE CASE STUDY AND PURPOSIVE SAMPLING APPROACH ARE DEPLOYED, USING SEVEN SMES IN THE SAME UK REGION. A BRICOLAGE AND SOCIOMATERIALITY FRAMEWORK AND TEMPLATE ANALYSIS ARE USED TO IDENTIFY DIGITAL MARKETING STRATEGIES AND CHALLENGES, LEVELS OF DIGITAL MARKETING BRICOLAGE AND ASSESS THE VALUE FOR EACH FIRM.FINDINGS FIRMS PRACTICE DIFFERENT LEVELS OF DEM BRICOLAGE DEPENDING ON THE INTERACTIONS OF THE MARKETERS WITH DIGITAL MARKETING TOOLS. THOSE MARKETERS IN FIRMS WHO HAD HIGHER LEVELS OF INTERACTION BETWEEN THE HUMAN AND THE TECHNOLOGICAL PROVIDED GREATER LONG-TERM STRATEGIC VALUE FOR THE SME.ORIGINALITY/VALUE THIS IS THE FIRST STUDY TO APPLY A SOCIOMATERIALITY LENS TO BRICOLAGE IN AN SME DIGITAL MARKETING CONTEXT AND ALLOWS US TO VIEW THE WAY IN WHICH EMPLOYEES INTERACT WITH DIGITAL MARKETING TECHNOLOGY AND CREATE VALUE. THERE IS SCARCE EMPIRICAL DATA IN THIS AREA DESPITE NUMEROUS CALLS IN THE DEVELOPING FIELD OF ENTREPRENEURSHIP AND DIGITALISATION IN SMALL AND GROWING FIRMS.", "author": "ALFORD P;JONES R", "author_full_names": "PHILIP ALFORD; ROSALIND JONES", "country": "UNITED KINGDOM; UNITED KINGDOM"}, {"id": "MIRZAYI S, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HOW GENERATIVE AI IS RESHAPING ENTREPRENEURIAL MARKETING", "year": 2025, "journal": "JOURNAL OF MARKETING THEORY AND PRACTICE", "source_title": "", "doi": "10.1080/10696679.2025.2571634", "internal_indegree": 0.0, "internal_outdegree": 24.0, "sap_rank": 35310325.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "ENTREPRENEURIAL MARKETING (EM) EMPHASIZES INNOVATION, AGILITY, AND RESOURCEFULNESS IN UNCERTAIN MARKETS. WHILE ARTIFICIAL INTELLIGENCE HAS ALREADY DISRUPTED TRADITIONAL MARKETING, RECENT ADVANCES IN GENERATIVE AI (GENAI) PROMISE A MORE PROFOUND TRANSFORMATION BEYOND AUTOMATED CONTENT PRODUCTION AND PERSONALIZATION. BY ADDRESSING A KEY GAP IN THE EXISTING LITERATURE, THIS RESEARCH CONTRIBUTES TO A DEEPER UNDERSTANDING OF THE MULTIFACETED APPLICATIONS OF GENAI IN EM, OFFERING A COMPREHENSIVE PERSPECTIVE ON ITS POTENTIAL TO RESHAPE THE MARKETING LANDSCAPE. THIS PAPER PRESENTS AN INTEGRATED CONCEPTUAL FRAMEWORK THAT EXPLORES THE GENAI ROLE WITHIN EM BY LEVERAGING THE OMNIHOUSE MODEL, WHICH DECONSTRUCTS EM INTO OPPORTUNITY-SEEKING, RISK-TAKING, AND NETWORK COLLABORATION.  2025 TAYLOR & FRANCIS GROUP, LLC.", "author": "MIRZAYI S.; NOBARI N.", "author_full_names": "SAHAR MIRZAYI; NILOOFAR NOBARI", "country": "IRAN; IRAN"}, {"id": "SARABDEEN J, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SAUDI ARABIAN LEGAL FRAMEWORK ON THE USE OF SOCIAL MEDIA IN ENTREPRENEURIAL MARKETING", "year": 2025, "journal": "SOCIAL SCIENCES AND HUMANITIES OPEN", "source_title": "", "doi": "10.1016/J.SSAHO.2025.102242", "internal_indegree": 0.0, "internal_outdegree": 24.0, "sap_rank": 130605.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "ENTREPRENEURIAL MARKETING (EM) IS A TYPE OF MARKETING WHERE ENTREPRENEURS PROACTIVELY EXPLORE AND IDENTIFY CUSTOMERS AND RETAIN THEM USING INNOVATION. LIMITED RESOURCES, EXPERTISE, AND FUNDING DRIVE MANY ENTREPRENEURS TOWARDS EM. AS AN INTEGRAL PART OF EM, ENTREPRENEURS USE SOCIAL MEDIA, THOUGH IT BRINGS SOME LEGAL RISKS. THUS, THIS RESEARCH TRIED TO ANALYZE THE LAWS THAT ENTREPRENEURS SHOULD UNDERSTAND BEFORE EMBARKING ON EM IN SAUDI ARABIA. THE OBJECTIVE OF THE STUDY IS TO ASSESS THE APPLICABLE LAW IN THE USE OF SOCIAL MEDIA FOR EM AND ADVISE THE BUSINESS ON THE ACCEPTABLE USE OF SOCIAL MEDIA IN EM USING A SYSTEMATIC ANALYSIS OF LAW AND LEGAL CONTENT ANALYSIS. THE RESEARCH USED A SYSTEMATIC LITERATURE REVIEW TO DERIVE AND UNDERSTAND THEMES, CONTENT, AND GAPS IN THE LITERATURE. IT ALSO USED LEGAL CONTENT ANALYSIS TO IDENTIFY, INTERPRET, AND ANALYZE THE LAWS AND RULES, AND SUBSEQUENTLY ADVISE THE BUSINESSES THAT ARE USING SOCIAL MEDIA IN EM. THE FINDING SUGGESTED A LACK OF LITERATURE ON THE USE OF SOCIAL MEDIA IN EM AND THE LAWS THAT REGULATE EM IN SAUDI ARABIA. THE LEGAL CONTENT REVEALED THAT MARKETERS NEED TO PLAN THEIR MARKETING MATERIAL, CONTENT, AND INFLUENCERS TO AVOID LEGAL RISKS. THEY ALSO NEED TO CAREFULLY ASSESS THE COMPETITION STRATEGIES AND LICENSING REGIME. ANY VIOLATION COULD LEAD TO CIVIL AND CRIMINAL LIABILITIES. THE RESEARCH FILLED THE GAP ON THE ISSUE RELATED TO THE LEGAL RISK INVOLVED IN USING SOCIAL MEDIA FOR EM. THE ARTICLE SUGGESTED VARIOUS POLICIES AND PRACTICE GUIDELINES TO ADDRESS INTELLECTUAL PROPERTY RIGHTS, COMPETITION, DIGITAL CONTENT, AND E-COMMERCE.  2025 THE AUTHOR.", "author": "SARABDEEN J.", "author_full_names": "JAWAHITHA SARABDEEN", "country": "SAUDI ARABIA"}, {"id": "ALFORD P, 2025, INT J ENTREP BEHAV RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ALFORD P, 2025, INT J ENTREP BEHAV RES", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 24.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "LU H, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "EXPLORE THE IMPORTANCE OF COMPETITIVE STRATEGY TO ENTREPRENEURIAL MARKETING AND BUSINESS PERFORMANCE", "year": 2025, "journal": "JOURNAL OF THE INTERNATIONAL COUNCIL FOR SMALL BUSINESS", "source_title": "", "doi": "10.1080/26437015.2025.2513961", "internal_indegree": 0.0, "internal_outdegree": 21.0, "sap_rank": 17025294.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "DRAWING ON SURVEY DATA FROM 306 ENTREPRENEURS, THIS STUDY INVESTIGATES HOW INDIVIDUAL ENTREPRENEURIAL MARKETING DIMENSIONS SHAPE THE COMPETITIVE STRATEGIES OF SMALL FIRMS AND, CONSEQUENTLY, THEIR PERFORMANCE. THE RESULTS UNDERSCORE THE PIVOTAL ROLE OF INNOVATIVE MARKETING, PROACTIVE MARKETING, AND NETWORK ATTENTION IN THE DIFFERENTIATION STRATEGY, AND THE SIGNIFICANT INFLUENCE OF INNOVATIVE MARKETING, OPPORTUNITY FOCUS, RESOURCE LEVERAGING, AND RISK ACCEPTANCE ON THE COST LEADERSHIP STRATEGY. FURTHERMORE, BOTH DIFFERENTIATION AND COST LEADERSHIP STRATEGY SIGNIFICANTLY ENHANCE CORPORATE PERFORMANCE, WITH THE LATTER EXERTING A STRONGER IMPACT. MORE IMPORTANTLY, THE IMPACT OF COMPETITIVE STRATEGY ON PERFORMANCE OUTWEIGHS THE DIRECT RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING AND PERFORMANCE. THESE FINDINGS HAVE SIGNIFICANT IMPLICATIONS FOR SMALL BUSINESS MANAGEMENT AND PROVIDE ACTIONABLE INSIGHTS FOR PRACTITIONERS IN THE FIELD OF STRATEGIC ENTREPRENEURIAL MARKETING.  2025 INTERNATIONAL COUNCIL FOR SMALL BUSINESS.", "author": "LU H.-T.; WANG Y.-C.", "author_full_names": "HAO‐TE LU; ALVIN YI-CHOU WANG", "country": "TAIWAN; TAIWAN"}, {"id": "BOOPATHI M, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING: ANALYZING THE EFFECTS OF SOCIAL MEDIA MARKETING ON BUSINESS ENTERPRISE PERFORMANCE", "year": 2025, "journal": "JOURNAL OF MARKETING COMMUNICATIONS", "source_title": "", "doi": "10.1080/13527266.2025.2590533", "internal_indegree": 0.0, "internal_outdegree": 17.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE MOST IMPORTANT BREAKTHROUGHS FOR THE COMPANY OVER THE LAST DECADES ARE ONLINE BUSINESS MARKETING. IN SOCIAL MEDIA MARKETING, DUE TO ITS INTRICACY AND MULTIDIMENSIONALITY, TRUST HAS HISTORICALLY BEEN A PHRASE THAT HAS BEEN CHALLENGING TO QUANTIFY AND DEFINE. DESPITE THE INCREASING GROWTH OF COMMERCIAL WEBSITES, MANY CONSUMERS THINK THAT DOING BUSINESS ONLINE IS RISKIER THAN DOING IT OFFLINE. ENTREPRENEURIAL MARKETING IS AN ADVERTISING TACTICS THAT OFFER ENTREPRENEURS A MEANS TO EFFICIENTLY MANAGE THEIR FIRMS ON A TIGHT BUDGET. BECAUSE OF SOCIAL MEDIA, BUSINESSES NOW OPERATE VERY DIFFERENTLY. THIS RESEARCH EXPLORES THE SOCIAL MEDIA MARKETING STRATEGIES INFLUENCING BUSINESS ENTERPRISES PERFORMANCE. THE MARKETING STRATEGIES OF ENTREPRENEURS WERE STUDIED USING THE CRITERIA SUCH AS CUSTOMER FOCUS, INNOVATIVENESS, PROACTIVE APPROACH AND VALUE CREATION. IN ADDITION, THERE ARE TWO ESSENTIAL PORTIONS IN THIS STUDY PAPER. THE FIRST SECTION IS DATA COLLECTION, WHICH INCLUDES A PRIMARY DATA SOURCE. THE INFORMATION OF THE STUDY WAS OBTAINED FROM UTTAR PRADESHS BUSINESS OWNERS BY EMPLOYING A STANDARDISED QUESTIONNAIRE. TO OBTAIN THE DESIRED FINDINGS, SEM ANALYSIS WAS CONDUCTED USING DATA ACQUIRED FROM THE RELEVANT AUTHORITIES.  2025 INFORMA UK LIMITED, TRADING AS TAYLOR & FRANCIS GROUP.", "author": "BOOPATHI M.; SHARMA N.; RAJ R.; PATIL P.S.; DHAMIJA A.", "author_full_names": "MYTHILI BOOPATHI; NIHARIKA SHARMA; ROOP RAJ; PRASHANT PATIL; ARUNA DHAMIJA", "country": "INDIA; INDIA; INDIA; INDIA; INDIA"}, {"id": "ISTREFI A, 2025, INT J TECHNOL ENHANC", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE ROLE OF ENTREPRENEURIAL MARKETING AND DIGITAL TRANSFORMATION ON WOMEN'S ENTREPRENEURIAL INTENTIONS IN KOSOVO", "year": 2025, "journal": "INTERNATIONAL JOURNAL OF TECHNOLOGY ENHANCED LEARNING", "source_title": "INT J TECHNOL ENHANC", "doi": "10.1504/IJTEL.2025.145315", "internal_indegree": 0.0, "internal_outdegree": 13.0, "sap_rank": 1375913.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS STUDY AIMED TO EXPLORE HOW DIGITAL TRANSFORMATION AND ENTREPRENEURIAL MARKETING AFFECT WOMEN BUSINESS OWNERS IN AN EMERGING COUNTRY. THE OBTAINED DATA FROM BUSINESS OWNERS WERE ANALYSED USING THE STRUCTURAL EQUATION MODEL (SEM) TO DETERMINE HOW FOUR DIMENSIONS OF ENTREPRENEURIAL MARKETING, TOGETHER WITH DIGITAL TRANSFORMATION, AFFECT FIRM PERFORMANCE. THE RESEARCH SHOWS A STRONG LINK BETWEEN THE ROLE OF ENTREPRENEURIAL MARKETING (EM) ON WOMEN'S ENTREPRENEURIAL INTENTIONS AND A MODERATE EFFECT OF DIGITAL TRANSFORMATION (DT) ON WOMEN'S ENTREPRENEURIAL INTENTIONS. THE STUDY ADVANCES KNOWLEDGE AND PROVIDES A CLEARER UNDERSTANDING OF HOW ENTREPRENEURIAL MARKETING INFLUENCES WOMEN'S ENTREPRENEURIAL INTENTIONS. FUTURE STUDIES SHOULD GO FURTHER INTO THESE TOPICS TO OFFER A MORE THOROUGH KNOWLEDGE OF THE INTERACTIONS BETWEEN ENTREPRENEURIAL MARKETING, DIGITAL TRANSFORMATION, AND WOMEN-LED BUSINESSES. TO OUR KNOWLEDGE, THIS IS THE FIRST STUDY TO EXPLORE THE ROLE OF ENTREPRENEURIAL MARKETING AND DIGITAL TRANSFORMATION ON WOMEN'S ENTREPRENEURIAL INTENTIONS IN AN EMERGING COUNTRY.", "author": "ISTREFI A;ZEQIRI J;HASANI VV;KOMODROMOS M", "author_full_names": "ARTA ISTREFI; JUSUF ZEQIRI; VJOLLCA VISOKA HASANI; MARCOS KOMODROMOS", "country": "KOSOVO; KOSOVO; CYPRUS"}, {"id": "AMADASUN O, 2025, SOUTH AFR J ENTREP SMALL BUS MANAG", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "AMADASUN O, 2025, SOUTH AFR J ENTREP SMALL BUS MANAG", "year": 2025, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 9.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SAXENA G, 2025", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "IDENTITY WORK AND ENTREPRENEURIAL MARKETING AMONG WOMEN ENTREPRENEURS IN VIETNAM: A POSTCOLONIAL FEMINIST PERSPECTIVE", "year": 2025, "journal": "GENDER, WORK AND ORGANIZATION", "source_title": "", "doi": "10.1111/GWAO.70087", "internal_indegree": 0.0, "internal_outdegree": 7.0, "sap_rank": 6371740.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS PAPER EXAMINES HOW ENTREPRENEURIAL MARKETING SHAPES AND IS SHAPED BY THE IDENTITY WORK OF WOMEN ENTREPRENEURS IN POSTCOLONIAL VIETNAM. DRAWING ON A POSTCOLONIAL FEMINIST FRAMEWORK AND 23 IN-DEPTH INTERVIEWS CONDUCTED ON UNICORN ISLAND IN THE MEKONG DELTA, THIS STUDY EXPLORES HOW WOMEN NAVIGATE GENDERED EXPECTATIONS, MORAL OBLIGATIONS AND SPIRITUAL BELIEFS IN THE CONSTRUCTION OF ENTREPRENEURIAL IDENTITIES. THE FINDINGS DEMONSTRATE THAT MARKETING OPERATES NOT MERELY AS A FUNCTIONAL BUSINESS ACTIVITY BUT AS A GENDERED AND CULTURALLY EMBEDDED PRACTICE THROUGH WHICH IDENTITY IS PERFORMED, NEGOTIATED AND LEGITIMIZED. THROUGH INFORMAL STRATEGIES SUCH AS STORYTELLING, THE MOBILIZATION OF SPIRITUAL SYMBOLISM, AND EMBODIED PERFORMANCES, WOMEN MARKET THEIR ENTERPRISES IN WAYS THAT FOREGROUND RELATIONALITY, MORALITY AND COMMUNITY BELONGING. THESE PRACTICES ENABLE WOMEN TO ESTABLISH ENTREPRENEURIAL CREDIBILITY WHILE SIMULTANEOUSLY RESISTING DOMINANT, INDIVIDUALIZED AND MASCULINIZED MODELS OF ENTREPRENEURIAL SUCCESS. BY CENTERING THE LIVED EXPERIENCES OF WOMEN IN THE GLOBAL SOUTH, THIS STUDY CONTRIBUTES TO POSTCOLONIAL FEMINIST DEBATES BY CONCEPTUALIZING ENTREPRENEURIAL MARKETING AS A KEY SITE OF GENDERED IDENTITY CONSTRUCTION WITHIN CULTURALLY AND SPIRITUALLY SITUATED CONTEXTS.  2025 JOHN WILEY & SONS LTD.", "author": "SAXENA G.", "author_full_names": "PUJA SAXENA", "country": "FRANCE"}, {"id": "AMADASUN OED, 2025, SO AFR J ENTREP SMAL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "EFFECT OF ENTREPRENEURIAL MARKETING ON SMES COMPETITIVE PERFORMANCE IN LESOTHO", "year": 2025, "journal": "SOUTHERN AFRICAN JOURNAL OF ENTREPRENEURSHIP AND SMALL BUSINESS MANAGEMENT (SAJESBM)", "source_title": "SO AFR J ENTREP SMAL", "doi": "10.4102/sajesbm.v17i1.889", "internal_indegree": 0.0, "internal_outdegree": 6.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "BACKGROUND: ENTREPRENEURIAL MARKETING (EM) IS AN IMPORTANT MARKET STRATEGIC CONCEPT THAT SMALL AND MEDIUM-SIZED ENTERPRISE (SME) OWNERS OR MANAGERS ADOPT AND PRACTISE TO DRIVE THEIR ENTERPRISES TO ATTAIN COMPETITIVE FINANCIAL PERFORMANCE. RECORDS INDICATE THAT IN THE PAST 20 YEARS LIMITED STUDIES HAVE FOCUSSED ON EM STRATEGIC CHALLENGES THAT THE BASOTHO SMES FACE IN LESOTHO. AIM: THIS STUDY AIMED TO DETERMINE THE EFFECT OF EM STRATEGIES (CUSTOMER RELATIONSHIP, STRATEGIC NETWORKING AND CUSTOMER SATISFACTION) ON THE COMPETITIVE FINANCIAL PERFORMANCE OF SMES IN SELECTED DISTRICTS OF LESOTHO. SETTING: THE DATA FOR THIS STUDY WERE COLLECTED FROM THE FOUR DISTRICTS OF BUTHA-BUTHE, LERIBE, MAFETENG AND MASERU IN LESOTHO, WHERE SME DISTRIBUTION IS HIGHER COMPARED TO OTHER DISTRICTS IN LESOTHO. METHODS: THE DESCRIPTIVE-CORRELATION RESEARCH DESIGN WAS ADOPTED USING THE QUESTIONNAIRE AS THE PRIMARY RESEARCH TOOL FOR THE DATA COLLECTION IN THE FOUR SELECTED DISTRICTS, AND THE DATA WERE ANALYSED USING DESCRIPTIVE AND INFERENTIAL STATISTICS. RESULTS: THE THREE PREDICTORS (CUSTOMER RELATIONSHIP, STRATEGIC NETWORKING AND CUSTOMER SATISFACTION) OF THE EM ESTIMATES IDENTIFIED THAT EACH PREDICTOR STATISTICALLY CONTRIBUTES SIGNIFICANTLY TO SMES' DYNAMIC MARKET OPERATION AND ATTAINING COMPETITIVE FINANCIAL PERFORMANCE. CONCLUSION: THE THREE FACTORS OF EM EXPLAIN WHY SME OWNERS OR MANAGERS SHOULD CONSIDER THE PREDICTORS AS CRITICAL AND SYNERGIC MARKET FACTORS THAT INFLUENCE THEIR ENTERPRISES TO ATTAIN COMPETITIVE FINANCIAL PERFORMANCE. CONTRIBUTION: THE RESULTS OF THIS STUDY SUGGEST (TO SME OWNERS, MANAGERS AND POLICYMAKERS) THAT THE THREE PREDICTORS OF EM ARE CRITICALLY IDIOSYNCRATIC AND HAVE A DISTINCTIVE INFLUENCE ON THE SMES' EFFECTIVE MARKET OPERATION AND ATTAINING COMPETITIVE FINANCIAL PERFORMANCE.", "author": "AMADASUN OED;MUTEZO AT", "author_full_names": "DONALD EDES OSAKPAMWAN AMADASUN; ASHLEY TEEDZWI MUTEZO", "country": "LESOTHO; SOUTH AFRICA"}, {"id": "EGGERS F, 2025, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING, TECHNOLOGY, AND TRANSFORMATIVE CHANGE: EDITORIAL AND INTRODUCTION TO THE SPECIAL ISSUE", "year": 2025, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "source_title": "J RES MARK ENTREP", "doi": "10.1108/JRME-03-2025-216", "internal_indegree": 0.0, "internal_outdegree": 5.0, "sap_rank": 328783.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE: THIS EDITORIAL, WRITTEN BY THE GUEST EDITORS, INTRODUCES THE SPECIAL ISSUE ON ENTREPRENEURIAL MARKETING, TECHNOLOGY, AND TRANSFORMATIVE CHANGE. THE GUEST EDITORS PROVIDE BACKGROUND INFORMATION ABOUT THE THEME OF THE SPECIAL ISSUE. THEY INTRODUCE A CONCEPTUAL FRAMEWORK WHICH CAPTURES THE FOUR PAPERS OF THE SPECIAL ISSUE, BEFORE SUMMARIZING THEM. THE EDITORIAL CLOSES WITH A CONCLUSION. DESIGN/METHODOLOGY/APPROACH: THE INITIAL CALL FOR PAPERS FOR THIS SPECIAL ISSUE WENT OUT IN 2023. THE GUEST EDITORS RECEIVED 19 SUBMISSIONS. FOUR PAPERS PASSED ALL ROUNDS OF THE INDEPENDENT REVIEW PROCESS AND WERE ULTIMATELY ACCEPTED FOR PUBLICATION. THE GUEST EDITORS ORGANIZE THE FOUR PAPERS IN A COMPREHENSIVE FRAMEWORK AND SUMMARIZE THEM. FINALLY, THE GUEST EDITORS PROVIDE CONCLUSIONS. FINDINGS: THE GUEST EDITORIAL DESCRIBES HOW THE FOUR PAPERS FIT INTO A CONCEPTUAL FRAMEWORK, ADDRESSING RESEARCH QUESTIONS WITH A FOCUS ON ENTREPRENEURIAL MARKETING MINDSETS, PROCESSES AND/OR BEHAVIORS IN THE CONTEXT OF TECHNOLOGICAL ADVANCEMENTS AND TRANSFORMATIVE CHANGE. THE PAPERS PROVIDE IMPLICATIONS FOR DIFFERENT STAKEHOLDERS IN THE ENTREPRENEURIAL ECOSYSTEM. SPECIFICALLY, THEY DISCUSS HOW TECHNOLOGY HELPS ENTREPRENEURS AND NEW VENTURES ADAPT TO CHANGES IN THE ENTREPRENEURIAL ECOSYSTEM OR HOW TECHNOLOGY CAN ENACT CHANGES IN THESE SYSTEMS. ORIGINALITY/VALUE: BESIDES PROVIDING A CONCEPTUAL FRAMEWORK AND AN INTRODUCTION TO THE SPECIAL ISSUE, THIS GUEST EDITORIAL ALSO SUMMARIZES THE PAPERS APPEARING IN THE SPECIAL ISSUE. THE GUEST EDITORS PROVIDE INFORMATION ABOUT THE KEY FINDINGS OF THE FOUR PAPERS AND THE MAJOR IMPLICATIONS FOR ENTREPRENEURIAL MARKETING RESEARCH.  2025, EMERALD PUBLISHING LIMITED.", "author": "EGGERS F.; SEIFERT R.; FRISKE W.M.", "author_full_names": "FABIAN EGGERS; R. SEIFERT; WESLEY FRISKE", "country": "UNITED STATES; PAKISTAN; UNITED STATES"}, {"id": "ROY J, 2025, ARCH TECH SCI", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING AND INNOVATION CAPABILITIES IN HIGH TECHNOLOGY STARTUPS IN EMERGING ECONOMIES", "year": 2025, "journal": "ARCHIVES FOR TECHNICAL SCIENCES", "source_title": "ARCH TECH SCI", "doi": "10.70102/afts.2025.1834.341", "internal_indegree": 0.0, "internal_outdegree": 4.0, "sap_rank": 200713699.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "EMERGING ECONOMIES HAVE A DYNAMIC AND CHALLENGING BUSINESS ENVIRONMENT, WHICH REQUIRES ENTREPRENEURIAL MARKETING AND INNOVATION CAPABILITIES OF THE HIGH-TECH STARTUPS. SUCH STARTUPS ARE USUALLY FACED WITH ISSUES OF LACK OF RESOURCES, REGULATION AND LACK OF PROPER INFRASTRUCTURE. IN THIS REGARD, IT IS IMPORTANT TO COMBINE ENTREPRENEURIAL MARKETING PRACTICES, WHICH INVOLVE RECOGNITION OF OPPORTUNITIES, SENSING OF THE MARKET, INTERACTION WITH CUSTOMERS, AND RISK-TAKING, WITH INNOVATION COMPETENCIES. STARTUPS ARE ABLE TO INTRODUCE NEW SERVICES, PRODUCTS AND SOLUTIONS USING INNOVATION CAPABILITIES, WHICH INCLUDE TECHNOLOGICAL DEVELOPMENT, RESEARCH AND DEVELOPMENT (R&D), KNOWLEDGE MANAGEMENT AND ADAPTIVE LEARNING PROCESSES TO CREATE A COMPETITIVE ADVANTAGE IN THE LONG TERM. THIS PAPER WILL SEEK TO INVESTIGATE THE CONNECTION BETWEEN ENTREPRENEURIAL MARKETING AND INNOVATION CAPABILITIES, HOW THE TWO ELEMENTS CAN BE USED TO MOTIVATE THE PERFORMANCE OF THE HIGH-TECH STARTUPS IN THE EMERGING MARKETS. THE STUDY IS FOUNDED UPON QUANTITATIVE AND QUALITATIVE DATA GATHERING AMONG HIGH-TECH STARTUPS FOUNDERS, CEOS, AND KEY MANAGERS OF 150 STARTUPS LOCATED IN DIFFERENT EMERGING ECONOMIES. THERE WAS THE COLLECTION OF QUANTITATIVE INFORMATION IN THE FORM OF LIKERT SCALE SURVEYS WHICH MEASURED MARKETING PRACTICES IN ENTREPRENEURSHIP, INNOVATION CAPABILITIES AND EXTERNAL INFLUENCES OF GOVERNMENT SUPPORT AND EXTERNAL NETWORKS. SEMI-STRUCTURED INTERVIEWS WERE USED TO ACHIEVE QUALITATIVE DATA TO OBTAIN A MORE INSIGHT INTO THE ROLE PLAYED BY MARKETING STRATEGIES IN FACILITATING INNOVATION AND THE CHALLENGES INVOLVED IN APPLYING THESE STRATEGIES IN A RESOURCE-LIMITED CONTEXT. THE SPSS AND R WERE USED TO CONDUCT STAT

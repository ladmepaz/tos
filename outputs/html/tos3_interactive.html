ISTICAL ANALYSIS IN EXAMINING THE RELATIONSHIPS BETWEEN THE VARIABLES. THE RESULTS SHOWED THAT THERE EXISTED STRONG POSITIVE RELATIONSHIPS BETWEEN ENTREPRENEURIAL MARKETING PRACTICES AND INNOVATION CAPABILITIES, AND CUSTOMER ENGAGEMENT HAD THE GREATEST RELATIONSHIP WITH PRODUCT INNOVATION (0.80) AND TECHNOLOGICAL INNOVATION (0.72). THE REGRESSION SHOWED THAT ENTREPRENEURIAL MARKETING IS A SIGNIFICANT PREDICTOR OF INNOVATION PERFORMANCE, WITH MARKET ORIENTATION AND CUSTOMER ENGAGEMENT AS THE MOST IMPORTANT ONES. ALSO, MODERATION ANALYSIS IN SPSS THROUGH THE PROCESS MACRO DEMONSTRATED THAT GOVERNMENT SUPPORT AND EXTERNAL NETWORKS HAD A SIGNIFICANT MODERATING EFFECT ON THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING AND INNOVATION CAPABILITIES, WHERE EXTERNAL NETWORKS HAD THE HIGHEST MODERATING EFFECT (0.45, P = 0.05). THE RESULTS SUPPORT THE RELEVANCE OF ENTREPRENEURIAL MARKETING AS AN AGENT OF INNOVATION CAPABILITIES IN HIGH-TECH STARTUPS IN EMERGING ECONOMIES.", "author": "ROY J;SEHGAL R", "author_full_names": "J.C. ROY; DR. RAJESH SEHGAL", "country": "INDIA"}, {"id": "WIJEKOON S, 2024, EUR J MARKETING", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE IMPACT OF ENTREPRENEURIAL MARKETING ON NEW VENTURE BRAND IMAGE AND PERFORMANCE: A CAPABILITY PERSPECTIVE", "year": 2024, "journal": "EUROPEAN JOURNAL OF MARKETING", "source_title": "EUR J MARKETING", "doi": "10.1108/EJM-07-2022-0568", "internal_indegree": 0.0, "internal_outdegree": 65.0, "sap_rank": 2049299868.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSETHIS STUDY AIMS TO EXAMINE THE UNDERLYING MECHANISMS THROUGH WHICH ENTREPRENEURIAL MARKETING (EM) PROMOTES THE DEVELOPMENT OF A FAVORABLE BRAND IMAGE AND ENHANCES SALES GROWTH AND MARKET SHARE IN NEW VENTURES (NVS).DESIGN/METHODOLOGY/APPROACHTHE AUTHORS TESTED THE THEORETICAL MODEL USING A MULTI-INFORMANT DESIGN IN WHICH SURVEY DATA WERE COLLECTED FROM NV ENTREPRENEURS AND MARKETING MANAGERS. HYPOTHESES WERE TESTED USING LINEAR REGRESSION AND PROCESS ANALYSIS.FINDINGSTHE AUTHORS DEMONSTRATE THE SIGNIFICANCE OF EM AS COMPRISING TWO NV CAPABILITIES - FIRST, THE LEVEL OF COMPLEMENTARITY BETWEEN ENTREPRENEURIAL ORIENTATION (EO) AND MARKET ORIENTATION (MO) AS A DYNAMIC CAPABILITY, AND SECOND, BRAND MANAGEMENT CAPABILITIES (BMCS) AS AN OPERATIONAL CAPABILITY - IN SHAPING A FAVORABLE NV BRAND IMAGE AND PROMOTING MARKET PERFORMANCE.RESEARCH LIMITATIONS/IMPLICATIONSTHE AUTHORS OFFER A NOVEL PERSPECTIVE BY DEMONSTRATING THAT EO AND MO YIELD COMPLEMENTARITIES IN DRIVING NVS' BMCS, WHICH, IN TURN, DRIVE BRAND IMAGE DEVELOPMENT AND MARKET PERFORMANCE FOR NVS. IN DOING SO, THE AUTHORS DEMONSTRATE NOVEL THEORETICAL IMPLICATIONS FOR THE RELEVANCE OF EM TO NV BRANDING, WHICH, TO DATE, HAS RECEIVED SCANT ATTENTION IN THE LITERATURE.PRACTICAL IMPLICATIONSTHE AUTHORS IDENTIFY A POTENTIAL AVENUE FOR ENTREPRENEURS AND NV MANAGERS TO MITIGATE THE POTENTIAL FAILURE RATES BY SIMULTANEOUSLY PURSUING A HIGHER LEVEL OF EO AND MO AND INVESTING IN BRAND-BUILDING ACTIVITIES. SUCH EFFORTS CAN HELP ENHANCE BRAND IMAGE, DRIVE SALES GROWTH AND FOSTER LONG-TERM SUCCESS.ORIGINALITY/VALUETO THE BEST OF THE AUTHORS' KNOWLEDGE, THIS STUDY IS THE FIRST TO INCLUDE BRAND CAPABILITIES AS AN ELEMENT OF EM, EXAMINE EM IN NV BRAND IMAGE DEVELOPMENT AND IDENTIFY THE ROLE OF EM CAPABILITIES RELEVANT TO NV BRAND BUILDING AND MARKET PERFORMANCE SIMULTANEOUSLY.", "author": "WIJEKOON S;O'CASS A;VESAL M", "author_full_names": "SAYURI WIJEKOON; ARON O’CASS; MAHDI VESAL", "country": "AUSTRALIA; AUSTRALIA; AUSTRALIA"}, {"id": "WIJEKOON S, 2024, EUR J MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "WIJEKOON S, 2024, EUR J MARK", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 64.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "OURAGINI I, 2024", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "OURAGINI I, 2024", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 63.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "YADAV A, 2024, J ORGAN CHANGE MANAG", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "DEVELOPING AND VALIDATING A SCALE FOR ENTREPRENEURIAL MARKETING ORIENTATIONS: EMICO FRAMEWORK AND ITS IMPACT ON BUSINESS PERFORMANCE IN STARTUPS", "year": 2024, "journal": "JOURNAL OF ORGANIZATIONAL CHANGE MANAGEMENT", "source_title": "J ORGAN CHANGE MANAG", "doi": "10.1108/JOCM-11-2023-0461", "internal_indegree": 0.0, "internal_outdegree": 60.0, "sap_rank": 11203019731.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSEALTHOUGH MARKETING IS ESSENTIAL FOR A FIRM'S SURVIVAL AND GROWTH, A SET OF ENTREPRENEURIAL STRATEGIC ORIENTATIONS MAY HELP IT GAIN A COMPETITIVE ADVANTAGE. ENTREPRENEURIAL MARKETING (EM) IS CRITICAL FOR GROWING BUSINESSES TO SUCCEED IN TODAY'S FAST-PACED INDUSTRY. THE PRESENT STUDY AIMS TO MEASURE THE ROLE OF EM ON THE BUSINESS PERFORMANCE (BP) OF INDIAN STARTUPS.DESIGN/METHODOLOGY/APPROACHFOR THIS PURPOSE, A THOROUGH LITERATURE REVIEW WAS CONDUCTED TO DEVELOP A SCALE FROM THE PROPOSED CONCEPTUAL FRAMEWORK - EMICO BY JONES AND ROWLEY (2009B). TO ASSESS THE RELIABILITY AND VALIDITY OF THE SCALE (62 ITEMS), THE DATA ARE ANALYZED BY EMPLOYING PARTIAL LEAST SQUARE-STRUCTURAL EQUATION MODELING (PLS-SEM).FINDINGSTHE SCALE IS EMPIRICALLY TESTED, AND THE RESULTS LEAD TO DISCUSSIONS. THE RESULTS SHOW THE POSITIVE IMPACT OF ENTREPRENEURIAL ORIENTATION (EO), MARKETING ORIENTATION (MO), INNOVATION ORIENTATION (IO) AND CUSTOMER ORIENTATION (CO) ON THE BP OF THE STARTUPS. THE PAPER CONCLUDES BY SUGGESTING MANAGERIAL AND PRACTICAL IMPLICATIONS, ALSO PROVIDING FUTURE RESEARCH AGENDA.ORIGINALITY/VALUEOUR OBJECTIVE IS TO ADDRESS THE EXISTING DEARTH OF COMPREHENSIVE SCALES FOR EVALUATING EM BY UNDERTAKING A RIGOROUS STATISTICAL APPROACH. NOTABLY, OUR RESEARCH REPRESENTS THE PIONEERING EFFORT IN ADOPTING THE EMICO FRAMEWORK AND SUBSEQUENTLY FORMULATING AND EMPIRICALLY VALIDATING A ROBUST SCALE SPECIFICALLY TAILORED FOR NASCENT OR SMALL-SCALE STARTUPS WITHIN THE INDIAN CONTEXT.", "author": "YADAV A;PAUL J;BANSAL S;TALAN A", "author_full_names": "ANSHITA YADAV; JUSTIN PAUL; SANCHITA BANSAL; AMOGH TALAN", "country": "INDIA; INDIA; UNITED STATES; INDIA; INDIA"}, {"id": "HANOUN D, 2024", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE MODERATING ROLE OF TECHNOLOGICAL TURBULENCE IN THE EFFECT OF ENTREPRENEURIAL MARKETING ON SMES' PERFORMANCE", "year": 2024, "journal": "WSEAS TRANSACTIONS ON BUSINESS AND ECONOMICS", "source_title": "", "doi": "10.37394/23207.2024.21.214", "internal_indegree": 0.0, "internal_outdegree": 57.0, "sap_rank": 68960105.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE GOAL OF THIS RESEARCH IS TO EXPLORE HOW ENTREPRENEURIAL MARKETING AFFECTS SMALL AND MEDIUM ENTERPRISES' PERFORMANCE IN JORDAN AND TO UNDERSTAND HOW TECHNOLOGICAL TURBULENCE CAN MEDIATE THE CORRELATION BETWEEN ENTREPRENEURIAL MARKETING AND SMALL AND MEDIUM ENTERPRISES' PERFORMANCE. THE RESEARCH CAN BE CLASSIFIED AS QUANTITATIVE, DESCRIPTIVE, AND CAUSE-EFFECT. MOREOVER, IT USES CONVENIENCE SAMPLING AND A CROSS-SECTION APPROACH TO GATHER DATA THROUGH A SURVEY. THE DATA WERE GATHERED FROM 211 OWNERS/MANAGERS, WHO WORK IN JORDANIAN SMES, PARTICULARLY THOSE WHO WORKED IN THE TECHNOLOGY INDUSTRY. DATA WERE ENTERED USING SPSS-25, AND THEN THE VALIDITY, NORMALITY, AND RELIABILITY WERE CHECKED BEFORE TESTING HYPOTHESES. THE FINDINGS SHOW THAT ENTREPRENEURIAL MARKETING AFFECTS SMALL AND MEDIUM ENTERPRISES' PERFORMANCE, WHERE STAKEHOLDER ORIENTATION IS RATED THE HIGHEST EFFECT, FOLLOWED BY OPPORTUNITY FOCUS AND VALUE CREATION RESPECTIVELY. CALCULATED RISK-TAKING, PRO-ACTIVENESS, RESOURCE LEVERAGING, INNOVATIVENESS, AND NETWORKING DO NOT AFFECT SMALL AND MEDIUM ENTERPRISES PERFORMANCE SIGNIFICANTLY. FURTHERMORE, RESULTS SHOWED THAT TECHNOLOGICAL TURBULENCE DID NOT ACT AS A MODERATE CORRELATION BETWEEN ENTREPRENEURIAL MARKETING AND SMALL AND MEDIUM ENTERPRISES' PERFORMANCE.  2024, WORLD SCIENTIFIC AND ENGINEERING ACADEMY AND SOCIETY. ALL RIGHTS RESERVED.", "author": "HANOUN D.; AL-HADDAD S.; SHARABATI A.-A.A.; AL-KHASAWNEH M.", "author_full_names": "DAREEN HANOUN; AHAFIG AL-HADDAD; ABDEL‐AZIZ AHMAD SHARABATI; MOHAMMAD HAMDI AL KHASAWNEH", "country": "JORDAN; JORDAN"}, {"id": "YADAV A, 2024, J ORGAN CHANGE MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "YADAV A, 2024, J ORGAN CHANGE MANAGE", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 57.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SULAIMAN M, 2024", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SULAIMAN M, 2024", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 45.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CHEN YH, 2024, SUSTAINABILITY-BASEL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE INNOVATIVE ENTREPRENEURIAL MARKETING JOURNEY AND SUSTAINABLE DEVELOPMENT OF SOUTHEAST ASIAN IMMIGRANTS", "year": 2024, "journal": "SUSTAINABILITY", "source_title": "SUSTAINABILITY-BASEL", "doi": "10.3390/su16072815", "internal_indegree": 0.0, "internal_outdegree": 42.0, "sap_rank": 178227893.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE SOUTHEAST ASIAN NEW IMMIGRANTS FACE SIGNIFICANT BARRIERS IN EMPLOYMENT DUE TO LANGUAGE AND CULTURAL DIFFERENCES, MAKING IT CHALLENGING FOR THEM TO FIND JOBS. CONSEQUENTLY, MANY SOUTHEAST ASIAN IMMIGRANTS HAVE TURNED TO ENTREPRENEURSHIP AS A MEANS TO ACHIEVE ECONOMIC INDEPENDENCE AND CONTRIBUTE TO THEIR FAMILY'S INCOME. THIS STUDY ADOPTS ENTREPRENEURIAL MARKETING (EM) AS A THEORETICAL LENS AND UTILIZES A PROCESS RESEARCH METHODOLOGY, BASED ON SEQUENTIALLY ORDERED EVENTS, TO EXPLORE THE ENTREPRENEURIAL JOURNEY OF IMMIGRANT MICRO AND SMALL TO MEDIUM-SIZED ENTERPRISES (SMES). EMPLOYING PURPOSIVE SAMPLING, TWENTY-TWO SOUTHEAST ASIAN IMMIGRANT ENTREPRENEURS WERE SELECTED FOR IN-DEPTH INTERVIEWS TO ENSURE DATA QUALITY THROUGH MULTIPLE DATA COLLECTION METHODS. THE RESEARCH DEVELOPED A DYNAMIC ADJUSTMENT MODEL AND MANAGEMENT MECHANISMS FOR THE ENTREPRENEURIAL MARKETING OF IMMIGRANT MICRO AND SMES. THESE FINDINGS NOT ONLY BRIDGE THEORETICAL GAPS IN IMMIGRANT ENTREPRENEURSHIP STRATEGY BUT ALSO DEEPEN THE ACADEMIC UNDERSTANDING OF THE DYNAMISM IN ENTREPRENEURIAL MARKETING. PRACTICALLY, THE OUTCOMES ASSIST IMMIGRANT MICRO AND SMALL BUSINESS ENTREPRENEURS IN DEVELOPING OPERATIONAL STRATEGIES AND SERVE AS A REFERENCE FOR GOVERNMENTAL UNITS IN CRAFTING IMMIGRANT POLICIES.", "author": "CHEN YH", "author_full_names": "YUHENG CHEN", "country": "TAIWAN"}, {"id": "TOLOSSA A, 2024, J INNOV ENTREPRENEURSHIP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "UNVEILING THE NEXUS: THE CRUCIAL ROLE OF COMPETITIVE ADVANTAGE IN BRIDGING ENTREPRENEURIAL MARKETING PRACTICES AND SUSTAINABLE FIRM PERFORMANCE IN SMALL AND MEDIUM ENTERPRISES", "year": 2024, "journal": "JOURNAL OF INNOVATION AND ENTREPRENEURSHIP", "source_title": "J INNOV ENTREPRENEURSHIP", "doi": "10.1186/S13731-024-00398-0", "internal_indegree": 0.0, "internal_outdegree": 42.0, "sap_rank": 1787593.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "STUDIES ABOUT ENTREPRENEURIAL MARKETING LINKED WITH COMPETITIVE ADVANTAGE AND SUSTAINABILITY IN SMES ARE LIMITED IN THE EXISTING LITERATURE. THIS STUDY THEREFORE AIMED TO INVESTIGATE THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING DIMENSIONS, FOCUSING ON THE MEDIATING ROLE OF COMPETITIVE ADVANTAGE, IN ENSURING THE SUSTAINABILITY OF FIRM PERFORMANCE. DESCRIPTIVE RESEARCH DESIGN COMBINED WITH EXPLANATORY RESEARCH TO EXAMINE THE RELATIONSHIPS; AND STRATIFIED SAMPLING WITH SIMPLE RANDOM SAMPLING TECHNIQUES TO SELECT THE ENTERPRISES WERE USED. DATA FROM 387 SMES IN OROMIA, ETHIOPIA WERE COLLECTED AND ANALYZED USING STRUCTURAL EQUATION MODELING (SEM). THE FINDINGS INDICATED SIGNIFICANT CONNECTIONS AMONG ENTREPRENEURIAL MARKETING PRACTICES, COMPETITIVE ADVANTAGE, AND SUSTAINABILITY OF FIRM PERFORMANCE, WITH COMPETITIVE ADVANTAGE PARTIALLY MEDIATING THE RELATIONSHIPS. THE FINDING ALSO UNDERLINED SMES THAT ARE ENTREPRENEURIAL, STRATEGIC, AND SOCIALLY RESPONSIBLE ARE BEST POSITIONED FOR LONG-TERM SUCCESS. PRACTICAL IMPLICATIONS SUGGESTED ALIGNING MARKETING PRACTICES WITH OVERALL STRATEGIES, OPTIMIZING RESOURCE USAGE, AND ENHANCING INNOVATION TO IMPROVE COMPETITIVE ADVANTAGE AND SUSTAIN FIRM PERFORMANCE. FROM A SOCIAL PERSPECTIVE, EMBRACING SUSTAINABLE PRACTICES COULD POSITIVELY IMPACT, EMPLOYMENT, ENVIRONMENTAL RESPONSIBILITY, ECONOMIC STABILITY, AND CONSUMER PERCEPTION. THE STUDY OFFERS VALUABLE INSIGHTS FOR ACADEMIA, POLICYMAKERS, AND PRACTITIONERS.  THE AUTHOR(S) 2024.", "author": "TOLOSSA A.T.; SINGH M.; GAUTAM R.K.", "author_full_names": "ABEBE TECHAN TOLOSSA; MANJIT SINGH; RAJ KUMAR GAUTAM", "country": "INDIA"}, {"id": "TOLOSSA AT, 2024, BUS STRATEGY DEV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "LINKING BUSINESS SUSTAINABLE DEVELOPMENT WITH ENTREPRENEURIAL MARKETING PRACTICES: EVIDENCE FROM SMALL AND MEDIUM ENTERPRISES IN ETHIOPIA", "year": 2024, "journal": "BUSINESS STRATEGY AND DEVELOPMENT", "source_title": "BUS STRATEGY DEV", "doi": "10.1002/bsd2.412", "internal_indegree": 0.0, "internal_outdegree": 40.0, "sap_rank": 970089123.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "BUSINESS SUSTAINABLE DEVELOPMENT (BSD) REFERS TO PRACTICES THAT MEET CURRENT ECONOMIC, ENVIRONMENTAL, AND SOCIAL NEEDS WITHOUT COMPROMISING THE ABILITY OF FUTURE GENERATIONS TO MEET THEIR OWN NEEDS. IN ETHIOPIA, PRIOR STUDIES OVERLOOKED THIS CONCEPT WHEN STUDYING ENTREPRENEURIAL MARKETING PRACTICES (EMP) IN SMALL AND MEDIUM ENTERPRISES (SMES). THIS STUDY AIMED TO INVESTIGATE THE EFFECT OF THESE PRACTICES ON THE BSD. EMPLOYING A MIXED-METHODS APPROACH, PRIMARY AND SECONDARY DATA FROM 387 SMES (SELECTED VIA STRATIFIED AND SIMPLE RANDOM SAMPLING FROM 5765) ARE ANALYZED USING STRUCTURAL EQUATION MODELING (SEM). RESULTS DEMONSTRATE A SIGNIFICANT, POSITIVE RELATIONSHIP BETWEEN EMP SUCH AS INNOVATIVENESS, OPPORTUNITY FOCUS, VALUE CREATION, PROACTIVENESS, AND SUSTAINABLE DEVELOPMENT. THE STUDY UNDERSCORES THE NECESSITY FOR SMES TO ENHANCE MARKETING PRACTICES TO ENSURE LONG-TERM VIABILITY AND COMPETITIVENESS. IT HIGHLIGHTS STAKEHOLDER ENGAGEMENT: POLICYMAKERS, LOCAL COMMUNITIES, AND CONSUMERS AS CRITICAL FOR ALIGNING MARKETING EFFORTS WITH SUSTAINABILITY GOALS. THIS ENGAGEMENT NOT ONLY MEETS CONSUMER EXPECTATIONS FOR ETHICALLY DRIVEN BUSINESSES BUT ALSO ENHANCES INCLUSIVE GROWTH AND COMMUNITY WELFARE. BY PROMOTING DIALOGUE AMONG STAKEHOLDERS, SMES DRIVE SUSTAINABLE DEVELOPMENT INITIATIVES AND ADVOCATE FOR POLICIES SUPPORTING ENVIRONMENTALLY AND SOCIALLY RESPONSIBLE PRACTICES, CONTRIBUTING TO A GREENER, SOCIALLY CONSCIOUS ECONOMY. FUTURE RESEARCH SHOULD EXPLORE MEDIATING OR MODERATING VARIABLES ACROSS DIFFERENT SME TYPES AND REGIONS. THIS STUDY'S NOVELTY LIES IN ITS INSIGHTS INTO HOW EMP IMPACT SME SUSTAINABLE DEVELOPMENT WITHIN ETHIOPIA, OFFERING VALUABLE INSIGHTS FOR STRATEGIC DECISION-MAKING AND HIGHLIGHTING THE PIVOTAL ROLE OF ENTREPRENEURIAL MARKETING (EM) IN ACHIEVING LONG-TERM SUCCESS IN DYNAMIC MARKETS.", "author": "TOLOSSA AT;SINGH M;GAUTAM RK", "author_full_names": "ABEBE TECHAN TOLOSSA; MANJIT SINGH; RAJ KUMAR GAUTAM", "country": "ETHIOPIA; INDIA"}, {"id": "QUINTERO-ARANGO LF, 2024, CLIO AM", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING IN ACTION: MULTIDIMENSIONAL IMPACT AND SECTORAL APPLICATIONS", "year": 2024, "journal": "CLIO AMERICA", "source_title": "CLIO AM", "doi": "10.21676/23897848.5683", "internal_indegree": 0.0, "internal_outdegree": 39.0, "sap_rank": 17787626111.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS ARTICLE AIMS TO IDENTIFY THE DYNAMICS OF SCIENTIFIC PRODUCTION ON ENTREPRENEURIAL MARKETING (EM) AND ITS INFLUENCE ON ORGANIZATIONAL PERFORMANCE; RESEARCHERS CONDUCTED TWO CONSULTATIONS FOR THIS OBJECTIVE, ONE IN SCOPUS AND ANOTHER IN WEB OF SCIENCE. THE RESULTS SHOWED THAT IN THE LAST SEVEN YEARS, THERE HAS BEEN A 52 % GROWTH IN SCIENTIFIC PRODUCTION, HIGHLIGHTING ITS IMPORTANCE IN THE ACADEMIC AND BUSINESS WORLDS. RESEARCHERS IDENTIFIED THREE MAJOR TRENDS; THE FIRST CONCERNS THE VARIOUS METRICS USED TO MEASURE THE DIMENSIONS OF EM, THE SECOND PERTAINS TO APPLICATIONS OF EM IN DIFFERENT CONTEXTS, AND THE THIRD INVOLVES THE THEORETICAL FOUNDATIONS OF EM. THIS STUDY BENEFITS RESEARCHERS SEEKING A BETTER UNDERSTANDING OF EM, ENTREPRENEURS WHO DESIRE A STRAIGHTFORWARD INTRODUCTION TO THE SUBJECT FROM A SCIENTIFIC PERSPECTIVE, AND EDUCATORS WISHING TO INTEGRATE THE TOPIC OF EM INTO THEIR COURSES.", "author": "QUINTERO-ARANGO LF;BETANCUR-ARIAS JD;MACHADO C;ROJAS-QUICENO G", "author_full_names": "LUIS FERNANDO QUINTERO ARANGO; JUAN DIEGO BETANCUR ARIAS; CRISTIANO MACHADO; GUILLERMO ROJAS-QUICENO", "country": "COLOMBIA; BRAZIL; COLOMBIA"}, {"id": "LOTFABADI VT, 2024, INTERD J MANAGE STUD", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HOW ENTREPRENEURIAL MARKETING LEADS TO CUSTOMER SATISFACTION (THE MEDIATION EFFECT OF CUSTOMER VALUE)", "year": 2024, "journal": "INTERDISCIPLINARY JOURNAL OF MANAGEMENT STUDIES", "source_title": "INTERD J MANAGE STUD", "doi": "10.22059/ijms.2023.347747.675310", "internal_indegree": 0.0, "internal_outdegree": 39.0, "sap_rank": 386843674.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE CURRENT STUDY AIMS TO DEEPEN THE KNOWLEDGE OF THE DIRECT AND INDIRECT EFFECTS OF ENTREPRENEURIAL MARKETING ON CUSTOMER SATISFACTION THROUGH CUSTOMER VALUE. THE STATISTICAL POPULATION OF THIS STUDY IS FOOD AND AGRICULTURAL PRODUCTS EXPORTING COMPANIES PARTICIPATING IN THE 27TH INTERNATIONAL AGROFOOD EXHIBITION IN TEHRAN 2020. FINALLY, 259 QUESTIONNAIRES CONSIDERING SYSTEMATIC RANDOM SAMPLING METHODS WERE EXPLORED BY STRUCTURAL EQUATION MODELING (SEM) USING SMART PLS3 SOFTWARE. THE RESULT REVEALS THAT ENTREPRENEURIAL MARKETING AFFECTS CUSTOMER SATISFACTION DIRECTLY AND INDIRECTLY THROUGH CUSTOMER VALUE. MOREOVER, INNOVATIVENESS, PROACTIVENESS, RESOURCE LEVERAGE, AND CUSTOMER ORIENTATION INCREASE BOTH CUSTOMER VALUE AND CUSTOMER SATISFACTION POSITIVELY. HOWEVER, THE IMPACT OF RISK-TAKING ON BOTH CUSTOMER VALUE AND CUSTOMER SATISFACTION IS NOT SIGNIFICANT. THIS STUDY CONTRIBUTES TO THE THEORETICAL GROUND OF ENTREPRENEURIAL MARKETING LITERATURE BY PROVIDING THIS KNOWLEDGE THAT WHICH DIMENSIONS MAY AFFECT SATISFACTION DIRECTLY AND INDIRECTLY THROUGH CUSTOMER VALUE.", "author": "LOTFABADI VT;KARIMI N;GANJI SFG", "author_full_names": "LOTFABADI, VAHIDE TABASI;KARIMI, NASIM;GANJI, SEYEDEH FATEMEH GHASEMPOUR", "country": "IRAN; IRAN; IRAN"}, {"id": "YANG Z, 2024, INT J ENTREP BEHAV RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "YANG Z, 2024, INT J ENTREP BEHAV RES", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 36.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "ABAIDAH TNABT, 2024, UCJC BUS SOC REV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE MODEL OF ENTREPRENEURIAL MARKETING (EM) AMONG AGROPRENEURS IN THE EMERGING MARKETS: A CONCEPTUAL FRAMEWORK", "year": 2024, "journal": "UCJC BUSINESS AND SOCIETY REVIEW", "source_title": "UCJC BUS SOC REV", "doi": "10.3232/UBR.2024.V21.N1.05", "internal_indegree": 0.0, "internal_outdegree": 34.0, "sap_rank": 2038375647.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS RESEARCH AIMS TO GIVE AN OPPORTUNITY, VALUE CREATION AND INNOVATION TO THE AGROPRENEUR'S MODEL FARM IN THE EMERGING MARKETS IN IMPLEMENTING THE NEW COST REDUCTION PRACTICES IN THEIR FARMS USING ORGANIC FERTILIZER. THE PERFORMANCE OF SMALL MEDIUM ENTERPRISES (SMES) IS THE DEPENDENT VARIABLE, WHILE THE DIMENSIONS OF ENTREPRENEURIAL MARKETING (EM) NAMELY, I) PROACTIVENESS, II) OPPORTUNITY FOCUS, III) INNOVATIVENESS, IV) RESOURCE LEVERAGING AND, V) VALUE CREATION ACT AS THE INDEPENDENT VARIABLES. WHILE GOVERNMENT SUPPORT PROGRAMS (GSPS) MEASURED AS A MEDIATOR IN THIS STUDY. THE MODEL OF STRUCTURE FOR AGROPRENEURS PRACTICES IS CONCEPTUALIZED BASED ON THE RESEARCH ADVANTAGE THEORY (RA). THIS RESEARCH WILL EMPLOY A MIXED-METHOD DESIGN THROUGH EXPLANATORY SEQUENTIAL APPROACH. THE DATA COLLECTION STARTED WITH QUANTITATIVE AND FOLLOWED BY QUALITATIVE APPROACH IN ORDER TO ACHIEVE THE STUDY OBJECTIVES. THIS STUDY ANTICIPATED FINDINGS WHICH COULD ELUCIDATE THE IMPORTANCE OF ENTREPRENEURIAL MARKETING DIMENSIONS ON THE PERFORMANCE OF THE AGROPRENEUR BUSINESSES AS WELL AS THE MODERATING ROLE OF THE GOVERNMENT SUPPORT PROGRAM IN AFFECTING THE RELATIONSHIP BETWEEN THE AFOREMENTIONED CONSTRUCTS. THE IMPACT COULD BE SEEN IN THE AGRICULTURAL SECTOR, ESPECIALLY AGROPRENEURS IN EMERGING MARKETS. FROM THE SOCIETAL AND ECONOMIC PERSPECTIVE, THE NEW INTERVENTION OF SEVERAL AGENCIES AND THE INNOVATION USED OF FERTILIZER ARE EXPECTED TO IMPROVE THE FARMERS AND THEIR PRODUCTS. OTHER FARMERS COULD IMPLEMENT THE RESULT AND ALSO HELP THEM INCREASE THEIR INCOME. THIS RESEARCH COULD THEORETICALLY CONTRIBUTE TO BOTH MARKETING AND ENTREPRENEURSHIP LITERATURE ON THE SIGNIFICANCE OF ENTREPRENEURIAL MARKETING PRACTICES PARTICULARLY AMONG AGROPRENEURS. AS A PRACTICAL IMPLICATION, THIS STUDY OFFERS USEFUL INSIGHT FOR THE GOVERNMENT AGENCIES TO EFFECTIVELY STRATEGIES AND FORMULATE ITS' EFFORTS IN THE GOVERNMENT SUPPORT PROGRAMS DESIGNED. THIS WILL HELP PARTICULARLY THE SME AGROPRENEURS TO SUSTAIN IN THE MARKET EVENTUALLY.", "author": "ABAIDAH TNABT;KAMARUDIN MAIB;KAMARRUDDIN NNAB", "author_full_names": "MUHAMAD ALI IMRAN BIN KAMARUDIN; TUNKU NUR ATIKHAH BINTI TUNKU ABAIDAH; NUR NADIA ADJRINA KAMARRUDDIN", "country": "MALAYSIA"}, {"id": "SAIYED A, 2024, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SAIYED A, 2024, J RES MARK ENTREP", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 33.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HONG Y, 2024, INT J ENTREP BEHAV RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HONG Y, 2024, INT J ENTREP BEHAV RES", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 32.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "TUNKU ABAIDAH T, 2024", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "TUNKU ABAIDAH T, 2024", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 32.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "ENTSMINGER JS, 2024, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING STRATEGIES, RESOURCES AND SOCIAL DISADVANTAGE: EXPLORING THE ROLE OF RESOURCES AND MINORITY STATUS AMONG US AGROFOOD ENTERPRISES", "year": 2024, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "source_title": "J RES MARK ENTREP", "doi": "10.1108/JRME-03-2023-0033", "internal_indegree": 0.0, "internal_outdegree": 30.0, "sap_rank": 45107487.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSETHIS PAPER AIMS TO INVESTIGATE ASSOCIATIONS BETWEEN FIRM RESOURCES AND RELIANCE ON ENTREPRENEURIAL MARKETING (EM) CHANNELS AMONG AGROFOOD VENTURES. IT ACCOUNTS FOR AGROPRENEUR GENDER AND RACIAL/ETHNIC STATUS IN THE CONTEXT OF MARKETING CHANNEL PORTFOLIO COMPOSITION. THE AUTHORS EXAMINE THE ESTABLISHED ASSUMPTION THAT RESOURCE LIMITATIONS DRIVE EM AND WHETHER SOCIALLY DISADVANTAGED STATUS OF AGROPRENEURS IS ASSOCIATED WITH MARKETING STRATEGY BEYOND STANDARD RESOURCING MEASURES.DESIGN/METHODOLOGY/APPROACHUSING 2015 LOCAL FOODS MARKETING PRACTICES SURVEY DATA, THE AUTHORS APPLY LINEAR REGRESSION TO INVESTIGATE DIFFERENCES IN THE USE OF EM CHANNELS, ACCOUNTING FOR RESOURCES, SOCIAL STATUS AND OTHER FACTORS.FINDINGSLIMITED-RESOURCE VENTURES RELY MORE ON CONSUMER-ORIENTED CHANNELS THAT REQUIRE EM PRACTICES. SOCIALLY DISADVANTAGED ENTREPRENEURS FAVOR THESE CHANNELS, EVEN WHEN ACCOUNTING FOR RESOURCES. NOTABLY, VENTURES HEADED BY MEN OF COLOR RELY MORE ON THE MOST CUSTOMER-CENTRIC LOCAL FOODS MARKETING CHANNEL.RESEARCH LIMITATIONS/IMPLICATIONSFUTURE RESEARCH SHOULD INVESTIGATE HOW SOCIAL AND HUMAN CAPITAL INFLUENCES THE USE OF EM.PRACTICAL IMPLICATIONSENTREPRENEURIAL SUPPORT POLICY AND PRACTICE FOR AGROPRENEURS SHOULD BE CAUTIOUS ABOUT THE \"DOUBLE-BURDEN\" FOLK THEOREM OF INTERSECTIONAL DISADVANTAGE AND REVIEW HOW TO BEST DIRECT RESOURCES ON EM TO GROUPS MOST LIKELY TO BENEFIT.ORIGINALITY/VALUETHIS PAPER USES A UNIQUE, RESTRICTED, NATION-WIDE, FEDERAL DATA SET TO EXAMINE RELATIONSHIPS BETWEEN RESOURCE ENDOWMENTS, SOCIAL STATUS AND THE COMPOSITION OF AGROFOOD ENTERPRISES' MARKETING CHANNEL PORTFOLIOS. TO THE BEST OF THE AUTHORS' KNOWLEDGE, IT IS THE FIRST TO INCLUDE RACIAL- AND ETHNIC-MINORITY STATUS OF AGROPRENEURS AND TO ACCOUNT FOR INTERSECTIONALITY WITH GENDER.", "author": "ENTSMINGER JS;MCGOWAN L", "author_full_names": "JASON SCOTT ENTSMINGER; LUCY M. MCGOWAN", "country": "UNITED STATES; UNITED STATES; UNITED STATES"}, {"id": "ENTSMINGER J, 2024, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTSMINGER J, 2024, J RES MARK ENTREP", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 27.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CHEN Y, 2024, SUSTAINABILITY", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "CHEN Y, 2024, SUSTAINABILITY", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 23.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SALIH ES, 2024, J DEV ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "EXPLORING THE IMPACT OF ENTREPRENEURIAL MARKETING ON SHARED VALUE CREATION: THE MEDIATING ROLE OF ORGANIZATIONAL AMBIDEXTERITY", "year": 2024, "journal": "JOURNAL OF DEVELOPMENTAL ENTREPRENEURSHIP", "source_title": "J DEV ENTREP", "doi": "10.1142/S1084946724500249", "internal_indegree": 0.0, "internal_outdegree": 22.0, "sap_rank": 1068520366.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "IN THE KURDISTAN REGION OF IRAQ, THE FOOD AND BEVERAGE MANUFACTURING INDUSTRY FACES SIGNIFICANT CHALLENGES IN CREATING SHARED VALUE, EXACERBATED BY GOVERNMENT POLICIES, FINANCIAL CONSTRAINTS AND OUTDATED PRACTICES. ENTREPRENEURIAL MARKETING OFFERS A POTENTIAL SOLUTION, BUT RESEARCH ON ITS EFFECT IN THIS CONTEXT IS LIMITED, ESPECIALLY CONCERNING ITS RELATIONSHIP WITH ORGANIZATIONAL AMBIDEXTERITY AND SHARED VALUE CREATION. THIS STUDY AIMS TO INVESTIGATE THE EFFECT OF ENTREPRENEURIAL MARKETING ON SHARED VALUE CREATION, WITH ORGANIZATIONAL AMBIDEXTERITY ACTING AS A MEDIATING FACTOR. DATA WAS COLLECTED FROM 201 FOOD AND BEVERAGE FACTORIES IN THE REGION, REPRESENTING 61 PERCENT OF SELECTED FACTORIES AND ANALYZED USING IBM SPSS AMOS 24. THE RESULTS DEMONSTRATE A STRONG POSITIVE INFLUENCE OF ENTREPRENEURIAL MARKETING ON SHARED VALUE CREATION AND HIGHLIGHT THE PARTIAL MEDIATING ROLE OF ORGANIZATIONAL AMBIDEXTERITY IN BALANCING EXPLORATION AND EXPLOITATION. THESE FINDINGS UNDERSCORE THE IMPORTANCE OF ORGANIZATIONAL AMBIDEXTERITY IN SHAPING SHARED VALUE IN THE KURDISTAN REGION'S FOOD AND BEVERAGE SECTOR.", "author": "SALIH ES;HAMAD HS", "author_full_names": "EHSAN SALIH; HASEBA HAMAD", "country": "IRAQ; IRAQ"}, {"id": "NWANKWO CA, 2024, FOUND MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ACHIEVING SURVIVAL OF SOCIAL ENTERPRISE THROUGH ENTREPRENEURIAL MARKETING: AN EMPIRICAL ANALYSIS OF NIGERIA", "year": 2024, "journal": "FOUNDATIONS OF MANAGEMENT", "source_title": "FOUND MANAGE", "doi": "10.2478/fman-2024-0016", "internal_indegree": 0.0, "internal_outdegree": 22.0, "sap_rank": 2854941.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE APPLICATION OF ENTREPRENEURIAL MARKETING (EM) STRATEGIES TO THE SUSTAINABILITY OF PROFIT AND NON-PROFIT MAKING VENTURES HAS DRAWN CRITICS FROM PRACTITIONERS AND ACADEMIC DOMAINS. MANY HAVE ARGUED THAT EM DIMENSIONS ARE DESIGNED FOR PROFIT MARKING VENTURES AND NOT FOR PROFIT VENTURE. THIS INFORMED THE NEED TO EXAMINE THE EFFECT OF EM ON THE SURVIVAL OF SOCIAL ENTERPRISES (SES) IN NIGERIA. THE STUDY SELECTED SES STAFF IN ANAMBRA STATE, NIGERIA USING A QUANTITATIVE RESEARCH APPROACH. DATA WERE COLLECTED FROM 387 SE STAFF USING A STRUCTURED QUESTIONNAIRE. HYPOTHESES WERE TESTED USING INTERNATIONAL BUSINESS MACHINE STATISTICAL PACKAGE FOR THE SOCIAL SCIENCES (IBM-SPSS) AND INTERNATIONAL BUSINESS MACHINE -STATISTICAL PACKAGE FOR THE SOCIAL SCIENCES - ANALYSIS OF MOMENT STRUCTURES (IBM-SPSS-AMOS) VERSION 27 THAT RUNS EXPLORATORY AND CONFIRMATORY FACTOR ANALYSIS AND STRUCTURAL EQUATION MODELLING (SEM). THE FINDINGS REVEALED THAT ALL THE EM DIMENSIONS, EXCEPT MARKET SENSING, HAVE SIGNIFICANT AND POSITIVE EFFECT ON THE SURVIVAL OF SES IN NIGERIA. THEREFORE, THE STUDY CONCLUDED THAT EM HAS SIGNIFICANT EFFECT ON THE SURVIVAL OF SES IN ANAMBRA STATE, NIGERIA. THE STUDY RECOMMENDED THAT PRACTITIONERS SHOULD ADOPT AND IMPLEMENT EM DIMENSIONS AS THE BASIC ENABLERS THAT WOULD SUSTAIN THE EXISTENCE OF SES IN BOTH NIGERIA AND BEYOND.", "author": "NWANKWO CA;KANYANGALE MI", "author_full_names": "COSMAS ANAYOCHUKWU NWANKWO; MACDONALD KANYANGALE", "country": "SOUTH AFRICA"}, {"id": "SALIH E, 2024, J DEV ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SALIH E, 2024, J DEV ENTREP", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 19.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "GUEROLA-NAVARRO V, 2024, INT ENTREP MANAGE J", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "GUEROLA-NAVARRO V, 2024, INT ENTREP MANAGE J", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 17.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "NWANKWO C, 2024", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "NWANKWO C, 2024", "year": 2024, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 15.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "DEKU W, 2023, J ISLAM MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "DEKU W, 2023, J ISLAM MARK", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 113.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HANAYSHA J, 2023, IIM KOZHIKODE SOC MANAG REV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HANAYSHA J, 2023, IIM KOZHIKODE SOC MANAG REV", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 69.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CHOU WC, 2023, NTU MANAG REV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HOW ENTREPRENEURIAL MARKETING FACILITATES DIRECT SELLERS' ENTREPRENEURIAL PROCESS: A DYNAMIC ADJUSTMENT PERSPECTIVE", "year": 2023, "journal": "NTU MANAGEMENT REVIEW", "source_title": "NTU MANAG REV", "doi": "10.6226/NTUMR.202308_33(2).0004", "internal_indegree": 0.0, "internal_outdegree": 51.0, "sap_rank": 751982864.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS STUDY INTENDS TO EXAMINE THE ENTREPRENEURIAL PROCESS OF INDIVIDUAL DIRECT SELLERS FROM THE PERSPECTIVE OF ENTREPRENEURIAL MARKETING, AND ADOPTS THE PROCESS METHOD WHERE EVENTS IN CHRONOLOGICAL ORDER ARE SCRUTINIZED. THIS STUDY COLLECTS DATA FROM TRIANGULAR SOURCES AND COMBINES THE FOCUS GROUP INTERVIEWS WITH IN-DEPTH INTERVIEWS TO EXAMINE 14 DIRECT SELLERS SELECTED FROM ONE DOMESTIC, AND ONE FOREIGN DIRECT SELLING BRAND, RESPECTIVELY. WE DEVELOP A DYNAMIC MODEL OF ENTREPRENEURIAL MARKETING. THE RESULTS SHOW THAT TWO RELATIONAL MANAGEMENT MECHANISMS ARE CRUCIAL TO THE SUCCESSFUL TRANSFORMATION TOWARDS THE NEXT ENTREPRENEURIAL PHASE. THE FINDINGS NOT ONLY FILL THE ACADEMIC GAP IN INDIVIDUAL-LEVEL DIRECT-SELLING STRATEGY, BUT ALSO SHED LIGHT ON ENTREPRENEURIAL MARKETING THEORY BY PROVIDING INSIGHTS REGARDING HOW RESOURCES AND INITIATIVES ARE MODIFIED, WHICH DEEPENS THE UNDERSTANDING OF ITS DYNAMICITY. MOREOVER, THIS RESEARCH EXTENDS THE TRANSACTION ORIENTED WESTERN STUDIES ON DIRECT SELLING TO THE 'QUANXI' (RELATIONSHIP) ORIENTED EASTERN CONTEXT THAT ESPECIALLY VALUES RELATIONAL NETWORK. IN PRACTICES, THE FINDINGS COULD ASSIST DIRECT SELLERS AND INTERPERSONAL-ORIENTED MICRO-ENTREPRENEURS TO DEVELOP PERSONAL BUSINESS TACTICS, AND SERVE AS REFERENCES FOR DIRECT SELLING COMPANIES TO PLAN FOR TRAINING PROGRAM OF BRAND AFFILIATES (BA) AND BRAND REPRESENTATIVES (BR).", "author": "CHOU WC;HUANG HY;CHIANG YF", "author_full_names": "CHOU, WEN-CHIUNG;HUANG, HSIU-YING;CHIANG, YI-FANG", "country": "TAIWAN; TAIWAN; TAIWAN"}, {"id": "MAKMUR, 2023, J DISTRIB SCI", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE EFFECT OF ENTREPRENEURIAL MARKETING ON VILLAGE-OWNED ENTERPRISES PERFORMANCE DISTRIBUTION", "year": 2023, "journal": "JOURNAL OF DISTRIBUTION SCIENCE", "source_title": "J DISTRIB SCI", "doi": "10.15722/jds.21.09.202309.55", "internal_indegree": 0.0, "internal_outdegree": 49.0, "sap_rank": 22687458.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE: SPECIALIZED MARKETING STRATEGIES ARE NEEDED BY LIMITED RESOURCES, SUCH AS ENTREPRENEURIAL MARKETING (EM), A MARKETING ACTIVITY BASED ON SPECIFIC CONDITIONS CHARACTERIZING VILLAGE-OWNED ENTERPRISES (VOES). THEREFORE, THIS RESEARCH AIMED TO EXAMINE THE EFFECT OF EM ON THE FINANCIAL AND NON-FINANCIAL PERFORMANCE OF VOES IN INDONESIA. RESEARCH DESIGN, DATA AND METHODOLOGY: DATA WERE COLLECTED BY DISTRIBUTING QUESTIONS ON A 5-POINT LIKERT SCALE TO 153 VOES DIRECTORS IN ROKAN HULU DISTRICT, INDONESIA. THE COLLECTED DATA WERE ANALYZED USING THE PARTIAL LEAST SQUARES STRUCTURAL EQUATION MODEL WITH SMARTPLS 3.0. RESULTS: THE RESULTS SHOWED THAT EM POSITIVELY AND SIGNIFICANTLY AFFECTED THE FINANCIAL AND NON-FINANCIAL PERFORMANCE OF VOES, AS WELL AS ON OPERATIONAL PERFORMANCE. CONCLUSIONS: EM PLAYED AN IMPORTANT ROLE IN THE IMPROVEMENT OF MANY ASPECTS OF THE PERFORMANCE OF VOES. THE INDONESIAN GOVERNMENT ALSO NEED TO CONSIDER EM VARIOUS CHARACTERISTICS WHEN RECRUITING DIRECTORS. IT IS IMPORTANT TO NOTE THAT THIS RESEARCH IS THE FIRST TO EXAMINE THE IMPACT OF EM ON VOES.", "author": "MAKMUR;MOHAMAD N", "author_full_names": "MAKMUR;MOHAMAD, NORHIDAYAH", "country": "MALAYSIA"}, {"id": "MARIN A, 2023, J MARKET EDUC", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "FROM LAB TO MARKET: LEARNING ENTREPRENEURIAL MARKETING THROUGH MULTI-SEMESTER, STAGE-GATE, CAPSTONE PROJECT IN STEM MBA", "year": 2023, "journal": "JOURNAL OF MARKETING EDUCATION", "source_title": "J MARKET EDUC", "doi": "10.1177/02734753231185415", "internal_indegree": 0.0, "internal_outdegree": 44.0, "sap_rank": 324365814.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "ENTREPRENEURS BUILD SUCCESSFUL BUSINESSES BY TAKING INNOVATIVE IDEAS FROM RESEARCH LABS TO MARKET. THIS ARTICLE DESCRIBES A PEDAGOGICAL APPROACH AND ITS OUTCOMES IN UTILIZING A MULTI-STAGE, MULTI-COURSE, AND MULTI-SEMESTER CAPSTONE INTEGRATIVE PROJECT TO TEACH ENTREPRENEURIAL MARKETING (EM) OF EARLY-STAGE TECHNOLOGIES. HEREIN WE EXPLAIN CONCEPTS AND PRACTICES THAT ENABLE THE LEARNING NEEDED WITHIN STEM (SCIENCE, TECHNOLOGY, ENGINEERING, MATHEMATICS) MBA PROGRAMS TO COMMERCIALIZE AND MARKET PRODUCTS AND SERVICES ARISING FROM NEW TECHNOLOGIES. THE PEDAGOGY FOLLOWS A FOUR-COURSE SEQUENCE THAT APPLIES STRATEGIC FRAMEWORKS AND TOOLS TO DEVELOP OPPORTUNITY SPACE FOR A PATENTED IDEA, DEVELOP THE IDEA INTO PRODUCT OPTIONS, UNDERTAKE CUSTOMER DISCOVERY, BUILD MARKETING AND SALES STRATEGIES, AND TRANSLATE OPPORTUNITIES INTO VENTURE PLANNING. THESE LAB-TO-MARKET OUTCOMES ARE ACCOMPLISHED BY APPLYING DELIBERATE PRACTICE-BASED ACTION LEARNING METHODS TO BUILD STUDENTS' KNOWLEDGE BASES AND PROBLEM-SOLVING PROCESS SKILLS THAT INCREASE THEIR ENTREPRENEURIAL EXPERTISE. THROUGH LEARNER ENGAGEMENT IN A SEQUENCE OF INNOVATIVE, DATA-DRIVEN, ANALYTICAL PROCESSES THAT FOCUS ON IDENTIFYING, VALIDATING, AND STRATEGIZING AROUND SCALABLE NEW IDEAS, THIS PEDAGOGY ENABLES STUDENTS TO LEARN EM SKILLS THAT CAN BE APPLIED TO DIFFERENT INDUSTRIES AND COMPANIES AT VARIOUS STAGES OF DEVELOPMENT BUT WITH AN EMPHASIS ON EARLY-STAGE TECHNOLOGIES.", "author": "MARIN A;PARVATIYAR A;MITCHELL RK;VILLEGAS D", "author_full_names": "ALEJANDRA MARIN; ATUL PARVATIYAR; RONALD K. MITCHELL; DINO VILLEGAS", "country": "UNITED STATES; UNITED STATES"}, {"id": "AL-SHAIKH M, 2023, WORLD DEV SUSTAIN", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "AL-SHAIKH M, 2023, WORLD DEV SUSTAIN", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 44.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SUANDI E, 2023, J FINANC SERV MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "EVALUATING THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING, COMPETITIVE ADVANTAGE, AND ISLAMIC BANKS PERFORMANCE", "year": 2023, "journal": "JOURNAL OF FINANCIAL SERVICES MARKETING", "source_title": "J FINANC SERV MARK", "doi": "10.1057/s41264-022-00169-6", "internal_indegree": 0.0, "internal_outdegree": 39.0, "sap_rank": 3091061397.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE PURPOSE OF THIS PAPER IS TO ANALYZE THE EFFECT OF ENTREPRENEURIAL MARKETING ON COMPETITIVE ADVANTAGE AND ISLAMIC BANK PERFORMANCE IN INDONESIA WITH THE MODERATING ROLE OF VIGILANT LEADERSHIP. WE USED A CONVENIENCE SAMPLING METHOD TO COLLECT DATA FROM 204 ISLAMIC BANK BRANCHES IN INDONESIA. TO TEST THE HYPOTHESES, WE EMPLOYED SMART-PARTIAL LEAST SQUARE (SMART-PLS) SOFTWARE. THE FINDINGS INDICATE THAT ENTREPRENEURIAL MARKETING DIRECTLY OR INDIRECTLY (THROUGH COMPETITIVE ADVANTAGE) INFLUENCES BANK PERFORMANCE. VIGILANT LEADERSHIP DOES NOT MODERATE THE INFLUENCE OF ENTREPRENEURIAL MARKETING ON BANK PERFORMANCE. THEREFORE, ISLAMIC BANKS IN INDONESIA NEED TO DEVELOP ENTREPRENEURIAL MARKETING PRACTICES TO INCREASE THEIR COMPETITIVE ADVANTAGE AND BANK PERFORMANCE. THIS STUDY IS THE FIRST TO EXAMINE THE EFFECT OF ENTREPRENEURIAL MARKETING ON ORGANIZATIONAL OUTCOMES IN ISLAMIC BANKING AND AMONG THE FIRST TO USE VIGILANT LEADERSHIP AS A RESEARCH VARIABLE IN THE BANKING CONTEXT.", "author": "SUANDI E;HERRI;YULIHASRI;SYAFRIZAL", "author_full_names": "EDI SUANDI; HERRI HERRI; YULIHASRI; SYAFRIZAL SYAFRIZAL", "country": "INDONESIA; INDONESIA"}, {"id": "SARFRAZ M, 2023, IND TEXTILA", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE EFFECT OF ENTREPRENEURS' PERSONALITY ON ENTREPRENEURIAL MARKETING IN TEXTILE SECTOR: THE MEDIATING ROLE OF SELF-EFFICACY", "year": 2023, "journal": "INDUSTRIA TEXTILA", "source_title": "IND TEXTILA", "doi": "10.35530/IT.074.02.202179", "internal_indegree": 0.0, "internal_outdegree": 39.0, "sap_rank": 216450523.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE STUDY OBJECTIVE IS TO ANALYSE THE EFFECT OF BIG-FIVE ENTREPRENEURS' PERSONALITY TRAITS ON ENTREPRENEURIAL MARKETING WHILE CONSIDERING THE MEDIATING ROLE OF SELF-EFFICACY. DATA WERE COLLECTED THROUGH A STRUCTURED QUESTIONNAIRE; A STUDY OF 199 USABLE QUESTIONNAIRES OUT OF 290 WAS CARRIED OUT AMONG YOUNG ENTREPRENEURS. STRUCTURAL EQUATION MODELLING WAS USED TO TEST THE STUDY HYPOTHESIS. THE RESULTS SHOW A SIGNIFICANT RELATIONSHIP BETWEEN PERSONALITY TRAITS AND ENTREPRENEURIAL MARKETING. OPENNESS, EXTROVERSION, AND AGREEABLENESS PERSONALITY TRAITS ARE POSITIVELY LINKED WITH ENTREPRENEURIAL MARKETING. THE FINDINGS ALSO SHOW A POSITIVE ASSOCIATION BETWEEN SELF-EFFICACY AND ENTREPRENEURIAL MARKETING. THE CURRENT STUDY CONTRIBUTES TO THE LITERATURE BY ANALYSING AN ENTREPRENEUR'S PERSONALITY CHARACTERISTICS IN ENTREPRENEURIAL MARKETING.", "author": "SARFRAZ M;ABDULLAH MI;MUMTAZ N;IBN-UL-HASSAN S;OZTURK I", "author_full_names": "MUDDASSAR SARFRAZ; MUHAMMAD IBRAHIM ABDULLAH; NAJAF MUMTAZ; SYED IBN-UL-HASSAN; ILKNUR OZTURK", "country": "CHINA; PAKISTAN; PAKISTAN; TURKIYE"}, {"id": "LI LY, 2023, SUSTAINABILITY-BASEL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SUSTAINABLE MICRO, SMALL, AND MEDIUM ENTERPRISES: A DEVELOPED MODEL OF ENTREPRENEURIAL MARKETING BEHAVIORS FOR THAILAND'S MSMES", "year": 2023, "journal": "SUSTAINABILITY", "source_title": "SUSTAINABILITY-BASEL", "doi": "10.3390/su151713135", "internal_indegree": 0.0, "internal_outdegree": 39.0, "sap_rank": 146511020.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE MAIN OBJECTIVE OF THIS STUDY IS TO PROPOSE A DEVELOPED MODEL OF ENTREPRENEURIAL MARKETING BEHAVIORS FOR SUSTAINABLE MICRO, SMALL, AND MEDIUM ENTERPRISES (MSMES) IN THAILAND. THIS STUDY AIMS TO CONTRIBUTE TO THE EXISTING LITERATURE ON SUSTAINABLE BUSINESS PRACTICES AND ENTREPRENEURIAL MARKETING BEHAVIORS AFTER A DISASTER BY PROVIDING A FRAMEWORK THAT CAN BE USED FOR FUTURE RESEARCH IN THIS AREA, PARTICULARLY AFTER ECONOMIC TURBULENCE. THE RESEARCH METHOD USED IN THIS STUDY IS QUANTITATIVE. THE STUDY WAS CONDUCTED IN BANGKOK, THAILAND. PRIMARY DATA WERE COLLECTED FROM RESPONDENTS VIA A QUESTIONNAIRE USING A NON-PROBABILITY SAMPLING APPROACH (PURPOSIVE SAMPLING). A TOTAL OF 511 OUT OF 600 ISSUED ONLINE AND PAPER SURVEYS WERE SUCCESSFULLY RETURNED, CONSTITUTING AN 85% RESPONSE RATE. THE PRIMARY DATA WERE ACQUIRED FROM FIRST-HAND SOURCES OF THAI MSMES' BUSINESS OWNERS AND MANAGERS. THE HYPOTHESIS TESTING OF THIS STUDY PROVES THAT ENTREPRENEURIAL MARKETING BEHAVIORS COULD INFLUENCE BUSINESS REBOUND DURING THE COVID PERIOD. THE STUDY ALSO CONCLUDES THAT BUSINESS RESILIENCE PRACTICES MEDIATE OR CARRY THE INFLUENCE OF ENTREPRENEURIAL MARKETING BEHAVIORS ON THE BUSINESS REBOUND.", "author": "LI LY;SYAH AM;SYUKUR M;LIMKANCHANAPA R;SRISURAT C", "author_full_names": "LIOU-YUAN LI; AHMAD MUJAFAR SYAH; MUHAMMAD SYUKUR; RACHATAWAN LIMKANCHANAPA; CHAMAIPORN SRISURAT", "country": "THAILAND; UNITED STATES; THAILAND; THAILAND"}, {"id": "NWANKWO CA, 2023, FOUND MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "CRITICAL UNDERSTANDING OF EXISTING ENTREPRENEURIAL MARKETING MODELS: 2002 - 2022", "year": 2023, "journal": "FOUNDATIONS OF MANAGEMENT", "source_title": "FOUND MANAGE", "doi": "10.2478/fman-2023-0007", "internal_indegree": 0.0, "internal_outdegree": 37.0, "sap_rank": 410044.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "WITH THE CONSISTENT FAILURE OF SMALL AND MEDIUM ENTERPRISES (SMES) GLOBALLY, MANY SCHOLARS HAVE DEVELOPED ENTREPRENEURIAL MARKETING (EM) MODELS THAT ARE AIMED AT REDUCING THE FAILURE FREQUENTLY EXPERIENCED. THE AIM OF THIS PAPER IS TO CRITICALLY REVIEW THE DIFFERENT EM MODELS FROM 2002 TO 2022. IN PURSUIT OF THIS AIM, THE PAPER REVIEWED 10 EM MODELS TO FIND OUT THEIR STRENGTHS AND SHORTFALLS. THE REVIEW FOUND THAT SOME RESEARCH CONSTRUCTS SUCH AS MARKET SENSING AND TEAMWORK, WHICH WERE IGNORED, WERE IDENTIFIED AS POSING A SIGNIFICANT CONTRIBUTION TO BUSINESS SURVIVAL IN THE INTEGRATIVE EM MODEL. THE PAPER CONCLUDES THAT SINCE DIFFERENT EM MODELS HAVE BEEN DEVELOPED TO REDUCE THE CONSISTENT FAILURE OF BUSINESS, EFFORTS SHOULD BE INTENSIFIED TOWARDS ADOPTING THE INTEGRATIVE EM MODEL TO MEASURE ITS APPLICABILITY IN OTHER SECTORS AS WELL AS TO HAVE A UNIFIED AND ACCEPTABLE EM MODEL THAT WILL GROW AND SUSTAIN SMES.", "author": "NWANKWO CA;KANYANGALE MI", "author_full_names": "COSMAS ANAYOCHUKWU NWANKWO; MACDONALD KANYANGALE", "country": "SOUTH AFRICA"}, {"id": "MARIN A, 2023, J MARK EDUC", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "MARIN A, 2023, J MARK EDUC", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 37.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SUANDI E, 2023, J FINAN SERV MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "SUANDI E, 2023, J FINAN SERV MARK", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 37.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "LI L, 2023, SUSTAINABILITY", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "LI L, 2023, SUSTAINABILITY", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 33.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "MUGONI E, 2023, SUSTAIN TECHNOL ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "MUGONI E, 2023, SUSTAIN TECHNOL ENTREP", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 32.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "RIBEIRO AMS, 2023, REV ELETRONICA ESTRA", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING OF STARTUPS: CONSTRUCTIVIST BIBLIOGRAPHIC RESEARCH BASED ON PROKNOW-C", "year": 2023, "journal": "REVISTA ELETRONICA DE ESTRATEGIA E NEGOCIOS-REEN", "source_title": "REV ELETRONICA ESTRA", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 26.0, "sap_rank": 13358273.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE RESEARCH AIMED TO IDENTIFY THE MAIN PAPERS, AUTHORS, AND JOURNALS ON ENTREPRENEURIAL MARKETING OF STARTUPS, FROM A QUALIFIED BIBLIOGRAPHIC PORTFOLIO AND THEIR REFERENCES. TO THIS END, A BIBLIOGRAPHIC SEARCH WAS PERFORMED, USING THE PROKNOW-C (KNOWLEDGE DEVELOPMENT PROCESS - CONSTRUCTIVIST) METHOD. AS RESULT, AUDREY GILMORE; GERALD E. HILLS; IAN FILLIS; MORGAN P. MILES AND SUSSIE MORRISH ARE THE PROMINENT AUTHORS. JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP; JOURNAL OF BUSINESS RESEARCH; EUROPEAN JOURNAL OF MARKETING AND THE INTERNATIONAL SMALL BUSINESS JOURNAL ARE THE MOST RECOGNIZED AND RECEPTIVE ON THE SUBJECT. THE PAPERS OF MORRISH, MILES AND DEACON (2010) AND MORRISH (2011) STOOD OUT.", "author": "RIBEIRO AMS;LACERDA RTD", "author_full_names": "RIBEIRO, ANA MARIA SIMOES;LACERDA, ROGERIO TADEU DE OLIVEIRA", "country": "BRAZIL"}, {"id": "ALKUFAHY A, 2023", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE MODERATING ROLE OF SOCIAL MEDIA MARKETING ON THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING STRATEGY AND BUSINESS OUTCOMES: AN EMPIRICAL STUDY IN SMES IN JORDAN", "year": 2023, "journal": "JOURNAL OF SYSTEM AND MANAGEMENT SCIENCES", "source_title": "", "doi": "10.33168/JSMS.2023.0418", "internal_indegree": 0.0, "internal_outdegree": 23.0, "sap_rank": 63334255.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE CURRENT MARKETING METHODS HAVE CHANGED RESULTING IN EMERGING MARKETING ACTIVITIES AND TOOLS THAT CONTRIBUTE TO BUSINESS DEVELOPMENT AND SUCCESS. THUS, THE KEY AIM OF THIS STUDY IS TO EXAMINE THE EFFECT OF ENTREPRENEURIAL MARKETING STRATEGIES ON BUSINESS OUTCOMES OF SMALL AND MEDIUM ENTERPRISES (SMES) IN JORDAN BY EXAMINING THE MODERATION ROLE OF SOCIAL MEDIA MARKETING. THE STUDY APPLIED A QUANTITATIVE RESEARCH APPROACH BY TARGETING A SAMPLE OF 321 SMES, OWNERS, AND MANAGERS TO PARTICIPATE IN THIS STUDY USING A RANDOM SAMPLING APPROACH THROUGH A SURVEY INSTRUMENT THAT HAS BEEN DISTRIBUTED FOR THE PRIMARY DATA COLLECTION METHOD. THE RESULTS FOUND THROUGH STRUCTURAL EQUATION MODELING SEM SIGNIFICANT POSITIVE EFFECTS OF THE DIFFERENT ENTREPRENEURIAL MARKETING STRATEGIES (VALUE CREATION, CUSTOMER INTENSITY, OPPORTUNITY FOCUS, AND INNOVATIVENESS) ON THE BUSINESS OUTCOMES OF SMES. FURTHER, SOCIAL MEDIA MARKETING ALSO MODERATED THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING STRATEGY AND BUSINESS OUTCOMES. THE DISCUSSIONS CONFIRMED THE KEY ROLE OF THESE STRATEGIES TO ACHIEVE THE BUSINESS GOALS OF THE SMES. THE STUDY IMPLICATIONS ARE RELATED TO THE THEORY AND PRACTICE OF ENTREPRENEURIAL MARKETING STRATEGIES WITH INTEGRATION THE OF SOCIAL MEDIA MARKETING TOOLS FOR GREATER SOURCES OF COMPETITIVENESS AND MARKET POSITIONING.  2023, SUCCESS CULTURE PRESS. ALL RIGHTS RESERVED.", "author": "ALKUFAHY A.M.; QAWASMEH F.M.; ALJAWARNEH N.M.; AL DAABSEH T.K.I.", "author_full_names": "AMER MUFLIH ALKUFAHY; FARID MOHAMMAD QAWASMEH; MOHAMMAD ALJAWARNEH; TARIQ KHAIRO; ISSA AL DAABSEH; M AFTAB; A AZIZ; B ABDULLAH; A REHMAN; H SARWAR; B MAJID; A NAWAL; A AFTHANORHAN; Z AWANG; N AIMRAN; S AL-BAZAIAH; N ALQAHTANI; C USLAY; R BECHERER; M HELMS; J MCDONALD; J CRICK; M KARAMI; D CRICK; W DYDUCH; H EL CHAARANI; L RAIMI; S ESTRIN; T MICKIEWICZ; U STEPHAN; M WRIGHT; I ETIKAN; K BALA; C FORNELL; D LARCKER; J GUMMERUS; J HAIR; L MATTHEWS; R MATTHEWS; M SARSTEDT; J HAIR; J RISHER; M SARSTEDT; C RINGLE; S HAMALI; T HASHEM; S FREIHAT; M HENDIJANI FARD; N SEYYED AMIRI; S HIDAYATULLAH; A FIRDIANSJAH; R PATALO; A WARIS; G HILLS; C HULTMAN; S KRAUS; R SCHULTE; A HOQUE; C HULTMAN; G HILLS; D IONITA; G KHASKHELI; Z RAJPER; Q MANGI; R HUSSAIN; A SHAR; P KILENTHONG; G HILLS; C HULTMAN; Y LI; P WANG; Y LIANG; M MUSTAK; E JAAKKOLA; A HALINEN; A NIKFARJAM; S ZARIFI; C NWANKWO; M KANYANGALE; M REZVANI; M KHAZAEI; M REZVANI; Z FATHOLLAHZADEH; N SADIKU-DUSHI; V RAMADANI; M SARSTEDT; J HAIR; C RINGLE; K THIELE; S GUDERGAN; S SHEIKH; S YOUSAFZAI; F SIST; A AR; S SAEED; G SHMUELI; M SARSTEDT; J HAIR; J.-H CHEAH; H TING; S VAITHILINGAM; C RINGLE; S SIGU; A BIBOUM; E STAM; O STEPHEN; N IRENEUS; O MOSES; C STYLES; R SEYMOUR; M WYNN; P JONES; M YUSENDRA; N PARAMITASARI; L RAHMAWATI", "country": "JORDAN"}, {"id": "LOPEZ-CASTRO I, 2023, J MARK EDUC", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "LOPEZ-CASTRO I, 2023, J MARK EDUC", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 22.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "BASHA M, 2023", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "ENTREPRENEURIAL MARKETING STRATEGY AND CUSTOMER LOYALTY: AN EMPIRICAL EVIDENCE FROM COFFEE SHOPS", "year": 2023, "journal": "CORPORATE AND BUSINESS STRATEGY REVIEW", "source_title": "", "doi": "10.22495/CBSRV4I1ART16", "internal_indegree": 0.0, "internal_outdegree": 16.0, "sap_rank": 40849178.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "FOR MANY DECADES, THE MAIN FOCUS OF SUCCESSFUL BUSINESSES HAS BEEN CUSTOMER ORIENTATION. HOWEVER, THE ROLE OF THE ENTREPRENEUR IN SHAPING THE LANDSCAPE OF MARKETING AND BUSINESS PERFORMANCE WAS RECOGNIZED RECENTLY. ENTREPRENEURIAL MARKETING (EM) IS DESCRIBED AS THE MARKETING DONE BY ENTREPRENEURS OR BUSINESS OWNERS OF ENTREPRENEURIAL BUSINESSES BY EMPLOYING DIFFERENT STRATEGIES THAT ARE DISTINCT FROM THE TYPICAL TEXTBOOK MARKETING TO ATTRACT NEW BUSINESSES. IN EM, THE ENTREPRENEUR IS A CRUCIAL ACTOR IN THE MARKETING PROCESS (ADEL ET AL., 2020). GROUNDED ON THE CONCEPT OF ENTREPRENEURIAL MARKETING AND BUSINESS PERFORMANCE, THE AIM OF THIS STUDY REVOLVES AROUND ANALYSING THE RELATIONSHIP AMONG ENTREPRENEURIAL MARKETING, BUSINESS PERFORMANCE, ANTECEDENTS OF ENTREPRENEUR, AND CUSTOMER LOYALTY. SIX HUNDRED CUSTOMERS WHO REGULARLY VISIT THE COFFEE SHOPS IN MUWAILEH, SHARJAH, WERE A PART OF THIS STUDY. THE STUDY USED A DESCRIPTIVE RESEARCH METHOD. ENTREPRENEURIAL MARKETING WAS MEASURED USING FIVE SUB-VARIABLES NAMELY, PRODUCT STRATEGY, PRICING STRATEGY, PROMOTION STRATEGY, BEHAVIOURAL STRATEGY, AND LOCALITY/AREA CHARACTERISTICS (AL-SHAIKH, 2022). STATISTICAL TECHNIQUES LIKE DESCRIPTIVE ANALYSIS, RELIABILITY ANALYSIS, STRUCTURAL EQUATION MODELLING (SEM), AND MEAN COMPARISON TESTS WERE PERFORMED IN THIS STUDY. THE STUDY FOUND THAT ALL THE FACTORS OF ENTREPRENEURIAL MARKETING HAVE A SIGNIFICANT IMPACT ON BUSINESS PERFORMANCE. IT WAS ALSO EVIDENT FROM THE STUDY THAT THE ANTECEDENT OF ENTREPRENEUR, AS WELL AS CUSTOMER LOYALTY, HAVE A POSITIVE INFLUENCE ON BUSINESS PERFORMANCE.  2023 THE AUTHORS.", "author": "BASHA M.B.; GHAFAR A.; ALZAROONI M.A.; ALZOUBI H.M.; GHAZAL T.M.; ALSHURIDEH M.T.", "author_full_names": "MOHAMED BILAL BASHA; ABDUL GHAFAR; MARIAM ABDULRAHMAN ALZAROONI; HAITHAM M. ALZOUBI; TAHER M. GHAZAL; MUHAMMAD TURKI ALSHURIDEH", "country": "UNITED ARAB EMIRATES; UNITED ARAB EMIRATES; JORDAN; MALAYSIA; UNITED ARAB EMIRATES; JORDAN; UNITED ARAB EMIRATES"}, {"id": "GHOBADI SAKI E, 2023, INT J ENTREPRENEURSHIP INNOV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "GHOBADI SAKI E, 2023, INT J ENTREPRENEURSHIP INNOV", "year": 2023, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 15.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HANAYSHA J, 2022, SUSTAINABILITY", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HANAYSHA J, 2022, SUSTAINABILITY", "year": 2022, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 77.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HILAL O, 2022, J ENTERPR EMERG ECON", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HILAL O, 2022, J ENTERPR EMERG ECON", "year": 2022, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 75.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "NUVRIASARI A, 2022, QUAL ACCESS SUCCESS", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "NUVRIASARI A, 2022, QUAL ACCESS SUCCESS", "year": 2022, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 33.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HO K, 2022, J INNOV KNOWL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "HO K, 2022, J INNOV KNOWL", "year": 2022, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 26.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "AL-TATE ADS, 2022, J ASIAN FINANC ECON", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "THE IMPACT OF MARKETING CULTURE AND RATIONAL DECISION ON ACADEMIC ENTREPRENEURSHIP AND ENTREPRENEURIAL MARKETING: FIELD RESEARCH FOR IRAQI PRIVATE COLLEGES", "year": 2022, "journal": "JOURNAL OF ASIAN FINANCE ECONOMICS AND BUSINESS", "source_title": "J ASIAN FINANC ECON", "doi": "10.13106/jafeb.2022.vol9.no4.0131", "internal_indegree": 0.0, "internal_outdegree": 6.0, "sap_rank": 14525.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE RESEARCH AIMS TO TEST THE IMPACT OF MARKETING CULTURE AND RATIONAL DECISIONS IN ACADEMIC ENTREPRENEURSHIP DURING ENTREPRENEURIAL MARKETING BY FOCUSING ON THE MAIN PROBLEM AND THE CHALLENGES THAT IRAQI PRIVATE UNIVERSITIES FACE. THE MOST IMPORTANT OF THESE CHALLENGES IS PROBABLY THE INABILITY OF THE PRIVATE UNIVERSITIES TO KEEP PACE WITH THE DEVELOPMENT AND THE ENVIRONMENTAL CHALLENGES. THE RESEARCHER CHOSE 26 PRIVATE IRAQI UNIVERSITIES/COLLEGES FOR THE STUDY. THE SAMPLE WAS TAKEN FROM DEANS, ASSISTANT DEANS, AND HEADS OF DEPARTMENTS, WITH 310 PEOPLE DISTRIBUTED AMONG THE VARIOUS COLLEGES. THE RESEARCHER USED THE ELECTRONIC QUESTIONNAIRE AS A TOOL FOR COLLECTING INFORMATION. DATA ANALYSIS WAS BASED ON THE (SPSS) AND (AMOS) PROGRAMS. THE RESEARCHERS ARRIVED AT MANY CONCLUSIONS. THE MOST IMPORTANT FINDING WAS THE IMPACT ON BOTH THE MARKETING CULTURE AND RATIONAL DECISION ON ACADEMIC ENTREPRENEURSHIP THROUGH ENTREPRENEURIAL MARKETING. THE HIGHER ADMINISTRATION IN THE IRAQI PRIVATE UNIVERSITIES/COLLEGES ALWAYS STRIVE TO ADHERE TO THE MARKETING VALUES, NORMS AND TRADITIONS THROUGH A COMMITMENT TO RATIONAL DECISIONS TO ACHIEVE ACADEMIC ENTREPRENEURSHIP. THE HIGHER ADMINISTRATORS INCREASE THEIR COMMITMENT AND ADHERENCE TO THIS INFLUENCE BY ADHERING TO MARKETING ENTREPRENEURSHIP.", "author": "AL-TATE ADS;ALSTEDE YBAH", "author_full_names": "AL-TATE, AHMED DHEVAULDEEN SALAHALDIN;ALSTEDE, YAM B. A. HUSSEIN", "country": "IRAQ; IRAQ"}, {"id": "BACHMANN J, 2021, IND MARK MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "BACHMANN J, 2021, IND MARK MANAGE", "year": 2021, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 94.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "NGUYEN T, 2021, J STRATEG MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "recent frontier paper", "subgroup_label": "recent frontier paper", "title": "NGUYEN T, 2021, J STRATEG MARK", "year": 2021, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 40.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "ANTUNES H, 2020, INT J MARKET COMMUN", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING: CONCEPTUAL SYSTEMATIZATION IN ENGLISH AND PORTUGUESE LANGUAGES", "year": 2020, "journal": "INTERNATIONAL JOURNAL OF MARKETING COMMUNICATION AND NEW MEDIA", "source_title": "INT J MARKET COMMUN", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 53.0, "sap_rank": 10240294.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS STUDY AIMS TO PROVIDE A MEANINGFUL CONTRIBUTION TO THE THEORETICAL FIELD OF ENTREPRENEURIAL MARKETING (EM), BY LISTING A CONCEPTUAL SYSTEMATIZATION OF THE EM FIELD, CONSIDERING ITS EVOLUTION IN RECENT DECADES. AN EXTENSIVE SEARCH HAS BEEN CARRIED OUT IN THE DATABASE WEB OF SCIENCE WITH THE TERM \"ENTREPR * MARKETING\". THE SELECTION INCLUDED THE YEARS FROM 1900 TO 2016, IN ENGLISH AND PORTUGUESE AND THE RESEARCH WAS CONDUCTED ON 12 DECEMBER 2016. IT WAS COMPILED A BIBLIOGRAPHY OF ALL PUBLICATIONS RELATED TO THE RESEARCH (49 ARTICLES), IN THIS DATABASE. THE SYSTEMATIZATION OF CONCEPTS PRESENTED CAN BE USED BY MANAGERS IN DEFINING STRATEGY AND PLANNING POLICIES OF EM. OUR FINDINGS DETAIL THREE CLUSTERS IN EM RESEARCH, WHICH HELP IN CONTEXTUALISING THE LITERATURE REVIEW: (1) CLUSTER 1 - ENTREPRENEURIAL MARKETING PROCESS; (2) CLUSTER 2 - INTERNATIONAL NEW VENTURE; (3) CLUSTER 3 - ENTREPRENEURIAL ORIENTATION. THIS WORK CONTRIBUTES TO A BETTER UNDERSTANDING OF THE CONCEPTS, THEIR THREAD IN THE THEORETICAL FIELD, ITS EVOLUTION IN RECENT DECADES, LISTING A CONCEPTUAL SYSTEMATIZATION. THIS STUDY SEEKS TO CONVEY A LARGE THEORETICAL BASIS THAT MAY SERVE AS THE POINT OF DEPARTURE FOR FUTURE STUDIES.", "author": "ANTUNES H;LOPES J;SOUSA A", "author_full_names": "ANTUNES, HELDER;LOPES, JOAO;SOUSA, ANA", "country": "PORTUGAL; PORTUGAL; PORTUGAL; PORTUGAL; PORTUGAL"}, {"id": "CRICK J, 2020, J BUS RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "CRICK J, 2020, J BUS RES", "year": 2020, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 51.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "JENSON I, 2020, J BUS RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "AN ENTREPRENEURIAL MARKETING PROCESS PERSPECTIVE OF THE ROLE OF INTERMEDIARIES IN PRODUCING INNOVATION OUTCOMES", "year": 2020, "journal": "JOURNAL OF BUSINESS RESEARCH", "source_title": "J BUS RES", "doi": "10.1016/j.jbusres.2019.09.054", "internal_indegree": 0.0, "internal_outdegree": 16.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE ACTIVITIES OF INNOVATION SYSTEM ACTORS, PARTICULARLY THE IMPORTANCE OF NETWORKS, ENTREPRENEURS, AND THE ROLE OF INTERMEDIARIES HAVE NOT YET BEEN INTEGRATED INTO A FRAMEWORK THAT EXPLAINS INNOVATION SYSTEM PERFORMANCE AT THE PROJECT LEVEL. THIS STUDY CONTRIBUTES BY EXPLORING THE ROLE OF THE INNOVATION SYSTEM'S ACTORS WITH RESPECT TO ITS PERFORMANCE. INNOVATION SYSTEM PERFORMANCE IS STUDIED USING MULTIPLE CASES OF PROJECTS USING STATISTICAL INFERENCE, NETWORK ANALYSIS, AND FUZZY-SET QUALITATIVE COMPARATIVE ANALYSIS. THE NUMBER OF ACTORS EFFECTIVELY INVOLVED IN PROJECTS IS POSITIVELY ASSOCIATED WITH INNOVATION SYSTEM PERFORMANCE. THE NETWORK OF RELATIONSHIPS IN THE CASE STUDY INNOVATION SYSTEM WAS RELATIVELY OPEN, SUCH THAT THE CONTRIBUTION OF SOME ACTORS ONLY BECAME AVAILABLE TO THE SYSTEM THROUGH THE CONDUIT OF OTHER ACTORS. BOTH RESEARCHERS AND INTERMEDIARIES ARE HIGHLY INVOLVED AND EFFECTIVE, AND THE INTERMEDIARIES' EFFECTIVENESS CONTRIBUTES TO INNOVATION SYSTEM PERFORMANCE. HOWEVER, THE PERCEIVED INVOLVEMENT OR EFFECTIVENESS OF THESE AND OTHER ACTORS DID NOT, ALONE, ENSURE THAT THE CONDITIONS REQUIRED FOR INNOVATION SYSTEM PERFORMANCE WERE MET. THE RESEARCH METHOD AND RESULTS APPLY TO ANY INNOVATION PROJECT, PARTICULARLY THOSE IN HIGHLY REGULATED, TECHNOLOGICAL FIELDS. THE PRESENT STUDY'S FINDINGS DEMONSTRATE THE APPLICATION OF INNOVATION SYSTEM THEORY AT THE PROJECT LEVEL. THE STUDY HAS IMPORTANT IMPLICATIONS FOR INTEGRATING ENTREPRENEURIAL MARKETING INTO INNOVATION SYSTEM POLICY AND PRACTICE.", "author": "JENSON I;DOYLE R;MILES MP", "author_full_names": "IAN JENSON; RB DOYLE; MORGAN P. MILES", "country": "AUSTRALIA; AUSTRALIA; AUSTRALIA"}, {"id": "SIGUE S, 2020, J AFR BUS", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "SIGUE S, 2020, J AFR BUS", "year": 2020, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 16.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HAKEMZADEH F, 2020, INT J NONLINEAR ANAL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "PROVIDING A QUANTITATIVE MODEL FOR MANAGEMENT OF ENTREPRENEURIAL MARKETING IN THE MICROELECTRONICS INDUSTRY", "year": 2020, "journal": "INTERNATIONAL JOURNAL OF NONLINEAR ANALYSIS AND APPLICATIONS", "source_title": "INT J NONLINEAR ANAL", "doi": "10.22075/IJNAA.2020.4749", "internal_indegree": 0.0, "internal_outdegree": 9.0, "sap_rank": 103974.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "NOWADAYS, ORGANIZATIONS THAT COMBINE MARKETING AND ENTREPRENEURIAL ACTIVITIES ACT BETTER IN DISCOVERING AND EXPLOITING NEW OPPORTUNITIES OF THE MARKET. ONE OF THE MAIN ADVANTAGES OF THE ENTREPRENEURSHIP CONCEPT IN THE MARKETING IS ITS CAPABILITY TO RESPOND TO AN EVER-CHANGING ENVIRONMENT. WHEN ENTREPRENEURS ARE LOOKING FOR NEW OPPORTUNITIES REGARDING LIMITED RESOURCES, THEY MUST ADOPT AN INNOVATIVE APPROACH TO DEALING WITH THESE UNCERTAINTIES. THIS STUDY AIMS TO IDENTIFY, PRIORITIZE AND VALIDATE THE COMPONENTS AFFECTING ENTREPRENEURSHIP IN MARKETING IN THE MICROELECTRONICS INDUSTRY. IN THIS RESEARCH, CONFIRMATORY FACTOR ANALYSIS HAS BEEN USED TO ANALYZE THE TOOLS OF STUDY. NEXT, DESCRIPTIVE INDICATORS OF RESEARCH VARIABLES (I.E. MEAN AND STANDARD DEVIATION) HAVE BEEN REPORTED. THEN, STRUCTURAL EQUATION METHOD HAS BEEN UTILIZED IN ORDER TO EVALUATE THE CAUSAL RELATIONSHIPS BETWEEN VARIABLES. FINALLY, FRIEDMAN TEST HAS BEEN APPLIED TO PRIORITIZE THE RESEARCH VARIABLES. THE FINDINGS SHOWED THAT 22% OF EMPLOYMENT VARIANCE, 31% OF MARKET PERFORMANCE VARIANCE, 28% OF CUSTOMER ORIENTATION VARIANCE, 46% OF PRODUCT MARKETING VARIANCE, 34% OF MARKETABILITY VARIANCE AND 53% OF ENTREPRENEURIAL MARKETING VARIANCE CAN BEEN EXPLAINED BY THE VARIABLES OF THE RESEARCH MODEL. ALSO, THE FIT INDICES OBTAINED FOR THE TESTED MODEL SHOWED THAT THE RMSEA INDEX IN THE ESTIMATED MODEL HAS AN ACCEPTABLE LEVEL WITH VALUE OF 0.064 AND OTHER FIT INDICES SUCH AS CFI, GFI, NFI, AND AGFI ARE EQUAL TO 0.97, 0.94, 0.95 AND 0.92, RESPECTIVELY INDICATING GOOD LEVELS. THESE CHARACTERISTICS FOR GOODNESS OF FIT CONFIRM THAT THE DATA OF CURRENT STUDY FITS WELL WITH THE FACTOR STRUCTURE OF THE MODEL AND HENCE THE ENTREPRENEURIAL MARKETING IS VALID AND APPLICABLE IN THE MICROELECTRONICS INDUSTRY.", "author": "HAKEMZADEH F;VAZIFEHDOUST H;KASHANI FH", "author_full_names": "HAKEMZADEH, FARSHAD;VAZIFEHDOUST, HOSSEIN;KASHANI, FARIDEH HAGHSHENAS", "country": "IRAN; IRAN; IRAN"}, {"id": "ZAINUALDIN A, 2019", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "EXAMINING ENTREPRENEURIAL MARKETING BEHAVIOURS IN SOCIAL ENTERPRISES", "year": 2019, "journal": "HUMANITIES AND SOCIAL SCIENCES REVIEWS", "source_title": "", "doi": "10.18510/HSSR.2019.7249", "internal_indegree": 0.0, "internal_outdegree": 57.0, "sap_rank": 138457.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE OF STUDY: IN THIS PAPER, THE SIGNIFICANCE AND JUSTIFICATION FOR STUDYING ENTREPRENEURSHIP, MARKETING, INNOVATION AND CUSTOMER ORIENTATION (EMICO) IN THE CONTEXT OF SOCIAL ENTERPRISES IN MALAYSIA IS DISCUSSED AND ELABORATED. METHODOLOGY: EMICO IS AN EMERGING FRAMEWORK DEVELOPED BY JONES AND ROWLEY (2009) TO EXPLORE THE INTERFACE BETWEEN EACH DIMENSION IN THE CONTEXT OF SMALL AND MEDIUM-SIZED ENTERPRISES (SMES). PAST STUDIES ARE REVIEWED TO DESCRIBE AND EXPLAIN THE DIMENSIONS OF THE EMICO FRAMEWORK. IN ADDITION, LITERATURE RELATING TO THE CHARACTERISTICS OF SMES AND ENTREPRENEURS ARE REVIEWED TO BUILD THE BASIS FOR STUDYING THEIR DIRECT EFFECTS ON THE VENTURES EMICO. RESULTS: THE PAPER PUTS FORWARD PROPOSITIONS TO TEST AND VALIDATE THE RELATIONSHIP BETWEEN THE VARIABLES FOR FUTURE EMPIRICAL RESEARCH.  ZAINUALDIN ET AL.", "author": "ZAINUALDIN A.; KAMARUDIN H.S.; ABDULLAH A.; TAJUDDIN M.", "author_full_names": "ADIBAH ZAINUALDIN; HANIS SYAZWANI KAMARUDIN; ARLIZA ABDULLAH; MAZILENA TAJUDDIN", "country": "MALAYSIA; MALAYSIA; MALAYSIA"}, {"id": "RIZVANDI A, 2019, J HUM SPORT EXERC", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING EFFECTS ON SPORT CLUB MANAGER PERFORMANCE (CONCEPTUAL MODEL)", "year": 2019, "journal": "JOURNAL OF HUMAN SPORT AND EXERCISE", "source_title": "J HUM SPORT EXERC", "doi": "10.14198/jhse.2019.14.Proc5.47", "internal_indegree": 0.0, "internal_outdegree": 29.0, "sap_rank": 128212.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "SINCE SPORT ENTREPRENEURSHIP HAS RECENTLY BEEN PROVED CRITICAL TO THE SPORT INDUSTRY SUCCESS, HEREIN, WE TESTED CONCEPTUAL MODEL OF ENTREPRENEURIAL MARKETING FOR SPORT CLUB MANAGERS IN TEHRAN, IRAN. IN ORDER TO ASSESS ENTREPRENEURIAL MARKETING, CLUB NATURE, PERFORMANCE SCALE, MARKET ORIENTATION, AND ENTREPRENEURSHIP ORIENTATION, STANDARDIZED METHODS OF MEASUREMENTS WERE APPLIED. THE FACE AND CONTENT VALIDITY OF THE RESEARCH TOOLS WERE CONFIRMED BY EXPERTS OF SPORT MARKETING WHILE THE CONSTRUCT VALIDITY WAS AFFIRMED BY CONFIRMATORY FACTOR ANALYSIS (CFA). STRUCTURAL EQUATION MODELLING (SME) WAS ESTIMATED USING PARTIAL LEAST SQUARES METHOD IN SMART PLS SOFTWARE. OUR RESULTS DEMONSTRATED THAT EXCEPT FOR ENTREPRENEURSHIP ORIENTATION, THERE WAS A POSITIVE AND SIGNIFICANT RELATIONSHIP BETWEEN ALL VARIABLES AND ORGANIZATIONAL PERFORMANCE. MOREOVER, A POSITIVE AND SIGNIFICANT RELATIONSHIP WAS ALSO DETECTED BETWEEN ALL VARIABLES, EXCEPT FOR MARKET ORIENTATION, AND ENTREPRENEURIAL MARKETING. ACCORDING TO THE GOODNESS OF FIT, THE MODEL FITNESS WAS GOOD (0.621).", "author": "RIZVANDI A;TOJARI F", "author_full_names": "AYE RIZVANDI; FARSHAD TOJARI", "country": "IRAN; IRAN"}, {"id": "HENDIJANI FARD M, 2018, J ISLAM MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "HENDIJANI FARD M, 2018, J ISLAM MARK", "year": 2018, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 71.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "CRICK J, 2018, QUAL MARK RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "CRICK J, 2018, QUAL MARK RES", "year": 2018, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 27.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "KIM JJ, 2018, SUSTAINABILITY-BASEL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING AND AIRLINE-CAUSE SPONSORSHIP CONGRUENCE: PASSENGER SPONSORSHIP RESPONSE TO US-BASED FULL-SERVICE AIRLINES", "year": 2018, "journal": "SUSTAINABILITY", "source_title": "SUSTAINABILITY-BASEL", "doi": "10.3390/su10072359", "internal_indegree": 0.0, "internal_outdegree": 26.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "CAUSE SPONSORSHIP IS ONE OF THE MOST FREQUENTLY USED CAUSE-RELATED MARKETING (CRM) STRATEGIES FOR EXTENDING BRAND IMAGE, OFTEN THROUGH STRATEGIC ALLIANCES WITH NONPROFIT ORGANIZATIONS. WHILST AIRLINES' CORPORATE SOCIAL RESPONSIBILITY (CSR) INITIATIVES HAVE RECEIVED FOCUSED ATTENTION IN THE SUSTAINABLE TOURISM LITERATURE, THE EFFECTIVE DEVELOPMENT OF CAUSE SPONSORSHIP HAS NOT BEEN UNDERSTOOD. IN PARTICULAR, AN UNDERSTANDING OF AIRLINES' CAUSE SPONSORSHIP OF NON-SPORTS RELATED CHARITABLE CAUSES AND THEIR INFLUENCE ON PERCEIVED CONGRUENCE BETWEEN THE AIRLINE AND ITS ASSOCIATED CAUSES ARE LIMITED. IN ORDER TO ADDRESS THIS GAP, THE STUDY DELVES INTO THE INTERSECTION OF ENTREPRENEURIAL MARKETING AND SPONSORSHIP OF ENVIRONMENTAL AND/OR SOCIAL CAUSES. IT INVESTIGATES THE STRUCTURAL RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING, CONGRUENCE, FAVORABILITY TOWARD THE AIRLINE, AND PURCHASE INTENTION BY ANALYZING A SAMPLE OF 443 TRAVELERS ON US-BASED FULL-SERVICE AIRLINES USING STRUCTURAL EQUATION MODELING (SEM). THE

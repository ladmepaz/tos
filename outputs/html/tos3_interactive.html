  <script>
    const records = [{"id": "MILLER D, 1983, MANAGE SCI", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_2", "subgroup_label": "orientation; market; performance; construct; effects", "title": "THE CORRELATES OF ENTREPRENEURSHIP IN THREE TYPES OF FIRMS", "year": 1983, "journal": "MANAGEMENT SCIENCE", "doi": "10.1287/MNSC.29.7.770", "citations_received": 26.0, "citation_velocity": 0.5909090909090909, "size": 14.0, "color": "#C4AE97", "notes": "Foundational paper in a root subtopic.", "abstract": "The objective of the research was to discover the chief determinants of entrepreneurship, the process by which organizations renew themselves and their markets by pioneering, innovation, and risk taking. Some authors have argued that personality factors of the leader are what determine entrepreneurship, others have highlighted the role played by the structure of the organization, while a final group have pointed to the importance of strategy making. We believed that the manner and extent to which entrepreneurship would be influenced by all of these factors would in large measure depend upon the nature of the organization. Based upon the work of a number of authors we derived a crude typology of firms: Simple firms are small and their power is centralized at the top. Planning firms are bigger, their goal being smooth and efficient operation through the use of formal controls and plans. Organic firms strive to be adaptive to their environments, emphasizing expertise-based power and open communications. The predictiveness of the typology was established upon a sample of 52 firms using hypothesis-testing and analysis of variance techniques. We conjectured that in Simple firms entrepreneurship would be determined by the characteristics of the leader; in Planning firms it would be facilitated by explicit and well integrated product-market strategies, and in Organic firms it would be a function of environment and structure. These hypotheses were largely borne out by correlational and multiple regression analyses. Any programs which aim to stimulate entrepreneurship would benefit greatly from tailoring recommendations to the nature of the target firms.", "author": "", "author_full_names": "DANNY MILLER", "country": "", "source_title": "MANAGE SCI"}, {"id": "MATSUNO K, 2002, J MARKETING", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_2", "subgroup_label": "orientation; market; performance; construct; effects", "title": "THE EFFECTS OF ENTREPRENEURIAL PROCLIVITY AND MARKET ORIENTATION ON BUSINESS PERFORMANCE", "year": 2002, "journal": "JOURNAL OF MARKETING", "doi": "10.1509/JMKG.66.3.18.18507", "citations_received": 24.0, "citation_velocity": 0.96, "size": 14.0, "color": "#B69D86", "notes": "Foundational paper in a root subtopic.", "abstract": "The recent literature suggests a potential tension between market orientation and entrepreneurial proclivity in achieving superior business performance. This is unsettling for marketers, because it could mean that being market oriented is detrimental to a firm that is also trying to be entrepreneurial and successful. To examine this unnerving potential, the authors investigate structural influences (both direct and indirect) of entrepreneurial proclivity and market orientation on business performance. The results indicate that entrepreneurial proclivity has not only a positive and direct relationship on market orientation but also an indirect and positive effect on market orientation through the reduction of departmentalization. The results also suggest that entrepreneurial proclivity's performance influence is positive when mediated by market orientation but negative or nonsignificant when not mediated by market orientation. The authors also provide a discussion and future research implications.", "author": "", "author_full_names": "KEN MATSUNO; JOHN T. MENTZER; AYSEGUL OZSOMER", "country": "", "source_title": "J MARKETING"}, {"id": "LUMPKIN GT, 1996, ACAD MANAGE REV", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_2", "subgroup_label": "orientation; market; performance; construct; effects", "title": "CLARIFYING THE ENTREPRENEURIAL ORIENTATION CONSTRUCT AND LINKING IT TO PERFORMANCE", "year": 1996, "journal": "ACADEMY OF MANAGEMENT REVIEW", "doi": "10.2307/258632", "citations_received": 47.0, "citation_velocity": 1.5161290322580645, "size": 26.0, "color": "#A48972", "notes": "Foundational paper in a root subtopic.", "abstract": "THE PRIMARY PURPOSE OF THIS ARTICLE IS TO CLARIFY THE NATURE OF THE ENTREPRENEURIAL ORIENTATION (EO) CONSTRUCT AND TO PROPOSE A CONTINGENCY FRAMEWORK FOR INVESTIGATING THE RELATIONSHIP BETWEEN EO AND FIRM PERFORMANCE. WE FIRST EXPLORE AND REFINE THE DIMENSIONS OF EO AND DISCUSS THE USEFULNESS OF VIEWING A FIRM'S EO AS A MULTIDIMENSIONAL CONSTRUCT. THEN, DRAWING ON EXAMPLES FROM THE EO-RELATED CONTINGENCIES LITERATURE, WE SUGGEST ALTERNATIVE MODELS (MODERATING EFFECTS, MEDIATING EFFECTS, INDEPENDENT EFFECTS, INTERACTION EFFECTS) FOR TESTING THE EO-PERFORMANCE RELATIONSHIP.", "author": "LUMPKIN G.T.; DESS G.G.", "author_full_names": "G. T. LUMPKIN; GREGORY G. DESS", "country": "", "source_title": "ACAD MANAGE REV"}, {"id": "NARVER JC, 1990, J MARKETING", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_2", "subgroup_label": "orientation; market; performance; construct; effects", "title": "THE EFFECT OF A MARKET ORIENTATION ON BUSINESS PROFITABILITY", "year": 1990, "journal": "JOURNAL OF MARKETING", "doi": "10.2307/1251757;10.1177/002224299005400403", "citations_received": 53.0, "citation_velocity": 1.4324324324324325, "size": 30.0, "color": "#A68C75", "notes": "Foundational paper in a root subtopic.", "abstract": "MARKETING ACADEMICIANS AND PRACTITIONERS HAVE BEEN OBSERVING FOR MORE THAN THREE DECADES THAT BUSINESS PERFORMANCE IS AFFECTED BY MARKET ORIENTATION, YET TO DATE THERE HAS BEEN NO VALID MEASURE OF A MARKET ORIENTATION AND HENCE NO SYSTEMATIC ANALYSIS OF ITS EFFECT ON A BUSINESS'S PERFORMANCE. THE AUTHORS REPORT THE DEVELOPMENT OF A VALID MEASURE OF MARKET ORIENTATION AND ANALYZE ITS EFFECT ON A BUSINESS'S PROFITABILITY. USING A SAMPLE OF 140 BUSINESS UNITS CONSISTING OF COMMODITY PRODUCTS BUSINESSES AND NONCOMMODITY BUSINESSES, THEY FIND A SUBSTANTIAL POSITIVE EFFECT OF A MARKET ORIENTATION ON THE PROFITABILITY OF BOTH TYPES OF BUSINESSES.", "author": "NARVER J.C.; SLATER S.F.", "author_full_names": "JOHN C. NARVER; STANLEY F. SLATER", "country": "", "source_title": "J MARKETING"}, {"id": "KOHLI AK, 1990, J MARKETING", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_2", "subgroup_label": "orientation; market; performance; construct; effects", "title": "MARKET ORIENTATION: THE CONSTRUCT, RESEARCH PROPOSITIONS, AND MANAGERIAL IMPLICATIONS", "year": 1990, "journal": "JOURNAL OF MARKETING", "doi": "10.2307/1251866", "citations_received": 27.0, "citation_velocity": 0.7297297297297297, "size": 18.0, "color": "#BEA790", "notes": "Foundational paper in a root subtopic.", "abstract": "The literature reflects remarkably little effort to develop a framework for understanding the implementation of the marketing concept. The authors synthesize extant knowledge on the subject and provide a foundation for future research by clarifying the construct's domain, developing research propositions, and constructing an integrating framework that includes antecedents and consequences of a market orientation. They draw on the occasional writings on the subject over the last 35 years in the marketing literature, work in related disciplines, and 62 field interviews with managers in diverse functions and organizations. Managerial implications of this research are discussed.", "author": "", "author_full_names": "AJAY K. KOHLI; BERNARD J. JAWORSKI", "country": "", "source_title": "J MARKETING"}, {"id": "MORRIS MH, 2002, J MARKET THEORY PRAC", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_1", "subgroup_label": "marketing; historical; perspective; entrepreneurial; discusses", "title": "ENTREPRENEURIAL MARKETING: A CONSTRUCT FOR INTEGRATING EMERGING ENTREPRENEURSHIP AND MARKETING PERSPECTIVES", "year": 2002, "journal": "THE JOURNAL OF MARKETING THEORY AND PRACTICE", "doi": "10.1080/10696679.2002.11501922", "citations_received": 226.0, "citation_velocity": 9.04, "size": 30.0, "color": "#441A03", "notes": "Foundational paper in a root subtopic.", "abstract": "The purpose of this paper is to critically explore the construct of entrepreneurial marketing (EM). This term is used as an integrative conceptualization that reflects such alternative perspectives as guerrilla marketing, radical marketing, expeditionary marketing, disruptive marketing and others. Seven core dimensions of EM are identified, and an underlying theoretical foundation based on resource advantage theory is proposed. A conceptual model is introduced of key factors surrounding the phenomenon of entrepreneurial marketing. Conclusions and implications are drawn for theory and practice, and priorities are proposed for continuing research.", "author": "", "author_full_names": "MICHAEL H. MORRIS; MINET SCHINDEHUTTE; RAYMOND W. LAFORGE", "country": "", "source_title": "J MARKET THEORY PRAC"}, {"id": "COLLINSON E, 2001, MANAGEMENT DECISION", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_1", "subgroup_label": "marketing; historical; perspective; entrepreneurial; discusses", "title": "ENTREPRENEURIAL MARKETING – A HISTORICAL PERSPECTIVE ON DEVELOPMENT AND PRACTICE", "year": 2001, "journal": "MANAGEMENT DECISION", "doi": "10.1108/EUM0000000006221", "citations_received": 84.0, "citation_velocity": 3.230769230769231, "size": 26.0, "color": "#805F48", "notes": "Foundational paper in a root subtopic.", "abstract": "THIS PAPER DISCUSSES THE HISTORICAL PERSPECTIVE OF ENTREPRENEURIAL MARKETING.", "author": "COLLINSON E.; SHAW E.", "author_full_names": "ELAINE COLLINSON; ELEANOR SHAW", "country": "", "source_title": "MANAGEMENT DECISION"}, {"id": "STOKES D, 2000, J RES MARKETING ENTR", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_1", "subgroup_label": "marketing; historical; perspective; entrepreneurial; discusses", "title": "PUTTING ENTREPRENEURSHIP INTO MARKETING: THE PROCESSES OF ENTREPRENEURIAL MARKETING", "year": 2000, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/14715200080001536", "citations_received": 89.0, "citation_velocity": 3.2962962962962963, "size": 26.0, "color": "#7F5E47", "notes": "Foundational paper in a root subtopic.", "abstract": "This paper considers how marketing can be made more appropriate in entrepreneurial contexts by proposing a conceptual model of the processes of marketing as undertaken by entrepreneurs. Although marketing is a key factor in the survival and development of business ventures, a number of entrepreneurial characteristics seem to be at variance with marketing according to the textbook. These include over-reliance on a restricted customer base, limited marketing expertise, and variable, unplanned effort. However, entrepreneurs and small business owners interpret marketing in ways that do not conform to standard textbook theory and practise. An examination of four key marketing concepts indicates ways in which entrepreneurial marketing differs from traditional marketing theory. Entrepreneurs tend to be \"innovation-oriented\", driven by new ideas and intuitive market feel, rather than customer oriented, or driven by rigorous assessment of market needs. They target markets through \"bottom-up\" self-selection and recommendations of customers and other influence groups, rather than relying on \"top-down\" segmentation, targeting and positioning processes. They prefer interactive marketing methods to the traditional mix of the four or seven \"P's\". They gather information through informal networking rather than formalised intelligence systems. These processes play to entrepreneurial strengths and represent marketing that is more appropriate in entrepreneurial contexts, rather than marketing which is second best due to resource limitations.", "author": "", "author_full_names": "DAVID STOKES", "country": "", "source_title": "J RES MARKETING ENTR"}, {"id": "BARNEY J, 1991, J MANAGE", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_1", "subgroup_label": "marketing; historical; perspective; entrepreneurial; discusses", "title": "FIRM RESOURCES AND SUSTAINED COMPETITIVE ADVANTAGE", "year": 1991, "journal": "JOURNAL OF MANAGEMENT", "doi": "10.1177/014920639101700108", "citations_received": 53.0, "citation_velocity": 1.4722222222222223, "size": 22.0, "color": "#A58B74", "notes": "Foundational paper in a root subtopic.", "abstract": "Understanding sources of sustained competitive advantage has become a major area of research in strategic management. Building on the assumptions that strategic resources are heterogeneously distributed across firms and that these differences are stable over time, this article examines the link between firm resources and sustained competitive advantage. Four empirical indicators of the potential of firm resources to generate sustained competitive advantage-value, rareness, imitability, and substitutability-are discussed. The model is applied by analyzing the potential of several firm resources for generating sustained competitive advantages. The article concludes by examining implications of this firm resource model of sustained competitive advantage for other business disciplines.", "author": "", "author_full_names": "JAY B. BARNEY", "country": "", "source_title": "J MANAGE"}, {"id": "CARSON D, 1995, MARKETING AND ENTREPRENEURSHIP IN SMES - AN INNOVATIVE APPROACH", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_1", "subgroup_label": "marketing; historical; perspective; entrepreneurial; discusses", "title": "Marketing and entrepreneurship in SMEs : an innovative approach", "year": 1995, "journal": "", "doi": "", "citations_received": 26.0, "citation_velocity": 0.8125, "size": 14.0, "color": "#BBA48D", "notes": "Foundational paper in a root subtopic.", "abstract": "The primary thrust of the text is on adapting traditional marketing tools appropriate for various situations in Small and Medium Enterprises. To that end, the text approaches both the concepts of marketing and entrepreneurship at the same time and uses accepted and established marketing theories as a foundation of the text.", "author": "", "author_full_names": "", "country": "", "source_title": "MARKETING AND ENTREPRENEURSHIP IN SMES - AN INNOVATIVE APPROACH"}, {"id": "BJERKE B, 2002, ENTREPRENEURIAL MARK", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_1", "subgroup_label": "marketing; historical; perspective; entrepreneurial; discusses", "title": "Entrepreneurial Marketing: The Growth of Small Firms in the New Economic Era", "year": 2002, "journal": "", "doi": "", "citations_received": 43.0, "citation_velocity": 1.72, "size": 18.0, "color": "#9F836C", "notes": "Foundational paper in a root subtopic.", "abstract": "The aim of this book is to provide greater insights into the marketing entrepreneurship interface by demonstrating the importance of both disciplines in the new economic era. Moreover, the book has been designed for students, scholars and practitioners of marketing and entrepreneurship. The emphasis is firmly placed on the small firm operating within the new economic era and consequently, the book argues that an understanding of entrepreneurial marketing is essential in order to achieve small firm growth in this era.", "author": "", "author_full_names": "", "country": "", "source_title": "ENTREPRENEURIAL MARK"}, {"id": "SARASVATHY SD, 2001, ACAD MANAGE REV", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_3", "subgroup_label": "marketing; entrepreneurial; causation; toward; shift", "title": "CAUSATION AND EFFECTUATION: TOWARD A THEORETICAL SHIFT FROM ECONOMIC INEVITABILITY TO ENTREPRENEURIAL CONTINGENCY", "year": 2001, "journal": "ACADEMY OF MANAGEMENT REVIEW", "doi": "10.5465/AMR.2001.4378020", "citations_received": 50.0, "citation_velocity": 1.9230769230769231, "size": 30.0, "color": "#9A7D66", "notes": "Foundational paper in a root subtopic.", "abstract": "SARAS D. SARASVATHY, CAUSATION AND EFFECTUATION: TOWARD A THEORETICAL SHIFT FROM ECONOMIC INEVITABILITY TO ENTREPRENEURIAL CONTINGENCY, THE ACADEMY OF MANAGEMENT REVIEW, VOL. 26, NO. 2 (APR., 2001), PP. 243-263", "author": "SARASVATHY S.D.", "author_full_names": "SARAS D. SARASVATHY", "country": "", "source_title": "ACAD MANAGE REV"}, {"id": "READ S, 2009, J MARKETING", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_3", "subgroup_label": "marketing; entrepreneurial; causation; toward; shift", "title": "MARKETING UNDER UNCERTAINTY: THE LOGIC OF AN EFFECTUAL APPROACH", "year": 2009, "journal": "JOURNAL OF MARKETING", "doi": "10.1509/JMKG.73.3.001", "citations_received": 25.0, "citation_velocity": 1.3888888888888888, "size": 14.0, "color": "#A88D76", "notes": "Foundational paper in a root subtopic.", "abstract": "HOW DO PEOPLE APPROACH MARKETING IN THE FACE OF UNCERTAINTY, WHEN THE PRODUCT, THE MARKET, AND THE TRADITIONAL DETAILS INVOLVED IN MARKET RESEARCH ARE UNKNOWABLE EX ANTE? THE AUTHORS USE PROTOCOL ANALYSIS TO EVALUATE HOW 27 EXPERT ENTREPRENEURS APPROACH SUCH A PROBLEM COMPARED WITH 37 MANAGERS WITH LITTLE ENTREPRENEURIAL EXPERTISE (ALL 64 PARTICIPANTS ARE ASKED TO THINK ALOUD AS THEY MAKE MARKETING DECISIONS IN EXACTLY THE SAME UNPREDICTABLE SITUATION). THE HYPOTHESES ARE DRAWN FROM LITERATURE IN COGNITIVE SCIENCE ON (1) EXPERTISE IN GENERAL AND (2) ENTREPRENEURIAL EXPERTISE IN PARTICULAR. THE RESULTS SHOW SIGNIFICANT DIFFERENCES IN HEURISTICS USED BY THE TWO GROUPS. WHILE THOSE WITHOUT ENTREPRENEURIAL EXPERTISE RELY PRIMARILY ON PREDICTIVE TECHNIQUES, EXPERT ENTREPRENEURS TEND TO INVERT THESE. IN PARTICULAR, THEY USE AN EFFECTUAL OR NONPREDICTIVE LOGIC TO TACKLE UNCERTAIN MARKET ELEMENTS AND TO COCONSTRUCT NOVEL MARKETS WITH COMMITTED STAKEHOLDERS.", "author": "READ S.; DEW N.; SARASVATHY S.D.; SONG M.; WILTBANK R.", "author_full_names": "STUART READ; NICHOLAS DEW; SARAS D. SARASVATHY; MICHAEL SONG; ROBERT WILTBANK", "country": "", "source_title": "J MARKETING"}, {"id": "GILMORE A, 2011, J RES MARK ENTREP", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_3", "subgroup_label": "marketing; entrepreneurial; causation; toward; shift", "title": "ENTREPRENEURIAL AND SME MARKETING", "year": 2011, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/14715201111176426", "citations_received": 32.0, "citation_velocity": 2.0, "size": 22.0, "color": "#987B64", "notes": "Foundational paper in a root subtopic.", "abstract": "Purpose The purpose of this paper is to consider marketing and its relevance to entrepreneurs and small to medium-sized enterprises (SMEs), and how entrepreneurs and SMEs owner/managers adapt and use marketing for their specific requirements during the life of an enterprise. Initially, the paper will give some background to the subject, including how entrepreneurs and SMEs owner/managers are defined and their value to the economy. Design/methodology/approach The discussion draws from the academic literature and from experience of working with entrepreneurs and SMEs over a number of years. The background characteristics and frameworks of entrepreneurial and SMEs marketing are considered, with emphasis on a pragmatic approach, to try to understand how entrepreneurs and SMEs actually \"do\" business. Findings The main body of the paper focuses on the nature of entrepreneurial marketing typically used by SMEs. The key themes of the discussion are how entrepreneurs and SME owner/managers adapt standard marketing frameworks to suit their own enterprises, how they use networks to improve their business activity, the use and development of marketing management competencies and how they try to use and develop innovative marketing. Research limitations/implications Finally, the paper comments on the inter-relationships and relevance of entrepreneurship and marketing for each other. Originality/value In practice, entrepreneurial and SMEs marketing is quite different from the marketing frameworks described in the standard marketing textbooks used to teach most undergraduate students. This paper illustrates how entrepreneurs and SMEs adapt and use marketing according to the needs of their enterprises.", "author": "", "author_full_names": "AUDREY GILMORE", "country": "", "source_title": "J RES MARK ENTREP"}, {"id": "HILLS G, 2011, JOURNAL OF SMALL BUSINESS AND ENTREPRENEURSHIP", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_3", "subgroup_label": "marketing; entrepreneurial; causation; toward; shift", "title": "ACADEMIC ROOTS: THE PAST AND PRESENT OF ENTREPRENEURIAL MARKETING", "year": 2011, "journal": "JOURNAL OF SMALL BUSINESS & ENTREPRENEURSHIP", "doi": "10.1080/08276331.2011.10593521", "citations_received": 41.0, "citation_velocity": 2.5625, "size": 26.0, "color": "#8C6D56", "notes": "Foundational paper in a root subtopic.", "abstract": "Research in entrepreneurial marketing is about 30 years old. During this period research has followed many trajectories. Two important but divergent routes are small business marketing and entrepreneurial marketing, mirroring the discourse of small businesses versus entrepreneurial firms. Today, small business marketing and entrepreneurial marketing are regarded as separate but related research fields. Entrepreneurial marketing research has been very open-minded towards different approaches in methodology, especially compared to research within mainstream marketing in the US. During this rather long period of time, advances in other disciplines have been beneficial for our own research. One such example is the development of effectuation theory allowing us to understand entrepreneurial decision-making and, consequently, important aspects of entrepreneurial marketing behaviour. Many of the research questions regarded as important by scholars in a panel in 1986 when interest in marketing and entrepreneurship was evolving are still regarded as important (e.g. new venture growth). Other issues have lost their relevance. But, overall, many important questions still are waiting for an answer and the whole field of entrepreneurial marketing offers tremendous research opportunities.", "author": "", "author_full_names": "GERALD E. HILLS; CLAES M. HULTMAN", "country": "", "source_title": "JOURNAL OF SMALL BUSINESS AND ENTREPRENEURSHIP"}, {"id": "HANSEN DJ, 2010, J RES MARK ENTREP", "role": "root", "role_label": "Roots", "visual_symbol": "brown circle", "subgroup": "subtopic_3", "subgroup_label": "marketing; entrepreneurial; causation; toward; shift", "title": "THE MARKETING/ENTREPRENEURSHIP INTERFACE: A REPORT ON THE “CHARLESTON SUMMIT”", "year": 2010, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/14715201011060867", "citations_received": 24.0, "citation_velocity": 1.411764705882353, "size": 14.0, "color": "#A78D76", "notes": "Foundational paper in a root subtopic.", "abstract": "Purpose A group of researchers met in Charleston, South Carolina, USA to discuss the past and future of the marketing/entrepreneurship interface. The purpose of this paper is to summarize main discussions from the three-day summit. Design/methodology/approach Roughly 16 hours of presentations and discussions were digitally recorded. The lead author reviewed the recordings making copious notes, which were organized into 17 themes for further analysis. Future research directions based on discussion around the most poignant themes are reported. Findings The paper presents nine categories of discussions around the interface including: the four research perspectives; \"the future is in the past;\" marketing; entrepreneurship; small business marketing; entrepreneurial marketing; practical significance; context of research; and modeling. Research limitations/implications Throughout the nine sections, this paper highlights considerations for future research. It suggests that scholars conducting research at the interface consider the theoretical perspective of their research to improve collective theory building and better positioning. It suggests that scholars also consider the firm and industry context of their empirical research. Finally, it suggests a number of research questions. Practical implications The paper suggests that during the research design phase, scholars make efforts to consider the practical significance that will result from their research. In particular, they should consider that research in start-ups (all businesses start somewhere) and small businesses (the vast majority of all enterprises) can have widespread impacts. Originality/value This paper provides a unique approach to conceptually organizing marketing/entrepreneurship interface research and provides an abundant source of ideas for future research.", "author": "", "author_full_names": "DAVID J. HANSEN; FABIAN EGGERS", "country": "", "source_title": "J RES MARK ENTREP"}, {"id": "TORRES G, 2024, J RES MARK ENTREP", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "BUILDING SALES THROUGH CONNECTIONS: HOW NETWORK CAPABILITIES AND TIE STRENGTH FOSTER ENTREPRENEURIAL MARKETING", "year": 2024, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/JRME-08-2023-0141", "citations_received": 1.0, "citation_velocity": 0.3333333333333333, "size": 6.0, "color": "#C4AE97", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSETHE PURPOSE OF THIS STUDY IS TO DELVE INTO THE INTRICATE RELATIONSHIP BETWEEN NETWORK CAPABILITIES (NCS), ENTREPRENEURIAL MARKETING (EM) AND SALES PERFORMANCE (SP), WITH A SPECIFIC FOCUS ON UNCOVERING THE NUANCED ROLE THAT TIES STRENGTH (TS) PLAYS AS A MEDIATOR.DESIGN/METHODOLOGY/APPROACHTHIS RESEARCH WAS CONDUCTED USING A SURVEY METHOD WITH A POPULATION OF SOFTWARE SMALL AND MEDIUM-SIZED ENTERPRISES (SMES) IN COLOMBIA USING A SAMPLE SIZE OF 164 QUESTIONNAIRES. THE DATA ANALYSIS METHOD USED WAS THE PARTIAL LEAST SQUARES.FINDINGSTHE RESULTS SHOW THAT EM HAS AN IMPACT ON SP. TS MEDIATES THE INFLUENCE OF NC AND EM. FINDINGS HIGHLIGHTED THE IMPORTANCE OF NETWORKING IN EM AND THE RELATIONSHIP WITH SP.PRACTICAL IMPLICATIONSNCS EMERGE AS A VITAL DETERMINANT FOR FOSTERING EM WITHIN SMES. OWNERS SHOULD PRIORITIZE THE DEVELOPMENT AND ENHANCEMENT OF THEIR NCS; FOR EXAMPLE, BUILDING RELATIONSHIPS, FOSTERING COLLABORATIONS AND LEVERAGING CONNECTIONS WITHIN THE INDUSTRY. ALSO, THIS COULD LEAD TO MORE INNOVATIVE MARKETING STRATEGIES, DIFFERENTIATING THE FIRM IN A COMPETITIVE MARKETPLACE. THE MEDIATING ROLE OF TS UNDERSCORES THE IMPORTANCE OF NOT JUST HAVING NETWORK CONNECTIONS BUT BUILDING STRONG, MEANINGFUL RELATIONSHIPS WITH CUSTOMERS. SMES WITH HIGH NCS SHOULD DESIGN MORE TARGETED AND CUSTOMIZED MARKETING STRATEGIES.ORIGINALITY/VALUETHE VALUE OF THIS RESEARCH LIES IN ITS INTRICATE EXPLORATION OF THE COMPLEX RELATIONSHIPS BETWEEN NCS, TS AND EM. THIS STUDY PAVES THE WAY FOR A DEEPER UNDERSTANDING OF NETWORK DYNAMICS AND THEIR IMPLICATIONS WITHIN EM. IT SETS THE STAGE FOR SUBSEQUENT STUDIES THAT MAY LEAD TO THE FORMULATION OF MORE SOPHISTICATED NETWORK MARKETING STRATEGIES TAILORED FOR EM CONTEXTS.", "author": "TORRES G;ROJAS-BERRIO SP;DUQUE-URIBE V;ROBLEDO S", "author_full_names": "GERSSON TORRES; SANDRA PATRICIA ROJAS BERRIO; VERONICA DUQUE-URIBE; SEBASTIAN ROBLEDO", "country": "COLOMBIA; COLOMBIA; COLOMBIA", "source_title": "J RES MARK ENTREP"}, {"id": "SAHU CK, 2024, J SMALL BUS ENTERP D", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "ENTREPRENEURIAL MARKETING PRACTICES AND MANUFACTURING VENTURE PERFORMANCE DURING A PANDEMIC: THE MEDIATING ROLE OF INNOVATION", "year": 2024, "journal": "JOURNAL OF SMALL BUSINESS AND ENTERPRISE DEVELOPMENT", "doi": "10.1108/JSBED-07-2022-0312", "citations_received": 3.0, "citation_velocity": 1.0, "size": 14.13167261882952, "color": "#AE947D", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSEPREVIOUS RESEARCH HAS INDICATED THAT ENTREPRENEURIAL MARKETING (EM) POSITIVELY INFLUENCES SMALL AND MEDIUM-SIZED ENTERPRISES' (SMES) PERFORMANCE. WHILE MOST STUDIES HAVE EXAMINED THE RELATIONSHIP IN A STABLE ENVIRONMENT, EMS' EFFECTIVENESS DURING ENVIRONMENTAL INSTABILITY REMAINS UNCERTAIN. THEREFORE, THE STUDY AIMS TO INVESTIGATE THE INFLUENCE OF EM ON INDIAN MANUFACTURING-BASED SMES' PERFORMANCE DURING THE COVID-19-INDUCED ENVIRONMENTAL INSTABILITY. ADDITIONALLY, IT EXPLORES THE MEDIATING ROLE OF INNOVATIVE PERFORMANCE IN THE RELATIONSHIP BETWEEN EM AND SME PERFORMANCE.DESIGN/METHODOLOGY/APPROACHTHE DATA WERE COLLECTED BY DISTRIBUTING A STRUCTURED SURVEY QUESTIONNAIRE TO 302 OWNERS/MANAGERS OF SMES. HYPOTHESES WERE TESTED USING STRUCTURAL EQUATION MODELING (SEM).FINDINGSTHE RESULT INDICATES THAT EM SIGNIFICANTLY IMPACTS BOTH INNOVATION AND SME PERFORMANCE. FURTHERMORE, THE INNOVATIVE PERFORMANCE PARTIALLY MEDIATES THE LINK BETWEEN EM AND SME PERFORMANCE. THE FINDINGS SUGGEST THAT EVEN WITHIN SEVERELY AFFECTED SECTORS (MANUFACTURING) DURING THE PANDEMIC, SMES CAN ACHIEVE GROWTH AND INNOVATION THROUGH EFFECTIVE EM PRACTICES.RESEARCH LIMITATIONS/IMPLICATIONSTHIS STUDY VALIDATES THE THEORETICAL NOTION THAT EM REMAINS EFFECTIVE EVEN IN UNPREDICTABLE ENVIRONMENTS SUCH AS THE COVID-19 PANDEMIC. THE FINDINGS OFFER VALUABLE INSIGHTS FOR SMES SEEKING INNOVATIVE STRATEGIES TO ENHANCE THEIR PERFORMANCE, PARTICULARLY THOSE IN EMERGING ECONOMIES.ORIGINALITY/VALUEPRIOR STUDIES HAVE RELIED ON A SINGLE LAYER OF ABSTRACTION TO ANALYZE THE IMPACT OF EM. THE PRESENT STUDY IS THE FIRST TO EXTEND STANDARD CONSTRUCT (EM) CONCEPTUALIZATION. FURTHERMORE, IT EVALUATED THE EFFICIENCY OF EM IN SITUATIONS CHARACTERIZED BY INSTABILITY, WHICH IS RARE IN THE EM AND SME LITERATURE.", "author": "SAHU CK;PANDA RK", "author_full_names": "CHINMAYA KUMAR SAHU; RAJEEV KUMAR PANDA", "country": "INDIA", "source_title": "J SMALL BUS ENTERP D"}, {"id": "ZAHARA Z, 2023, COGENT BUS MANAG", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "ENTREPRENEURIAL MARKETING AND MARKETING PERFORMANCE THROUGH DIGITAL MARKETING CAPABILITIES OF SMES IN POST-PANDEMIC RECOVERY", "year": 2023, "journal": "COGENT BUSINESS & MANAGEMENT", "doi": "10.1080/23311975.2023.2204592", "citations_received": 4.0, "citation_velocity": 1.0, "size": 15.349401316859597, "color": "#AE947D", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "THE USE OF DIGITAL RESOURCES THROUGH DIGITAL MARKETING IS AN OPTION TO BE ABLE TO REACH CUSTOMERS, BUILD INTERACTIONS WITH CUSTOMERS IN REAL TIME AND FINALLY ACHIEVE CUSTOMER SATISFACTION. THIS RESEARCH INTENDS TO DETERMINE THE INFLUENCE OF ENTREPRENEURIAL MARKETING THROUGH DIGITAL MARKETING CAPABILITIES ON MARKETING PERFORMANCE IN PALU, INDONESIA. THE POPULATION IN THE STUDY AMOUNTED TO 21,696 WITH A TOTAL NUMBER OF SAMPLES OF 197 SMES OBTAINED WITH THE YAMANE AND ISAAC FORMULA. THE SAMPLING TECHNIQUE IN THIS STUDY WENT THROUGH TWO STAGES, NAMELY THE AREA SAMPLING TECHNIQUE AND THEN THE STRATIFIED RANDOM SAMPLING TECHNIQUE. HYPOTHESIS TESTING USED WAS PATH ANALYSIS WITH SMART-PLS SOFTWARE. THE RESULTS SHOWED THAT ENTREPRENEURIAL MARKETING HAVE POSITIVE AND SIGNIFICANT EFFECTS ON DIGITAL MARKETING CAPABILITIES AND ON MARKETING PERFORMANCE. FURTHERMORE, DIGITAL MARKETING CAPABILITIES HAVE A POSITIVE AND SIGNIFICANT EFFECT ON MARKETING PERFORMANCE. HOWEVER, DIGITAL MARKETING IS LESS LIKELY TO MEDIATE THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING AND MARKETING PERFORMANCE. AS PRACTICAL IMPLICATIONS, SMES SHOULD CONTINUE TO IMPROVE THEIR CAPABILITIES AND SHARPEN THE IMPLEMENTATION OF ENTREPRENEURIAL MARKETING STRATEGIES, IN ORDER TO UTILIZE THEIR RESOURCES TO FIND OPPORTUNITIES AND CREATE ADDED VALUE FOR CUSTOMERS, IN ORDER TO CONTINUE TO ACHIEVE MARKETING PERFORMANCE IN A SUSTAINABLE MANNER.", "author": "ZAHARA Z;IKHSAN;SANTI IN;FARID", "author_full_names": "ZAKIYAH ZAHARA; IKHSAN IKHSAN; IRA NURIYA SANTI; FARID FARID", "country": "INDONESIA; INDONESIA; INDONESIA", "source_title": "COGENT BUS MANAG"}, {"id": "ALSHAGAWI M, 2024, COGENT BUS MANAG", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "THE IMPACT OF STRATEGIC ENTREPRENEURSHIP AND ENTREPRENEURIAL MARKETING, ENTREPRENEURSHIP VALUES ON SMALL AND MEDIUM ENTERPRISES' PERFORMANCE: EVIDENCE FROM SAUDI ARABIA", "year": 2024, "journal": "COGENT BUSINESS & MANAGEMENT", "doi": "10.1080/23311975.2024.2316947", "citations_received": 2.0, "citation_velocity": 0.6666666666666666, "size": 12.21933426084716, "color": "#B8A089", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "IN THE CURRENT DYNAMIC MARKET ENVIRONMENT, SMALL AND MEDIUM ENTERPRISES (SMES) FACE THE DAUNTING TASK OF COMPETING AGAINST ESTABLISHED PLAYERS AND NAVIGATING RAPID CHANGE. DRAWING UPON THE RESOURCE ADVANTAGE THEORY (R-A THEORY), THIS PAPER TRIES TO INVESTIGATE THE INFLUENCE OF STRATEGIC ENTREPRENEURSHIP (SE), ENTREPRENEURIAL MARKETING (EM), AND ENTREPRENEURIAL VALUE (EV) ON SMALL AND MEDIUM ENTERPRISES SMES' PERFORMANCE. THE STUDY USES A SAMPLE OF 188 SMES FROM EASTERN PROVINCE OF SAUDI ARABIA. SMARTPLS 3 IS A STATISTICAL TECHNIQUE EMPLOYED FOR DATA ANALYSIS. THE FINDINGS PROVIDE EVIDENCE THAT SHOWS A SIGNIFICANT AND POSITIVE LINK BETWEEN EM, EV, AND SMES PERFORMANCE. ON ANOTHER HAND, THE LINK BETWEEN SE AND SMES PERFORMANCE WAS INSIGNIFICANT. THIS PAPER CONTRIBUTED TO THE KNOWLEDGE ON THE SIGNIFICANCE OF THE EFFECT OF (SE), (EM), AND ENTREPRENEURIAL VALUE ON FIRM PERFORMANCE. THE STUDY CONCLUDES WITH A DISCUSSION ON THE IMPLICATIONS AND LIMITATIONS IN ADDITION TO THE CONCLUSION.", "author": "ALSHAGAWI M;MABKHOT H", "author_full_names": "MOHAMMED ALSHAGAWI; HASHED MABKHOT", "country": "SAUDI ARABIA; SAUDI ARABIA; YEMEN", "source_title": "COGENT BUS MANAG"}, {"id": "DEKU WA, 2023, J ISLAMIC MARK", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "INNOVATIONS IN ENTREPRENEURIAL MARKETING DIMENSIONS: EVIDENCE OF HALAL FOOD SMES IN GHANA", "year": 2023, "journal": "JOURNAL OF ISLAMIC MARKETING", "doi": "10.1108/JIMA-03-2021-0098", "citations_received": 8.0, "citation_velocity": 2.0, "size": 17.978494766710725, "color": "#977A63", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSE SMALL AND MEDIUM ENTERPRISES (SMES) DO NOT NEED ONLY TRADITIONAL MARKETING STRATEGIES IN THE DYNAMIC BUSINESS ENVIRONMENT OF THE MANUFACTURING SECTOR. ENTREPRENEURIAL MARKETING DIMENSION (EMD) IS AN ALTERNATIVE MARKETING APPROACH FOR SMES. THEREFORE, THIS PAPER AIMS TO INVESTIGATE WHETHER EMD INNOVATION HAS A POSITIVE AND SIGNIFICANT EFFECT ON SMES PERFORMANCE ON GHANAIAN HALAL FOOD AND BEVERAGES. DESIGN/METHODOLOGY/APPROACH CORRELATIVE DESCRIPTIVE RESEARCH METHOD WAS USED AND 432 QUESTIONNAIRES WITH FIVE-POINT LIKERT SCALE WERE DISTRIBUTED AMONG OWNERS-MANAGERS OF MANUFACTURING SECTORS OF GHANAIAN HALAL FOOD AND BEVERAGES SMES PRODUCERS WERE CHOSEN BY A SIMPLE RANDOM SAMPLING METHOD. STRUCTURAL EQUATIONS MODELLING STRUCTURAL EQUATIONS MODELLING TECHNIQUES WAS USED TO ANALYSE DATA. FINDINGS THE RESULT OF DATA ANALYSIS INDICATES A POSITIVE AND SIGNIFICANT EFFECT OF EMD ON MANUFACTURING SMES PERFORMANCES OF HALAL FOOD. NEVERTHELESS, THE EFFECT OF EMD ON THE PRODUCTION PERFORMANCE OF THE AFOREMENTIONED COMPANIES IS CONFIRMED POSITIVE. THE FINDINGS ALSO SHOW THAT PRODUCTION PERFORMANCES OF HALAL FOOD SMES RESULT IN THEIR FINANCIAL PERFORMANCE. RESEARCH LIMITATIONS/IMPLICATIONS THE STUDY'S SAMPLE IS LIMITED TO HALAL FOOD SMES MANUFACTURING IN GHANA. MORE RESEARCH CAN BE DONE INVESTIGATING THIS RELATIONSHIP FROM DIFFERENT SECTORS AND IN ISLAMIC AND NON-ISLAMIC COUNTRIES. PRACTICAL IMPLICATIONS THIS RESEARCH IMPLIES THAT HALAL FOOD SMES MANUFACTURING PRODUCERS IN A COUNTRY IS IMPERATIVE IN MUSLIM-MINORITY COUNTRIES. THIS STUDY GIVES A BENCHMARK FOR THE NON-MUSLIM-MAJORITY COUNTRIES WHICH ENDEAVOUR TO EMBARK ON THE HALAL SMES MANUFACTURING FOOD. MUSLIM-MINORITY COUNTRIES THAT ENVISION TO SUCCEED IN THE GLOBAL HALAL MARKET COULD EMULATE GHANA'S APPROACH IN BRANDING ITSELF AS A RECOGNISED NON-MUSLIM-MAJORITY COUNTRY IN PRODUCING HALAL FOODS. THIS CAN BE DONE BY IMPLEMENTING INNOVATIVE, PROACTIVE, OPPORTUNIST, RISK-TAKING AND CUSTOMER-ORIENTED INITIATIVES TO ACHIEVE BETTER MARKET AND INNOVATIVE PERFORMANCES AND HIGHER PROFITS. ORIGINALITY/VALUE THIS PAPER FILLS A KNOWLEDGE GAP BY PRESENTING THE FIRST COMPREHENSIVE OVERVIEW OF HALAL FOOD SMES MANUFACTURING PERFORMANCE RESEARCH THAT ENHANCES THE ONGOING DISCUSSION IN HOSPITALITY, ENTREPRENEURSHIP AND MARKETING FIELDS IN ISLAMIC AND NON-ISLAMIC CONTEXTS.", "author": "DEKU WA;WANG JH;DAS N", "author_full_names": "WISDOM APEDO DEKU; JIUHE WANG; NARAIN DAS", "country": "CHINA", "source_title": "J ISLAMIC MARK"}, {"id": "GLIGA G, 2023, J BUS RES", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "MARKETING CAPABILITY DEVELOPMENT THROUGH NETWORKING - AN ENTREPRENEURIAL MARKETING PERSPECTIVE", "year": 2023, "journal": "JOURNAL OF BUSINESS RESEARCH", "doi": "10.1016/j.jbusres.2022.113472", "citations_received": 14.0, "citation_velocity": 3.5, "size": 19.86418130333216, "color": "#816049", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "HOW ARE MARKETING CAPABILITIES DEVELOPED IN SMES? DRAWING UPON THE ENTREPRENEURIAL MARKETING PERSPECTIVE, THIS ARTICLE EXPLORES HOW SMALL-TO-MEDIUM-SIZED ENTERPRISES (SMES) DEVELOP THEIR MARKETING CAPABILITIES. USING AN IN-DEPTH QUALITATIVE STUDY OF SME ENTREPRENEURS FROM A SMALL OPEN DEVELOPED ECONOMY, WE FIND THAT ENTREPRENEURIAL NETWORKING PLAYS A SIGNIFICANT ROLE IN HOW SMES DEVELOP SPECIALIZED, CROSS-FUNCTIONAL AND DYNAMIC MARKETING CAPABILITIES WHICH ARE INTEGRAL TO THEIR GROWTH AND COMPETITIVENESS. WE IDENTIFY THE TYPE OF RESOURCE INTERACTION PROCESSES ENTREPRENEURS ENGAGE IN WITH ACTORS IN THEIR NETWORK TO GENERATE AND DELIVER MARKET VALUE. SMES IN THIS STUDY WHOLLY DEPEND UPON ENTREPRENEURIAL NETWORKING FOR ACCESSING KEY INFORMATIONAL, RELATIONAL, REPUTATIONAL, AND KNOWLEDGE RESOURCES TO DEVELOP THEIR MARKETING CAPABILITIES. OUR FINDINGS FURTHER ELUCIDATE THAT THE TYPE OF ENTREPRENEURIAL NETWORKING IN THIS STUDY IS ONE THAT EXHIBITS ENTREPRENEURIAL MARKETING BEHAVIOR, YET, IS MORE STRATEGIC AND DELIBERATE IN NATURE RATHER THAN EFFECTUAL. THIS STUDY ADVANCES THE ENTREPRENEURIAL MARKETING AND MARKETING CAPABILITIES LITERATURES BY ASSIGNING GREATER THEORETICAL AND EMPIRICAL CREDENCE TO THE UNDER-EXPLORED ROLE OF ENTREPRENEURIAL NETWORKING IN MARKETING CAPABILITY DEVELOPMENT IN SMES.", "author": "GLIGA G;EVERS N", "author_full_names": "GABRIELA GLIGA; NATASHA EVERS", "country": "IRELAND; IRELAND", "source_title": "J BUS RES"}, {"id": "ADEL HM, 2020, J ENTREP EMERG ECON", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_1", "subgroup_label": "smes; marketing; performance; capabilities; entrepreneurial", "title": "ENTREPRENEURIAL MARKETING STRATEGY, INSTITUTIONAL ENVIRONMENT, AND BUSINESS PERFORMANCE OF SMES IN EGYPT", "year": 2020, "journal": "JOURNAL OF ENTREPRENEURSHIP IN EMERGING ECONOMIES", "doi": "10.1108/JEEE-11-2019-0171", "citations_received": 10.0, "citation_velocity": 1.4285714285714286, "size": 18.752556655844927, "color": "#A38871", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSE THE PURPOSE OF THIS RESEARCH PAPER IS TO STUDY THE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING STRATEGY (EMS), INSTITUTIONAL ENVIRONMENT (IE) AND BUSINESS PERFORMANCE (BP). FURTHER, IT EXAMINES THE ROLE OF GENDER AND ENTREPRENEURIAL EXPERIENCE (EE) AS MODERATORS OF EMS-BP AND IE-BP RELATIONSHIPS. DESIGN/METHODOLOGY/APPROACH BASED ON THE LITERATURE REVIEW, THE AUTHORS PROPOSED A CONCEPTUAL MODEL THAT WAS TESTED USING A QUANTITATIVE APPROACH. QUESTIONNAIRES WERE FILLED BY 202 OWNERS/ENTREPRENEURS OF SMALL- AND MEDIUM-SIZED ENTERPRISES (SMES) IN EGYPT. BECAUSE OF THE ABSENCE OF A FORMAL POPULATION-FRAME FOR THE EGYPTIAN SMES, NON-PROBABILITY QUOTA SAMPLING TECHNIQUE WAS USED THAT CONSIDERED DIFFERENCES IN GENDER AND EE. SMARTPLS SOFTWARE WAS USED FOR DATA ANALYSIS. FINDINGS THE RESULTS INDICATED THAT EMS HAS SIGNIFICANT POSITIVE EFFECT ON BP. IE HAS SIGNIFICANT POSITIVE EFFECT ON EMS BUT INSIGNIFICANT EFFECT ON BP. GENDER WAS FOUND TO BE MODERATING SIGNIFICANTLY BOTH THE EMS-BP AND IE-BP RELATIONSHIPS. HOWEVER, EE WAS FOUND TO BE AN INSIGNIFICANT MODERATOR IN THE EMS-BP RELATIONSHIP. PRACTICAL IMPLICATIONS THE FINDINGS COMMUNICATE INSIGHTS TO THE SMES ON THE IMPORTANCE OF UNDERTAKING PROACTIVE, RISK-TAKING AND INNOVATIVE ACTIVITIES WHILE CREATING AND DELIVERING VALUE TO THEIR CUSTOMERS. ALSO, IT ENCAPSULATES FURTHER IMPLICATIONS FOR POLICYMAKERS TO PROMOTE A BETTER IE FOR ENTREPRENEURSHIP IN EGYPT. ORIGINALITY/VALUE THIS STUDY CONTRIBUTES CONCEPTUALLY TO THE INTERDISCIPLINARY RESEARCH THAT INVESTIGATED THE INTEGRATION BETWEEN ENTREPRENEURSHIP AND MARKETING AS A SUCCESSFUL FUNCTIONAL STRATEGY IN SMES AND ITS EFFECT ON ENHANCING BP AND MARKET SHARE. EMPIRICALLY, IT ADDS VALUE TO THE AVAILABLE LITERATURE ON CONTEMPORARY STRATEGIC ENTREPRENEURSHIP BY ANALYSING THESE IE-EMS-EE-GENDER-BP RELATIONSHIPS IN A PROMISING, YET UNDER-RESEARCHED, TRANSITIONAL ECONOMY.", "author": "ADEL HM;MAHROUS AA;HAMMAD R", "author_full_names": "HEBA MOHAMED ADEL; ABEER A. MAHROUS; RASHA HAMMAD", "country": "EGYPT; EGYPT; EGYPT", "source_title": "J ENTREP EMERG ECON"}, {"id": "MILES MP, 2006, EUR J MARKETING", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_2", "subgroup_label": "marketing; entrepreneurial; firms; interrelationship; entrepreneur", "title": "Large firms, entrepreneurial marketing processes, and the cycle of competitive advantage", "year": 2006, "journal": "EUROPEAN JOURNAL OF MARKETING", "doi": "10.1108/03090560610657804", "citations_received": 81.0, "citation_velocity": 3.857142857142857, "size": 24.82188360014586, "color": "#7C5B44", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "Purpose - The paper aims to explore how large firms might leverage entrepreneurial marketing processes to gain and renew competitive advantage. Design/methodology/approach - The paper applies past research on entrepreneurial marketing and entrepreneurship with examples from a long-term case study of firms in New Zealand, Sweden, the UK, and the USA to illustrate how entrepreneurial marketing processes can be strategically employed by large firms to create or discover, assess, and exploit entrepreneurial opportunities more effectively and efficiently. Findings - The paper offers insight into how large firms leverage entrepreneurial marketing processes to gain advantage. The findings suggest that, in free and open markets, entrepreneurial marketing processes can be strategically employed to create superior value for the firm's customers and owners. Originality/value - The paper contributes to the work of both academics working at the marketing/entrepreneurship interface and executives seeking to leverage marketing to create competitive advantage.", "author": "MILES MP;DARROCH J", "author_full_names": "MORGAN P. MILES; JENNY DARROCH", "country": "UNITED STATES; UNITED STATES", "source_title": "EUR J MARKETING"}, {"id": "MORRISH SC, 2010, J STRATEG MARK", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_2", "subgroup_label": "marketing; entrepreneurial; firms; interrelationship; entrepreneur", "title": "ENTREPRENEURIAL MARKETING: ACKNOWLEDGING THE ENTREPRENEUR AND CUSTOMER-CENTRIC INTERRELATIONSHIP", "year": 2010, "journal": "JOURNAL OF STRATEGIC MARKETING", "doi": "10.1080/09652541003768087", "citations_received": 49.0, "citation_velocity": 2.8823529411764706, "size": 23.523435996602817, "color": "#896A53", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "THE PURPOSE OF THIS PAPER IS TO PRESENT A CONCEPTUALISATION OF ENTREPRENEURIAL MARKETING DRAWN FROM RECENT DEVELOPMENTS IN LITERATURE AND SUPPORTED BY CASE EVIDENCE FROM FIRMS LEVERAGING AN APPROACH TO MARKETING THAT EXPLICITLY CONSIDERS THE ENTREPRENEUR/CUSTOMER INTERRELATIONSHIP. THE PAPER DEVELOPS A MODEL THAT PUTS THE ENTREPRENEUR AND CUSTOMERS AND THEIR INTERRELATIONSHIP AS THE ORGANISATIONAL DRIVERS THAT EXIST IN A WIDER ENVIRONMENT OF AN ORGANISATION THAT EMBRACES MARKETING AUGMENTED BY A COLLECTION OF NON-TRADITIONAL OPPORTUNITY FOCUSED MARKETING STRATEGY AND TACTICS. PROPOSITIONS ARE OFFERED TO STIMULATE AND GUIDE SUBSEQUENT RESEARCH EFFORTS.", "author": "MORRISH SC;MILES MP;DEACON JH", "author_full_names": "SUSSIE MORRISH; MORGAN P. MILES; JONATHAN DEACON", "country": "NEW ZEALAND; AUSTRALIA; UNITED KINGDOM", "source_title": "J STRATEG MARK"}, {"id": "MORRISH SC, 2011, J RES MARK ENTREP", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_2", "subgroup_label": "marketing; entrepreneurial; firms; interrelationship; entrepreneur", "title": "Entrepreneurial marketing: a strategy for the twenty-first century?", "year": 2011, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/14715201111176390", "citations_received": 79.0, "citation_velocity": 4.9375, "size": 24.759203162794066, "color": "#714E37", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "Purpose The purpose of this paper is to present the author's view of the role of entrepreneurial marketing (EM) as a strategy to address the dynamic marketing environment of recent times. Design/methodology/approach The author reflects on some significant marketing changes and provides some contemporary example of companies that have successfully adopted EM approaches and challenged traditional marketing wisdom. Findings EM is best conceived not as a nexus between marketing and entrepreneurship, but as an augmented process, where both the entrepreneur and the customer are the core actors, co-creating value within the marketing environment. Originality/value While this is an opinion piece, the paper provides evidence of how EM can be adopted and applied by entrepreneurial firms and challenges marketers to create and control their own-marketing environment.", "author": "MORRISH SC", "author_full_names": "SUSSIE MORRISH", "country": "NEW ZEALAND", "source_title": "J RES MARK ENTREP"}, {"id": "HILLS GE, 2008, J SMALL BUS MANAGE", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_2", "subgroup_label": "marketing; entrepreneurial; firms; interrelationship; entrepreneur", "title": "THE EVOLUTION AND DEVELOPMENT OF ENTREPRENEURIAL MARKETING", "year": 2008, "journal": "JOURNAL OF SMALL BUSINESS MANAGEMENT", "doi": "10.1111/j.1540-627X.2007.00234.x", "citations_received": 82.0, "citation_velocity": 4.315789473684211, "size": 24.85257655080208, "color": "#77553E", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "THE PURPOSE OF THIS PAPER IS TO DISCUSS THE EVOLUTION OF ENTREPRENEURIAL MARKETING (EM). FIRST AN HISTORICAL PERSPECTIVE OF THE EVOLUTION OF EM IS OFFERED AND SOME CENTRAL INCIDENTS ARE IDENTIFIED. FURTHER, EMPIRICAL INDICATIONS OF SMALL AND MEDIUM-SIZED FIRM MARKETING BEHAVIOR ARE REPORTED AND ANALYZED. SOME DISTINCTIVE DIFFERENCES BETWEEN EM AND ADMINISTRATIVE FOCUSED MARKETING ARE IDENTIFIED. THIS PAPER PROVIDES FUTURE SCHOLARS WITH A SUMMARY OF HOW EM HAS EVOLVED INTO A POTENTIAL NEW SCHOOL OF MARKETING THOUGHT AND OFFERS SEVERAL ISSUES THAT SHOULD STIMULATE FUTURE RESEARCH IN EM.", "author": "HILLS GE;HULTMAN CM;MILES MP", "author_full_names": "GERALD E. HILLS; CLAES M. HULTMAN; MORGAN P. MILES", "country": "UNITED STATES; SWEDEN; UNITED STATES", "source_title": "J SMALL BUS MANAGE"}, {"id": "MILES M, 2015, J STRATEG MARK", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_2", "subgroup_label": "marketing; entrepreneurial; firms; interrelationship; entrepreneur", "title": "EXPLORING ENTREPRENEURIAL MARKETING", "year": 2015, "journal": "JOURNAL OF STRATEGIC MARKETING", "doi": "10.1080/0965254X.2014.914069", "citations_received": 80.0, "citation_velocity": 6.666666666666667, "size": 24.79076297897598, "color": "#633E27", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "THIS PAPER FURTHERS THE CONCEPTUAL DEVELOPMENT OF ENTREPRENEURIAL MARKETING (EM) AS THEORY. EM DRAWS ON THE WORK OF BOTH MARKETING AND ENTREPRENEURSHIP SCHOLARS AND HAS EVOLVED PRIMARILY FROM THE MARKETING MANAGEMENT AND ENTREPRENEURSHIP LITERATURES. BEGINNING WITH AN OVERVIEW OF THE DIFFERENT SCHOOLS OF THOUGHT FROM WHICH THE CONCEPT OF EM HAS EVOLVED, THIS PAPER ATTEMPTS TO OUTLINE AND REVIEW THE ISSUES OF EM THAT DELINEATE IT AS A DISTINCT AREA WITHIN THE DISCIPLINE OF MARKETING. THE DISCUSSION PRESENTS THREE POTENTIAL LOCUS OF EM THOUGHT WITHIN THE FIRM: VERTICAL EM, HORIZONTAL EM, AND EM AS A TEMPORAL PHENOMENON. FINALLY, IN ADOPTING HUNT'S (2010) BENCHMARKS THAT SEEK TO VERIFY THE EXISTENCE OF A DISTINCT BODY OF THEORY, THE PAPER CONCLUDES THAT EM IS ADVANCING TOWARDS THEORY CONSTRUCTION.", "author": "MILES M;GILMORE A;HARRIGAN P;LEWIS G;SETHNA Z", "author_full_names": "MORGAN P. MILES; AUDREY GILMORE; PAUL HARRIGAN; GEMMA LEWIS; ZUBIN SETHNA", "country": "AUSTRALIA; NORTH IRELAND; AUSTRALIA; UNITED KINGDOM", "source_title": "J STRATEG MARK"}, {"id": "MORT GS, 2012, EUR J MARKETING", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_2", "subgroup_label": "marketing; entrepreneurial; firms; interrelationship; entrepreneur", "title": "ADVANCING ENTREPRENEURIAL MARKETING EVIDENCE FROM BORN GLOBAL FIRMS", "year": 2012, "journal": "EUROPEAN JOURNAL OF MARKETING", "doi": "10.1108/03090561211202602", "citations_received": 36.0, "citation_velocity": 2.4, "size": 22.68371402072885, "color": "#90725B", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSE - THE PURPOSE OF THIS PAPER IS TO ADVANCE THE DOMAIN OF ENTREPRENEURIAL MARKETING (EM) RESPONDING TO THE CHALLENGE TO EM SCHOLARS TO MORE FULLY DEVELOP EM AS A SCHOOL OF MARKETING THOUGHT. THE PAPER SEEKS TO ARGUE THAT THE CONTEXT OF THE BORN GLOBAL FIRM IS AN APPROPRIATE AND NOVEL CONTEXT IN WHICH TO UNDERTAKE THIS RESEARCH. DESIGN/METHODOLOGY/APPROACH - THE NEED TO EXAMINE THE PROCESSES OF EM JUSTIFIES THE USE OF CASE STUDY METHOD. IN TOTAL, NINE BORN GLOBAL FIRMS, LOCATED IN THE THREE MOST POPULOUS STATES IN AUSTRALIA: QUEENSLAND, NEW SOUTH WALES AND VICTORIA, WERE SELECTED FOR STUDY. THE FIRMS WERE DRAWN FROM HI-TECH AND LOW-TECH INDUSTRY SECTORS, AND INCLUDED ONLINE BUSINESSES, IN AN ATTEMPT TO CAPTURE MAXIMUM THEORETICAL VARIATION. FINDINGS - THE ANALYSIS IDENTIFIES THE FOUR KEY STRATEGIES OF ENTREPRENEURIAL MARKETING AS COMPRISING OPPORTUNITY CREATION, CUSTOMER INTIMACY-BASED INNOVATIVE PRODUCTS, RESOURCE ENHANCEMENT AND IMPORTANTLY, LEGITIMACY. THESE CORE STRATEGIES OF EM ARE IDENTIFIED BY MAPPING TO ENHANCED PERFORMANCE. RESEARCH LIMITATIONS/IMPLICATIONS - SOME MAY CONSIDER THE BORN GLOBAL CONTEXT A LIMITATION. THEREFORE, IT IS SUGGESTED THAT FURTHER EMPIRICAL RESEARCH COULD BE UNDERTAKEN ON OTHER COHORTS OF SMALL TO MEDIUM-SIZED ENTERPRISES (SMES), SUCH AS SERVICE SMES, TO PROVIDE INCREASED INSIGHT INTO THE STRATEGIES AND PRACTICES IN THE DOMAIN OF EM. QUANTITATIVE RESEARCH TO OPERATIONALIM THE EM CONSTRUCT AND MODEL THEORETICAL RELATIONSHIPS IS ALSO SUGGESTED. ORIGINALITY/VALUE - THIS PAPER ADVANCES THE DOMAIN OF EM INTO A NEW PHASE BY EMPIRICALLY IDENTIFYING FOUR CORE STRATEGIES OF EM. IT FINDS THAT EM CONTRIBUTES TO THE ACHIEVEMENT OF SUPERIOR PERFORMANCE IN SMALL FIRMS THROUGH PURPOSEFUL STRATEGY BASED AN EFFECTUATION APPROACH.", "author": "MORT GS;WEERAWARDENA J;LIESCH P", "author_full_names": "GILLIAN SULLIVAN MORT; JAY WEERAWARDENA; PETER W. LIESCH", "country": "AUSTRALIA; AUSTRALIA", "source_title": "EUR J MARKETING"}, {"id": "ALQAHTANI N, 2020, J BUS RES", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_3", "subgroup_label": "marketing; traditional; uncertainty; conditions; size", "title": "ENTREPRENEURIAL MARKETING AND FIRM PERFORMANCE: SYNTHESIS AND CONCEPTUAL DEVELOPMENT", "year": 2020, "journal": "JOURNAL OF BUSINESS RESEARCH", "doi": "10.1016/j.jbusres.2018.12.035", "citations_received": 87.0, "citation_velocity": 12.428571428571429, "size": 25.0, "color": "#441A03", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "THIS STUDY SEEKS TO ESTABLISH ENTREPRENEURIAL MARKETING (EM) AS A KEY CONSTRUCT THAT POSITIVELY INFLUENCES ORGANIZATIONAL PERFORMANCE. THE AUTHORS REVIEW THE EVOLUTION OF THE DOMAIN AND CONCEPTUALIZATION OF EM AND SYNTHESIZE THE LITERATURE THAT IS EMERGING FROM THE MARKETING-ENTREPRENEURSHIP INTERFACE ON THIS FERTILE RESEARCH STREAM. THEY DEFINE EM AND IDENTIFY THE CONDITIONS UNDER WHICH IT YIELDS BETTER ORGANIZATIONAL PERFORMANCE OUTCOMES. THE MODERATING EFFECT OF NETWORK STRUCTURE (I.E., SIZE, DIVERSITY, AND STRENGTH), ENVIRONMENTAL VARIABLES (I.E., MARKET TURBULENCE, TECHNOLOGICAL TURBULENCE, COMPETITIVE INTENSITY, SUPPLIER POWER, AND MARKET GROWTH), AND FIRM SIZE IS IDENTIFIED THROUGH SEVERAL PROPOSITIONS THAT STEM FROM THE PROPOSED CONCEPTUAL FRAMEWORK.", "author": "ALQAHTANI N;USLAY C", "author_full_names": "NASSER ALQAHTANI; CAN USLAY", "country": "UNITED STATES; UNITED STATES; SAUDI ARABIA", "source_title": "J BUS RES"}, {"id": "WHALEN P, 2016, J STRATEG MARK", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_3", "subgroup_label": "marketing; traditional; uncertainty; conditions; size", "title": "ANATOMY OF COMPETITIVE ADVANTAGE: TOWARDS A CONTINGENCY THEORY OF ENTREPRENEURIAL MARKETING", "year": 2016, "journal": "JOURNAL OF STRATEGIC MARKETING", "doi": "10.1080/0965254X.2015.1035036", "citations_received": 81.0, "citation_velocity": 7.363636363636363, "size": 24.82188360014586, "color": "#5E3821", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "ENTREPRENEURIAL MARKETING (EM), BORN OUT OF THE PRACTICE OF FIRMS OPERATING IN CONDITIONS OF UNCERTAINTY, IS EMERGING AS A POWERFUL ALTERNATIVE TO COPE WITH THE DECREASING EFFECTIVENESS ASSOCIATED WITH TRADITIONAL MARKETING. IN THIS ARTICLE, THE AUTHORS PROVIDE THEIR COLLECTIVE POSITION REGARDING THE FIELD OF EM. A BRIEF HISTORY AND CONCEPTUAL BACKGROUND OF EM IS PRESENTED AND THE CONTEXTUAL DIFFERENCES THAT HAVE SHAPED ITS EVOLUTION ARE CONSIDERED. DISTINCTIONS BETWEEN TRADITIONAL AND EM ARE DERIVED BASED ON DISCUSSIONS OF THE CONCEPTS OF SIZE, SPEED, MARKET, OPPORTUNITY, RISK, AND UNCERTAINTY. THE PERSPECTIVE OF VALUE CO-CREATION IN UNCERTAINTY IS USED TO DEVELOP A CONTINGENCY FRAMEWORK TO SERVE AS THE FOUNDATION TOWARDS A GENERAL THEORY OF EM. OPERAND AND OPERANT RESOURCES AND ENVIRONMENTAL CONDITIONS ARE PROPOSED TO MODERATE THE EM PROCESS FROM OPPORTUNITY RECOGNITION TO ENTREPRENEURIAL ORGANIZATION, EM, AND TEMPORARY COMPETITIVE ADVANTAGE. THE THEORETICAL FACETS ARE ILLUSTRATED WITH SEVEN PROPOSITIONS AND DIRECTIONS FOR FUTURE RESEARCH.", "author": "WHALEN P;USLAY C;PASCAL VJ;OMURA G;MCAULEY A;KASOUF CJ;JONES R;HULTMAN CM;HILLS GE;HANSEN DJ;GILMORE A;GIGLIERANO J;EGGERS F;DEACON J", "author_full_names": "PETER S. WHALEN; CAN USLAY; VINCENT J. PASCAL; GLENN S. OMURA; ANDREW MCAULEY; CHICKERY J. KASOUF; ROSALIND JONES; CLAES M. HULTMAN; GERALD E. HILLS; DAVID J. HANSEN; AUDREY GILMORE; JOE GIGLIERANO; FABIAN EGGERS; JONATHAN DEACON", "country": "UNITED STATES; UNITED STATES; UNITED STATES; UNITED STATES; AUSTRALIA; UNITED STATES; UNITED KINGDOM; SWEDEN; UNITED STATES; UNITED STATES; NORTH IRELAND; UNITED STATES; UNITED STATES; UNITED KINGDOM", "source_title": "J STRATEG MARK"}, {"id": "SADIKU-DUSHI N, 2019, J BUS RES", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_3", "subgroup_label": "marketing; traditional; uncertainty; conditions; size", "title": "ENTREPRENEURIAL MARKETING DIMENSIONS AND SMES PERFORMANCE", "year": 2019, "journal": "JOURNAL OF BUSINESS RESEARCH", "doi": "10.1016/j.jbusres.2019.03.025", "citations_received": 84.0, "citation_velocity": 10.5, "size": 24.91272336093759, "color": "#4D240D", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "WHEN TRADITIONAL MARKETING PRACTICES ARE UNSUITABLE FOR SMALL AND MEDIUM ENTERPRISES, ENTREPRENEURS HAVE TO UNLEARN TRADITIONAL PRINCIPLES AND REPLACE THEM WITH NEW INNOVATIVE THOUGHTS AND ACTIONS, SUCH AS ENTREPRENEURIAL MARKETING (EM). THIS PAPER EXAMINES THE IMPACT OF EM DIMENSIONS ON SMALL AND MEDIUM-SIZED ENTERPRISES (SMES) IN KOSOVO. FINDINGS REVEAL THAT RESPONDENTS TEND TO BE HIGHLY OPPORTUNITY FOCUSED AND UNDERSTAND THE IMPORTANCE OF RESOURCE LEVERAGING. WHILE VALUE CREATION IS SEEN AS A VERY IMPORTANT ENTREPRENEURIAL MARKETING DIMENSION, RESPONDENTS ARE RESERVED WITH RESPECT TO TAKING RISKS; FURTHERMORE, THEY DO NOT TEND TO BE PROACTIVE, INNOVATIVE NOR CUSTOMER ORIENTED. FINALLY, THE LIMITATIONS OF THE STUDY AND THE SUGGESTIONS FOR FUTURE RESEARCH ARE PROVIDED.", "author": "SADIKU-DUSHI N;DANA LP;RAMADANI V", "author_full_names": "NORA SADIKU-DUSHI; LEO‐PAUL DANA; VELAND RAMADANI", "country": "MACEDONIA; FRANCE; UNITED STATES", "source_title": "J BUS RES"}, {"id": "JONES R, 2013, SERV IND J", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_4", "subgroup_label": "orientation; comparative; firms; growth; technology", "title": "ENTREPRENEURIAL MARKETING: A COMPARATIVE STUDY", "year": 2013, "journal": "SERVICE INDUSTRIES JOURNAL", "doi": "10.1080/02642069.2013.740470", "citations_received": 20.0, "citation_velocity": 1.4285714285714286, "size": 20.977113709596612, "color": "#A38871", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "THIS PAPER USES A COMPARATIVE STUDY TO EXPLORE ENTREPRENEURIAL MARKETING ORIENTATION IN SMALL SOFTWARE TECHNOLOGY FIRMS, IN RELATION TO FIRM GROWTH. ENTREPRENEURIAL MARKETING (EM) ACKNOWLEDGES THE INTERFACE BETWEEN ENTREPRENEURSHIP, MARKETING AND INNOVATION AND, PURSUANCE OF CUSTOMER VALUE. RESEARCHERS ACKNOWLEDGE THAT FIRMS ADOPTING OTHER STRATEGIC ORIENTATIONS COMBINED WITH A MARKET ORIENTATION ARE MORE LIKELY TO OUTPERFORM THEIR COMPETITORS. CURRENTLY, THERE ARE FEW COMPARATIVE STUDIES OF KNOWLEDGE-INTENSIVE TECHNOLOGY FIRMS AND NO COMPARATIVE CROSS-COUNTRY STUDIES, WHICH CONSIDER FIRM GROWTH AND ORIENTATION FROM THE EM PERSPECTIVE. THIS PAPER ADDRESSES THESE ISSUES BY USING AN ENTREPRENEURIAL MARKETING ORIENTATION QUALITATIVE FRAMEWORK THAT CONSISTS OF 15 DIMENSIONS, WHICH ALLOW INVESTIGATION OF ENTREPRENEUR AND EMPLOYEE ACTIVITIES, ATTITUDES AND BEHAVIORS IN SUCH FIRMS. USING A UK AND US SAMPLE OF FIRMS, THIS RESEARCH ENABLES ASSESSMENT OF HOW AND WHY ENTREPRENEURIAL MARKETING ORIENTATION MAY LEAD TO SUSTAINABLE GROWTH FOR FIRMS IN CHALLENGING MARKETS AND PROVIDES A COMPARISON IN TWO DIFFERENT COUNTRY CONTEXTS.", "author": "JONES R;SUORANTA M;ROWLEY J", "author_full_names": "ROSALIND JONES; MARI SUORANTA; JENNIFER ROWLEY", "country": "UNITED KINGDOM; FINLAND; UNITED KINGDOM", "source_title": "SERV IND J"}, {"id": "BREIT LA, 2025, J RES MARK ENTREP", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_5", "subgroup_label": "start; making; decision; ups; causal", "title": "NAVIGATING START-UPS: A QUALITATIVE EXPLORATION OF CAUSAL AND EFFECTUAL DECISION-MAKING IN ENTREPRENEURIAL MARKETING", "year": 2025, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/JRME-12-2023-0215", "citations_received": 1.0, "citation_velocity": 0.5, "size": 6.0, "color": "#BDA68F", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSETHIS STUDY AIMS TO ENRICH THE FIELD OF ENTREPRENEURIAL MARKETING (EM) BY EXAMINING DECISION-MAKING PROCESSES IN THE UNIQUE CONTEXT OF START-UP VENTURES. TO DO SO, IT EXTENDS RESEARCH ON THE DISTINCT EM DIMENSIONS TO THE BEHAVIORAL CONTEXT BY REVEALING HOW CAUSATION AND EFFECTUATION PRINCIPLES SHAPE ENTREPRENEURS' ACTIONS.DESIGN/METHODOLOGY/APPROACHTHE STUDY INVESTIGATES EM BEHAVIOR THROUGH 12 SEMI-STRUCTURED INTERVIEWS WITH 10 START-UP FOUNDERS AND TWO FOUNDER ASSOCIATES IN GERMANY. USE OF ESTABLISHED FRAMEWORKS OF THE EM DIMENSIONS AND CAUSATION/EFFECTUATION PRINCIPLES PAVES THE WAY FOR AN IN-DEPTH ANALYSIS. THIS METHODOLOGY UNCOVERS A DISTINCT PATTERN OF DECISION-MAKING BEHAVIORS CHARACTERIZING VARIOUS ACTIVITIES WITHIN START-UPS.FINDINGSTHE FINDINGS SHOW THAT CAUSAL LOGIC PREVAILS IN START-UPS' EM, AND EFFECTUAL REASONING SERVES A COMPLEMENTARY ROLE. ON THE DIMENSIONAL LEVEL, THE FINDINGS REVEAL A PREDOMINANT GOAL-DRIVEN FOCUS ON CUSTOMER INTENSITY AND VALUE-CREATION PROCESSES. PREDICTIVE LOGIC GUIDES OPPORTUNITY FOCUS, PROACTIVENESS AND RISK MANAGEMENT, WITH NONPREDICTIVE BEHAVIORS PROVIDING ADAPTABILITY. THE PRINCIPLE OF AFFORDABLE LOSS IS ALSO EVIDENT IN RISK MANAGEMENT. FINALLY, START-UPS EXHIBIT A BLEND OF CAUSAL AND EFFECTUAL LOGIC IN INNOVATIVENESS AND RESOURCE-LEVERAGING.ORIGINALITY/VALUETO THE BEST OF THE AUTHORS' KNOWLEDGE, THIS STUDY IS THE FIRST TO ILLUMINATE THE INTERPLAY OF BEHAVIORAL LOGICS IN START-UP FIRMS' EM BY EXPLORING THE NUANCED PRINCIPLES UNDERPINNING THE DECISION-MAKING PROCESSES OF ENTREPRENEURS. IN DOING SO, IT ADVANCES UNDERSTANDING OF THE MARKETING-ENTREPRENEURSHIP INTERFACE AND ENRICHES DECISION-MAKING LITERATURE.", "author": "BREIT LA;VOLKMANN CK", "author_full_names": "LUCA A. BREIT; CHRISTINE VOLKMANN", "country": "GERMANY", "source_title": "J RES MARK ENTREP"}, {"id": "CRICK JM, 2021, INT J ENTREP BEHAV R", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_6", "subgroup_label": "orientation; coopetition; owner; business; managers", "title": "THE IMPACT OF THE INTERACTION BETWEEN AN ENTREPRENEURIAL MARKETING ORIENTATION AND COOPETITION ON BUSINESS PERFORMANCE", "year": 2021, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURIAL BEHAVIOR & RESEARCH", "doi": "10.1108/IJEBR-12-2020-0871", "citations_received": 13.0, "citation_velocity": 2.1666666666666665, "size": 19.62475014163708, "color": "#947760", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSE CERTAIN SMALL BUSINESSES DO NOT POSSESS THE ASSETS NEEDED TO IMPLEMENT A PERFORMANCE-ENHANCING ENTREPRENEURIAL MARKETING ORIENTATION (OPPORTUNITY-DRIVEN BEHAVIOURS FOCUSSED ON CREATING VALUE FOR CUSTOMERS). ALTHOUGH SOME ENTREPRENEURS COOPERATE WITH THEIR COMPETITORS (COOPETITION) TO ACHIEVE THEIR DAY-TO-DAY AND LONG-TERM GOALS, IT IS UNCLEAR WHETHER THESE PARTNERSHIPS ARE ADVANTAGEOUS IN THIS CAPACITY. THUS, GROUNDED IN THE RESOURCE-BASED VIEW, THE PURPOSE OF THIS INVESTIGATION IS TO EXAMINE WHETHER COOPETITION POSITIVELY MODERATES THE RELATIONSHIP BETWEEN AN ENTREPRENEURIAL MARKETING ORIENTATION AND FINANCIAL PERFORMANCE. DESIGN/METHODOLOGY/APPROACH SURVEY RESPONSES WERE OBTAINED FROM 184 SMALL TOURISM AND HOSPITALITY ORGANISATIONS IN NEW ZEALAND. FOLLOWING A SERIES OF ROBUSTNESS CHECKS, COVARIANCE-BASED STRUCTURAL EQUATION MODELLING WAS USED TO TEST THE ELEMENTS OF THE CONCEPTUAL MODEL. FINDINGS UNIQUE INSIGHTS ILLUSTRATE AN ENTREPRENEURIAL MARKETING ORIENTATION YIELDING A NEGATIVE AND SIGNIFICANT LINK WITH FINANCIAL PERFORMANCE. NEVERTHELESS, THIS RESULT WAS POTENTIALLY RELATED TO THE ENTREPRENEURIAL MARKETING-ORIENTED OPPORTUNITIES THAT OWNER-MANAGERS PURSUED WITHIN THE CONTEXT OF THEIR SECTOR; IN PARTICULAR, SITUATIONS WHEN EMPLOYING AN INDIVIDUALISTIC BUSINESS MODEL CONSTRAINED CERTAIN DECISION-MAKERS' ABILITY TO PURSUE \"GROWTH-ORIENTED\" OBJECTIVES. HOWEVER, COOPETITION PRODUCED A POSITIVE AND SIGNIFICANT MODERATING EFFECT, ENABLING OWNER-MANAGERS TO PURSUE OPPORTUNITIES VIA COLLABORATIVE BUSINESS MODELS FACILITATING MUTUALLY BENEFICIAL PERFORMANCE OUTCOMES. PRACTICAL IMPLICATIONS OWNER-MANAGERS OF UNDER-RESOURCED SMALL FIRMS SHOULD BE CAREFUL WHEN IMPLEMENTING ENTREPRENEURIAL MARKETING STRATEGIES UTILISING AN INDIVIDUALISTIC BUSINESS MODEL. FOR EXAMPLE, THEY MIGHT PURSUE OPPORTUNITIES THAT ARE NOT VIABLE AND/OR BECOME OVER-LOADED WITH MARKET INTELLIGENCE THAT THEY CANNOT HANDLE. BY COLLABORATING WITH COMPETITORS, OWNER-MANAGERS CAN LEARN IMPROVED WAYS TO OPERATE WITHIN THEIR INDUSTRIES, ALONGSIDE BEING EQUIPPED WITH NEW RESOURCES AND CAPABILITIES. IN DOING SO, COOPETITION CAN HELP OVERCOME SOME OF THE POTENTIAL PERFORMANCE-LIMITING ISSUES OWNER-MANAGERS FACE BY BEING UNDER-RESOURCED, NAMELY, VIA EMPLOYING A COLLABORATIVE BUSINESS MODEL. ORIGINALITY/VALUE THIS CURRENT STUDY CONTRIBUTES TO THE EXTANT LITERATURE BY EVALUATING THE COMPLEXITIES OF ENTREPRENEURIAL MARKETING PRACTICES. THAT IS, ALTHOUGH EARLIER RESEARCH HAS FOCUSSED ON THE PERFORMANCE-DRIVING OUTCOMES OF AN ENTREPRENEURIAL MARKETING ORIENTATION, PRIOR STUDIES TYPICALLY OVERLOOK CERTAIN MODERATING FACTORS THAT COULD INFLUENCE THIS ASSOCIATION. BY EXAMINING THE INTERACTION BETWEEN AN ENTREPRENEURIAL MARKETING ORIENTATION AND COOPETITION ON FINANCIAL PERFORMANCE, NEW EVIDENCE HAS EMERGED ON HOW OWNER-MANAGERS OF SMALL FIRMS CAN UTILISE INTERFIRM COLLABORATION TO SUCCEED WITHIN THEIR MARKETS, AS OPPOSED TO STRUGGLING TO COPE WITH THE CHALLENGES OF AN INDIVIDUALISTIC BUSINESS MODEL. SPECIFICALLY, AN ENTREPRENEURIAL MARKETING ORIENTATION IS LIKELY TO ENHANCE FINANCIAL PERFORMANCE WHEN UNDER-RESOURCED COMPANIES EFFECTIVELY COLLABORATE WITH THEIR COMPETITORS.", "author": "CRICK JM;KARAMI M;CRICK D", "author_full_names": "JAMES M. CRICK; MASOUD KARAMI; DAVE CRICK", "country": "UNITED KINGDOM; NEW ZEALAND; CANADA", "source_title": "INT J ENTREP BEHAV R"}, {"id": "GROSS N, 2014, J RES MARK ENTREP", "role": "trunk", "role_label": "Trunk", "visual_symbol": "brown circle", "subgroup": "trunk_subtopic_7", "subgroup_label": "practice; investigation; social; observations; common", "title": "BEYOND RHETORIC: RE-THINKING ENTREPRENEURIAL MARKETING FROM A PRACTICE PERSPECTIVE", "year": 2014, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "doi": "10.1108/JRME-01-2014-0003", "citations_received": 12.0, "citation_velocity": 0.9230769230769232, "size": 19.362789560255276, "color": "#B09780", "notes": "Consolidating paper in a trunk subtopic.", "abstract": "PURPOSE - THE PURPOSE OF THIS PAPER IS TO PROPOSE THE APPLICATION OF SOCIAL PRACTICE THEORY FOR THE INVESTIGATION OF ENTREPRENEURIAL MARKETING (EM) PRACTICES. DESIGN/METHODOLOGY/APPROACH - A THEORETICAL GAP HAS BEEN FOUND BETWEEN SCHOLARLY EFFORTS TO EXPLAIN THE NATURE OF EM PRACTICE AND THE ACTUAL MARKETING PRACTICE OR MARKETING DOINGS OF SMALL FIRMS. FINDINGS - THE PAPER COVERS SOME OF THE EM LITERATURE AND PERSPECTIVES AND EXAMINING THE NOTION OF \"PRACTICE\" IN SMALL-AND MEDIUM-SIZED ENTERPRISES (SME) AND ENTREPRENEURSHIP RESEARCH. BASED ON AN INCREASING FOCUS ON PRACTICE IN THE SOCIAL THEORY LITERATURE AND THE CONTRIBUTIONS OF KEY SOCIAL THEORISTS, A DISCUSSION IS FRAMED IN TERMS OF HOW EM PRACTICE CAN BE STUDIED THROUGH THE INVESTIGATION MATERIAL AND BODILY OBSERVATIONS AND COMMON INTERPRETATIONS. RESEARCH LIMITATIONS/IMPLICATIONS - THE PAPER OFFERS A PROPOSAL THAT THE OBSERVATIONS OF PRACTITIONERS' ACTIONS AND ACTIVITIES AND THE INVESTIGATION OF COMMON INTERPRETATIONS CAN BE CONCEPTUALIZED TO EXPLAIN THE NATURE OF EM PRACTICE. IT ALSO GIVES AVENUES FOR FUTURE RESEARCH. PRACTICAL IMPLICATIONS - THE PAPER SUGGESTS THAT MARKETING COMPRISES A WIDE SCOPE OF ACTIVITIES OR PRACTICES AND, IN THE CASE OF A SMALL FIRM, IS ALL-PERVASIVE. IT ALSO SUGGESTS THAT SCHOLARS ENGAGE IN UNDERSTANDING THE COLLECTIVE, DISTRIBUTED, SITUATED, ONGOING AND TACIT NATURE OF EM. ORIGINALITY/VALUE - THE PAPER PROVIDES A FRESH CONCEPTUAL APPROACH ABOUT HOW EM PRACTICE CAN BE STUDIED THROUGH THE INVESTIGATION MATERIAL AND BODILY OBSERVATIONS AS WELL AS COMMON INTERPRETATIONS.", "author": "GROSS N;CARSON D;JONES R", "author_full_names": "NICOLE GROSS; DAVID CARSON; ROSALIND JONES", "country": "IRELAND; NORTH IRELAND; UNITED KINGDOM", "source_title": "J RES MARK ENTREP"}, {"id": "CRICK JM, 2025, INT J ENTREP BEHAV R", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - core", "branch_member_role": "core", "title": "COOPETITION AND THE MARKETING/ENTREPRENEURSHIP INTERFACE IN AN INTERNATIONAL ARENA", "year": 2025, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURIAL BEHAVIOUR & RESEARCH", "doi": "10.1108/IJEBR-01-2022-0099", "branch_core_score": 0.8028486179291947, "semantic_similarity_to_branch": 0.4547140176060681, "trunk_connection_score": 0.1095175982687925, "notes": "direct topical signal and strong branch fit", "abstract": "", "author": "", "author_full_names": "JAMES M. CRICK; DAVE CRICK; GIULIO FERRIGNO", "country": "", "source_title": "INT J ENTREP BEHAV R"}, {"id": "CHEN YH, 2024, SUSTAINABILITY-BASEL", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - core", "branch_member_role": "core", "title": "THE INNOVATIVE ENTREPRENEURIAL MARKETING JOURNEY AND SUSTAINABLE DEVELOPMENT OF SOUTHEAST ASIAN IMMIGRANTS", "year": 2024, "journal": "SUSTAINABILITY", "doi": "10.3390/su16072815", "branch_core_score": 0.8316776425944941, "semantic_similarity_to_branch": 0.3135877129324199, "trunk_connection_score": 1.0, "notes": "direct topical signal and strong branch fit", "abstract": "THE SOUTHEAST ASIAN NEW IMMIGRANTS FACE SIGNIFICANT BARRIERS IN EMPLOYMENT DUE TO LANGUAGE AND CULTURAL DIFFERENCES, MAKING IT CHALLENGING FOR THEM TO FIND JOBS. CONSEQUENTLY, MANY SOUTHEAST ASIAN IMMIGRANTS HAVE TURNED TO ENTREPRENEURSHIP AS A MEANS TO ACHIEVE ECONOMIC INDEPENDENCE AND CONTRIBUTE TO THEIR FAMILY'S INCOME. THIS STUDY ADOPTS ENTREPRENEURIAL MARKETING (EM) AS A THEORETICAL LENS AND UTILIZES A PROCESS RESEARCH METHODOLOGY, BASED ON SEQUENTIALLY ORDERED EVENTS, TO EXPLORE THE ENTREPRENEURIAL JOURNEY OF IMMIGRANT MICRO AND SMALL TO MEDIUM-SIZED ENTERPRISES (SMES). EMPLOYING PURPOSIVE SAMPLING, TWENTY-TWO SOUTHEAST ASIAN IMMIGRANT ENTREPRENEURS WERE SELECTED FOR IN-DEPTH INTERVIEWS TO ENSURE DATA QUALITY THROUGH MULTIPLE DATA COLLECTION METHODS. THE RESEARCH DEVELOPED A DYNAMIC ADJUSTMENT MODEL AND MANAGEMENT MECHANISMS FOR THE ENTREPRENEURIAL MARKETING OF IMMIGRANT MICRO AND SMES. THESE FINDINGS NOT ONLY BRIDGE THEORETICAL GAPS IN IMMIGRANT ENTREPRENEURSHIP STRATEGY BUT ALSO DEEPEN THE ACADEMIC UNDERSTANDING OF THE DYNAMISM IN ENTREPRENEURIAL MARKETING. PRACTICALLY, THE OUTCOMES ASSIST IMMIGRANT MICRO AND SMALL BUSINESS ENTREPRENEURS IN DEVELOPING OPERATIONAL STRATEGIES AND SERVE AS A REFERENCE FOR GOVERNMENTAL UNITS IN CRAFTING IMMIGRANT POLICIES.", "author": "CHEN YH", "author_full_names": "YUHENG CHEN", "country": "TAIWAN", "source_title": "SUSTAINABILITY-BASEL"}, {"id": "ALAREENI B, 2025, J STRATEG MARK", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - core", "branch_member_role": "core", "title": "MARKETING AND ENTREPRENEURSHIP: CHALLENGES AND OPPORTUNITIES", "year": 2025, "journal": "JOURNAL OF STRATEGIC MARKETING", "doi": "10.1080/0965254X.2022.2155688", "branch_core_score": 0.8320036607436566, "semantic_similarity_to_branch": 0.4712096945465998, "trunk_connection_score": 0.1680564983051785, "notes": "direct topical signal and strong branch fit", "abstract": "", "author": "", "author_full_names": "BAHAAEDDIN ALAREENI; ALLAM HAMDAN; REEM HAMDAN; HANEEN MOHAMMAD SHOAIB", "country": "", "source_title": "J STRATEG MARK"}, {"id": "CHOU WC, 2023, NTU MANAG REV", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - core", "branch_member_role": "core", "title": "HOW ENTREPRENEURIAL MARKETING FACILITATES DIRECT SELLERS' ENTREPRENEURIAL PROCESS: A DYNAMIC ADJUSTMENT PERSPECTIVE", "year": 2023, "journal": "NTU MANAGEMENT REVIEW", "doi": "10.6226/NTUMR.202308_33(2).0004", "branch_core_score": 0.7864039667392255, "semantic_similarity_to_branch": 0.2721834954965049, "trunk_connection_score": 0.9925951302342108, "notes": "direct topical signal and strong branch fit", "abstract": "THIS STUDY INTENDS TO EXAMINE THE ENTREPRENEURIAL PROCESS OF INDIVIDUAL DIRECT SELLERS FROM THE PERSPECTIVE OF ENTREPRENEURIAL MARKETING, AND ADOPTS THE PROCESS METHOD WHERE EVENTS IN CHRONOLOGICAL ORDER ARE SCRUTINIZED. THIS STUDY COLLECTS DATA FROM TRIANGULAR SOURCES AND COMBINES THE FOCUS GROUP INTERVIEWS WITH IN-DEPTH INTERVIEWS TO EXAMINE 14 DIRECT SELLERS SELECTED FROM ONE DOMESTIC, AND ONE FOREIGN DIRECT SELLING BRAND, RESPECTIVELY. WE DEVELOP A DYNAMIC MODEL OF ENTREPRENEURIAL MARKETING. THE RESULTS SHOW THAT TWO RELATIONAL MANAGEMENT MECHANISMS ARE CRUCIAL TO THE SUCCESSFUL TRANSFORMATION TOWARDS THE NEXT ENTREPRENEURIAL PHASE. THE FINDINGS NOT ONLY FILL THE ACADEMIC GAP IN INDIVIDUAL-LEVEL DIRECT-SELLING STRATEGY, BUT ALSO SHED LIGHT ON ENTREPRENEURIAL MARKETING THEORY BY PROVIDING INSIGHTS REGARDING HOW RESOURCES AND INITIATIVES ARE MODIFIED, WHICH DEEPENS THE UNDERSTANDING OF ITS DYNAMICITY. MOREOVER, THIS RESEARCH EXTENDS THE TRANSACTION ORIENTED WESTERN STUDIES ON DIRECT SELLING TO THE 'QUANXI' (RELATIONSHIP) ORIENTED EASTERN CONTEXT THAT ESPECIALLY VALUES RELATIONAL NETWORK. IN PRACTICES, THE FINDINGS COULD ASSIST DIRECT SELLERS AND INTERPERSONAL-ORIENTED MICRO-ENTREPRENEURS TO DEVELOP PERSONAL BUSINESS TACTICS, AND SERVE AS REFERENCES FOR DIRECT SELLING COMPANIES TO PLAN FOR TRAINING PROGRAM OF BRAND AFFILIATES (BA) AND BRAND REPRESENTATIVES (BR).", "author": "CHOU WC;HUANG HY;CHIANG YF", "author_full_names": "CHOU, WEN-CHIUNG;HUANG, HSIU-YING;CHIANG, YI-FANG", "country": "TAIWAN; TAIWAN; TAIWAN", "source_title": "NTU MANAG REV"}, {"id": "MAYUTO R, 2023, FRONT PSYCHOL", "role": "branch", "role_label": "Branches", "visual_symbol": "brown circle", "subgroup": "branch_1", "subgroup_label": "branch_1 - peripheral", "branch_member_role": "peripheral", "title": "ANTECEDENTS OF IMMIGRANTS’ ENTREPRENEURIAL INTENTION FORMATION PROCESS: AN EMPIRICAL STUDY OF IMMIGRANT ENTREPRENEURS IN CANADA", "year": 2023, "journal": "FRONTIERS IN PSYCHOLOGY", "doi": "10.3389/FPSYG.2023.1153142", "branch_core_score": 0.6444254796410722, "semantic_similarity_to_branch": 0.3163727969203717, "trunk_connection_score": 0.0490104498032815, "notes": "related to branch but weaker as a defining paper", "abstract": "", "author": "", "author_fu

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Tree of Science 3</title>
  <style>
    :root {
      --paper: #fbfaf7;
      --ink: #24180f;
      --muted: #76685d;
      --line: #d8d0c8;
      --root: #6a3a16;
      --leaf: #7da721;
      --fruit: #b42316;
      --panel: rgba(255, 255, 255, 0.94);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(218, 232, 172, 0.22), transparent 30%),
        linear-gradient(135deg, #fffdfa, var(--paper));
      font-family: Georgia, "Times New Roman", serif;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 18px;
      padding: 18px;
    }
    .figure-card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(52, 33, 18, 0.10);
    }
    .figure-card {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .figure-wrap {
      position: relative;
      width: min(100%, 1180px);
      aspect-ratio: 911.15852 / 732.26797;
    }
    .figure-wrap > svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .hotspot {
      fill: transparent;
      stroke: transparent;
      cursor: pointer;
      pointer-events: auto;
    }
    .hotspot:hover, .hotspot.active {
      fill: rgba(140, 100, 72, 0.08);
      stroke: rgba(92, 38, 9, 0.45);
      stroke-width: 1.2;
      stroke-dasharray: 5 4;
    }
    .panel {
      max-height: calc(100vh - 36px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel header {
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      font-size: 25px;
      line-height: 1.1;
      margin: 0 0 7px;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }
    .controls {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 14px;
      font: 15px/1.2 Georgia, "Times New Roman", serif;
      background: #fff;
      color: var(--ink);
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: 13px/1 Georgia, "Times New Roman", serif;
    }
    .chip.active {
      color: white;
      border-color: var(--root);
      background: var(--root);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 6px;
      text-align: center;
      background: #fff;
    }
    .stat strong { display: block; font-size: 17px; }
    .stat span { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .content {
      display: grid;
      grid-template-rows: minmax(180px, 1fr) auto;
      min-height: 0;
    }
    .list {
      overflow: auto;
      padding: 12px;
      min-height: 0;
    }
    .item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 15px;
      padding: 11px 12px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-family: Georgia, "Times New Roman", serif;
    }
    .item:hover, .item.active {
      background: #fff;
      border-color: var(--line);
    }
    .item-title {
      display: block;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
    }
    .item-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .details {
      border-top: 1px solid var(--line);
      padding: 16px 18px 18px;
      background: rgba(246, 241, 234, 0.65);
      max-height: 38vh;
      overflow: auto;
    }
    .details h2 {
      margin: 0 0 7px;
      font-size: 19px;
      line-height: 1.15;
    }
    .details .meta {
      color: var(--muted);
      margin: 0 0 10px;
      font-size: 13px;
    }
    .field {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      margin: 7px 0;
      font-size: 13px;
      line-height: 1.3;
    }
    .field b { color: #4e3828; }
    .abstract {
      margin-top: 10px;
      color: #3a2a1f;
      font-size: 13px;
      line-height: 1.38;
    }
    a { color: #7c2b12; }
    .empty {
      padding: 26px 16px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .figure-card { min-height: auto; }
      .panel { max-height: none; }
    }
  </style>
</head>

 STUDY DEMONSTRATES THE POSITIVE EFFECTS OF VALUE CREATION AND RISK MANAGEMENT ON CONGRUENCE, WHICH IN TURN HAS A POSITIVE INFLUENCE ON TRAVELERS' FAVORABILITY TOWARD THE AIRLINE. FURTHER, IT CONFIRMS THAT FAVORABILITY TOWARD THE AIRLINE PREDICTS PURCHASE INTENTION. THIS STUDY HIGHLIGHTS THAT ENTREPRENEURIAL MARKETING EFFORTS TO CREATE CUSTOMER VALUE, AND EFFECTIVE MANAGEMENT OF THE ASSOCIATED RISKS, ARE INDISPENSABLE TO SUCCESSFUL CONVEYANCE OF CONGRUENT AIRLINE SPONSORSHIP PROGRAMS.", "author": "KIM JJ;KIM I", "author_full_names": "JOONHYEONG JOSEPH KIM; INSIN KIM", "country": "SOUTH KOREA"}, {"id": "KIM J, 2018, SUSTAINABILITY", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "KIM J, 2018, SUSTAINABILITY", "year": 2018, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 23.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "NOURI P, 2018, QUAL REP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "EXPLORING POSITIVE OUTCOMES OF DECISION MAKING BIASES IN THE FIELD OF ENTREPRENEURIAL MARKETING", "year": 2018, "journal": "QUALITATIVE REPORT", "source_title": "QUAL REP", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 20.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "ENTREPRENEURS MAKE IMPORTANT DECISIONS REGARDING DIFFERENT ASPECTS OF THEIR ENTERPRISES. GIVEN THE BULK OF UNCERTAINTY, COMPLEXITY AS WELL AS THE RAPID RATE OF CHANGE IN THEIR BUSINESS ENVIRONMENT, ENTREPRENEURS' DECISIONS, INCLUDING THEIR MARKETING DECISIONS, ARE PRONE TO DECISION-MAKING BIASES. PREVIOUS RESEARCH HAS MAINLY FOCUSED ON THE NEGATIVE OUTCOMES OF DECISION-MAKING BIASES FOR ENTREPRENEURS. WE ARGUE THAT SOMETIMES ENTREPRENEURIAL DECISION-MAKING BIASES COULD HAVE POSITIVE OUTCOMES, TOO. IGNORING THESE POSITIVE OUTCOMES HAS LED TO A SERIOUS RESEARCH GAP IN THE FIELD OF ENTREPRENEURSHIP. THUS, IN THIS PAPER, WE ATTEMPTED TO EXPLORE POSITIVE OUTCOMES OF DECISION-MAKING BIASES IN ENTREPRENEURS' MARKETING DECISIONS WITH A GENERIC QUALITATIVE METHODOLOGY. WE GATHERED DATA BY CONDUCTING SEMI-STRUCTURED INTERVIEWS WITH NASCENT IRANIAN ENTREPRENEURS ACTIVE IN NANOTECHNOLOGY AND BIOTECHNOLOGY. THE COLLECTED DATA WERE ANALYZED BY THEMATIC ANALYSIS. OUR RESULTS INDICATE THAT SURVIVAL IN THE MARKET, OVERCOMING THE COMPETITION, PROPENSITY FOR INNOVATION AND GROWTH ARE THE MAIN POSITIVE OUTCOMES OF ENTREPRENEURIAL DECISION-MAKING BIASES IN ENTREPRENEURIAL MARKETING. WE RECOMMEND THAT FUTURE STUDIES CONSIDER EXPLORING OTHER POSSIBLE POSITIVE OUTCOMES OF DECISION-MAKING BIASES IN VARIOUS ENTREPRENEURS' DECISIONS.", "author": "NOURI P;IMANIPOUR N;TALEBI K;ZALI M", "author_full_names": "NOURI, POURIA;IMANIPOUR, NARGES;TALEBI, KAMBIZ;ZALI, MOHAMMADREZA", "country": "IRAN; IRAN; IRAN; IRAN; IRAN"}, {"id": "HU X, 2017", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "HU X, 2017", "year": 2017, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 14.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "HU XW, 2017, J ADV COMPUT INTELL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING AND NEW VENTURE PERFORMANCE: THE MEDIATING EFFECTS OF AMBIDEXTROUS INNOVATION", "year": 2017, "journal": "JOURNAL OF ADVANCED COMPUTATIONAL INTELLIGENCE AND INTELLIGENT INFORMATICS", "source_title": "J ADV COMPUT INTELL", "doi": "10.20965/jaciii.2017.p1073", "internal_indegree": 0.0, "internal_outdegree": 14.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "ENTREPRENEURIAL MARKETING HAS A SIGNIFICANT EFFECT ON NEW VENTURES' PERFORMANCE. HOWEVER, THE FINDINGS HAVE BEEN MIXED AND CONFLICTING. THERE IS STILL LITTLE IN-DEPTH EXPLORATION OF ITS SPECIFIC WORKING MECHANISM BASED ON TWO DISTINCT LITERATURES STREAMS FROM AMBIDEXTROUS INNOVATION AND ENTREPRENEURIALMARKETING. WE PRESENT AN INTEGRATED FRAMEWORK FOR ANALYZING ENTREPRENEURIAL MARKETING, AMBIDEXTROUS INNOVATION AND NEW VENTURE PERFORMANCE (NVP). BY CONDUCTING AN EMPIRICAL STUDY ON A SAMPLE OF 883 NEW VENTURES (NVS) IN ANHUI PROVINCE IN CHINA, THE STUDY FOUND THAT: (A) EM IS AN IMPORTANT DRIVER OF NVP AND ONLY FIVE DIMENSIONS OF EM HAVE POSITIVELY EFFECTS ON NVP, INCLUDING PROACTIVENESS, OPPORTUNITY-FOCUS, INNOVATIONS, RISK-TAKING AND RESOURCE LEVERAGING. (B) BOTH EXPLORATION INNOVATION AND EXPLOITATION INNOVATION ADVANCE NVP. (C) THE AMBIDEXTROUS INNOVATION DID NOT AFFECT NVP SIGNIFICANTLY. (D) EXPLORATION INNOVATION AND EXPLOITATION INNOVATION PARTLY MEDIATE THE RELATIONSHIP BETWEEN EM AND NVP.", "author": "HU XW;ZHU LD;ZHANG H", "author_full_names": "XIAOWEN HU; LIDONG ZHU; HUI ZHANG", "country": "CHINA"}, {"id": "POOL MK, 2017, INT J ADV BIOTECHNOL", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING BEHAVIOR IN HIGHER EDUCATION INSTITUTIONS: THE INFLUENCE OF NATURE OF INSTITUTE", "year": 2017, "journal": "INTERNATIONAL JOURNAL OF ADVANCED BIOTECHNOLOGY AND RESEARCH", "source_title": "INT J ADV BIOTECHNOL", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 10.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "ENTREPRENEURIAL MARKETING IS DEFINED AS THE PROACTIVE IDENTIFICATION AND EXPLOITATION OF OPPORTUNITIES FOR ACQUIRING AND RETAINING PROFITABLE CUSTOMERS THROUGH INNOVATIVE APPROACHES TO RISK MANAGEMENT, RESOURCE LEVERAGING AND VALUE CREATION. THIS STUDY INVESTIGATES THE EFFECT OF NATURE OF INSTITUTE ON ENTREPRENEURIAL MARKETING IN HIGHER EDUCATION INSTITUTIONS IN TEHRAN-IRAN. DATA WERE COLLECTED WITH QUESTIONNAIRE INSTRUMENTS. MODEL WAS DEVELOPED AND TESTED WITH REGRESSION ANALYSIS USING DATA COLLECTED FROM 56 ACTIVE MANAGERS OF THESE INSTITUTIONS. THE RESULTS SHOW THAT NONE OF THE HYPOTHESES WAS ACCEPTED. THAT IS, SCOPE OF BUSINESS AND OWNERSHIP DOESN'T HAVE ANY EFFECT ON ENTREPRENEURIAL MARKETING.", "author": "POOL MK;POOL AK;MANJIRI H;BAKHSH MM", "author_full_names": "POOL, MORTEZA KHAZAEI;POOL, AMIR KHAZAEI;MANJIRI, HADI;BAKHSH, MAHSA MASHAYEKH", "country": "IRAN; IRAN; IRAN; IRAN"}, {"id": "ANWAR M, 2016, QUAL MARK RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ANWAR M, 2016, QUAL MARK RES", "year": 2016, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 53.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "PANE HADEN S, 2016, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "PANE HADEN S, 2016, J RES MARK ENTREP", "year": 2016, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 33.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "MILES M, 2016, J STRATEG MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "MILES M, 2016, J STRATEG MARK", "year": 2016, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 15.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "KUMAR N, 2015, ADV INT MARK", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "THE EFFECTS OF ENTREPRENEURIAL MARKETING STRATEGIES ON THE LONG-TERM COMPETITIVE SUSTENANCE OF BORN GLOBAL FIRMS: EXAMPLES FROM THE INDIAN KNOWLEDGE INTENSIVE SERVICES INDUSTRY", "year": 2015, "journal": "ADVANCES IN INTERNATIONAL MARKETING", "source_title": "ADV INT MARK", "doi": "10.1108/S1474-797920140000025003", "internal_indegree": 0.0, "internal_outdegree": 38.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE AIM OF THIS STUDY IS TO EXAMINE HOW KNOWLEDGE-INTENSIVE BORN GLOBAL FIRMS OPERATING IN INTERNATIONAL MARKETS DEVELOP AND MAINTAIN LONG-TERM RELATIONSHIPS WITH THEIR CUSTOMERS THAT INSURE THEIR CONTINUED GROWTH BEYOND THE INITIAL STAGE OF INTERNATIONALIZATION. THE STUDY ADOPTS A CASE STUDY APPROACH, FOCUSING ON TWO INDIAN BORN GLOBAL FIRMS OPERATING WITH THE KNOWLEDGE-BASED SERVICES SECTOR. THE STUDY SHOWS THAT GETTING TO KNOW THE CUSTOMER INTIMATELY HELPS FIRMS TO RETAIN CUSTOMERS OVER LONG PERIODS OF TIME. CUSTOMER-RELATIONSHIP MANAGEMENT STRATEGY IS IN LINE WITH THE ENTREPRENEURIAL ORIENTATION OF THE FIRMS UNDER CONSIDERATION. COPYRIGHT  2015 BY EMERALD GROUP PUBLISHING LIMITED ALL RIGHTS OF REPRODUCTION IN ANY FORM RESERVED.", "author": "KUMAR N.; YAKHLEF A.", "author_full_names": "NISHANT KUMAR; ALI YAKHLEF", "country": "SWEDEN"}, {"id": "ROD M, 2015, INT J ENTREPRENEURSHIP INNOV MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "PERSPECTIVES ON SMES AND THE ENTREPRENEURIAL MARKETING OF INTELLECTUAL PROPERTY", "year": 2015, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURSHIP AND INNOVATION MANAGEMENT", "source_title": "INT J ENTREPRENEURSHIP INNOV MANAGE", "doi": "10.1504/IJEIM.2015.069953", "internal_indegree": 0.0, "internal_outdegree": 25.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "OF ALL THE CHALLENGES WHICH FACE BUSINESS, THE DISCOVERY, EXPLOITATION, RETENTION AND PROTECTION OF INTELLECTUAL PROPERTY HAVE BEEN IDENTIFIED AS THE MOST SERIOUS WITHIN THE CONTEXT OF SMALL HIGH TECHNOLOGY FIRMS AND RESTRICTING OUR SCOPE TO TECHNOLOGY-RELATED INTELLECTUAL PROPERTY (IP), THE MARKETING COMPETENCIES NECESSARY FOR SUCCESSFUL IP MARKETING ARE EXAMINED. FOLLOWING A REVIEW OF THE RELEVANT LITERATURE, THE QUESTION THAT ARISES IS WHETHER MAINSTREAM MARKETING PRINCIPLES ARE SUFFICIENT TO SERVICE THE NEEDS OF TECHNOLOGY ENABLED BUT RESOURCE LIMITED SMES OR WHETHER THE ADOPTION OF ENTREPRENEURIAL MARKETING IS MORE APPROPRIATE? COPYRIGHT  2015 INDERSCIENCE ENTERPRISES LTD.", "author": "ROD M.R.M.; PALIWODA S.J.", "author_full_names": "MICHEL ROD; STANLEY J. PALIWODA", "country": "CANADA; UNITED KINGDOM"}, {"id": "JAAFAR M, 2012, J RES MARK ENTREP", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING AND ACCOMMODATION BUSINESSES IN EAST PENINSULAR MALAYSIA", "year": 2012, "journal": "JOURNAL OF RESEARCH IN MARKETING AND ENTREPRENEURSHIP", "source_title": "J RES MARK ENTREP", "doi": "10.1108/14715201211271393", "internal_indegree": 0.0, "internal_outdegree": 93.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE - THE DEVELOPMENT OF TOURISM AND THE HOSPITALITY INDUSTRY HAS FACILITATED THE PROLIFERATION OF MANY SMALL AND MEDIUM ACCOMMODATION BUSINESSES IN THIS REGION. THESE USUALLY DEPEND ON THE ATTRACTIVENESS OF TOURISM PRODUCTS OFFERED IN EACH DESTINATION. THE PURPOSE OF THIS PAPER IS TO FOCUS ON THE ENTREPRENEURIAL MARKETING ASPECT OF ACCOMMODATION BUSINESSES IN THREE URBAN CITIES AND ISLANDS IN EAST PENINSULAR MALAYSIA. DESIGN/METHODOLOGY/APPROACH - MIXED-METHOD RESEARCH WAS CONDUCTED ON 64 URBAN HOTELS AND 52 ISLAND CHALET OPERATORS IN EAST PENINSULAR MALAYSIA. THE RESULTS INDICATE THAT URBAN OPERATORS ARE MORE ENTREPRENEURIAL THAN ISLAND OPERATORS. FINDINGS - TO ENSURE THEIR CONTINUED EXISTENCE IN THE INDUSTRY, THESE OPERATORS HAVE ADOPTED DIFFERENT MARKETING PRACTICES. EACH TOURIST DESTINATION ATTRACTS A DIFFERENT SET OF TOURIST PROFILES AND FEATURES VARYING MARKETING PRACTICES. THE SIGNIFICANT DIFFERENCES IN THE TYPES OF ENTREPRENEURIAL MARKETING PRACTICED BY URBAN AND ISLAND OPERATORS ARE EXPLORED IN DETAIL IN THIS STUDY. ORIGINALITY/VALUE - IN IMPLEMENTING A NEW ECONOMIC MODEL TOWARDS BEING A HIGH INCOME-GENERATING COUNTRY, THE TOURISM SECTOR HAS BECOME A MAIN DRIVER CONTRIBUTING TO THE MALAYSIAN ECONOMY. WITH THE MAIN OBJECTIVE OF MAXIMIZING THE ADVANTAGES OF A STRATEGIC LOCATION, TOGETHER WITH THE COMPARATIVE ADVANTAGES ARISING FROM ITS NATURAL RESOURCES, THE FINDINGS ARE RATHER FIT TO THE TOURISM INDUSTRY.", "author": "JAAFAR M", "author_full_names": "MASTURA JAAFAR", "country": "MALAYSIA"}, {"id": "JAAFAR M, 2012, TOUR HOSP RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING AND ACCOMMODATION BUSINESSES IN EAST PENINSULAR MALAYSIA", "year": 2012, "journal": "TOURISM AND HOSPITALITY RESEARCH", "source_title": "TOUR HOSP RES", "doi": "10.1177/1467358412466660", "internal_indegree": 0.0, "internal_outdegree": 81.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE DEVELOPMENT OF TOURISM AND THE HOSPITALITY INDUSTRY HAS PAVED THE WAY FOR THE PROLIFERATION IN THIS REGION OF MANY SMALL- AND MEDIUM-ACCOMMODATION BUSINESSES, WHICH ARE USUALLY DEPENDENT ON THE ATTRACTIVENESS OF TOURISM PRODUCTS OFFERED IN EACH TOURIST DESTINATION. THE PRESENT STUDY FOCUSES ON THE ENTREPRENEURIAL MARKETING ASPECT OF ACCOMMODATION BUSINESSES IN THREE URBAN CITIES AND ISLANDS IN EAST PENINSULAR MALAYSIA. MIXED-METHOD RESEARCH WAS CONDUCTED ON 64 URBAN HOTELS AND 52 ISLAND CHALET OPERATORS IN EAST PENINSULAR MALAYSIA. THE RESULTS INDICATE THAT URBAN OPERATORS ARE MORE ENTREPRENEURIAL THAN ISLAND OPERATORS. TO REMAIN COMPETITIVE, URBAN OPERATORS ADOPT VARIOUS MARKETING PRACTICES. DIFFERENT TOURIST DESTINATIONS ATTRACT DIFFERENT TOURIST PROFILES AND DEPLOY DIFFERENT MARKETING STRATEGIES. THE PRESENT STUDY EXPLORES IN DETAIL THE SIGNIFICANT DIFFERENCES IN THE TYPES OF ENTREPRENEURIAL MARKETING PRACTICED BY URBAN AND ISLAND OPERATORS.", "author": "JAAFAR M", "author_full_names": "MASTURA JAAFAR", "country": "MALAYSIA"}, {"id": "SCHULTE R, 2012, INT J ENTREPRENEURSHIP SMALL BUS", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENTREPRENEURIAL MARKETING AND CAPITAL ACQUISITION", "year": 2012, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURSHIP AND SMALL BUSINESS", "source_title": "INT J ENTREPRENEURSHIP SMALL BUS", "doi": "10.1504/IJESB.2012.047613", "internal_indegree": 0.0, "internal_outdegree": 14.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THE PAPER EXAMINES FINANCING RELATIONSHIPS BETWEEN NEW VENTURES AND THEIR BANK CREDITORS. DEFINING THIS AS AN AGENCY RELATIONSHIP, THE PAPER DEVELOPS A THEORETICAL FRAMEWORK FOR AN ANALYSIS OF SUBSTANTIAL PROBLEMS IN MAKING FINANCIAL CONTRACTS AT REASONABLE TERMS FOR NEW VENTURES. THREE BASIC TYPES OF PROBLEMS EMERGE: DIFFERENCES IN INFORMATION, DIFFERENCES IN MANAGEMENT INFLUENCE, AND DIFFERENCES IN THE CAPITAL IMPACT OF A CONTRACT. AS A CONCLUSION, THE IMPLEMENTATION OF FINANCING MARKETING AS A BASIC STRATEGY FOR START-UPS IN ACQUIRING AND MAINTAINING FINANCIAL CONTRACTS IS SUGGESTED. IT ENCOMPASSES ALL MEASURES THAT SERVE TO GENERATE, TO MAINTAIN, OR TO IMPROVE FINANCING RESOURCES BY ALIGNING WITH THE NEEDS OF ACTUAL OR POTENTIAL FINANCE PARTNERS. FEATURES OF AN ENTREPRENEURIAL MARKETING NEEDED TO ACQUIRE FINANCIAL RESOURCES ARE INTRODUCED, AND ITS SUITABILITY TO REDUCE FINANCING OBSTRUCTIONS IS DISCUSSED. COPYRIGHT  2012 INDERSCIENCE ENTERPRISES LTD.", "author": "SCHULTE R.", "author_full_names": "REINHARD SCHULTE", "country": "GERMANY"}, {"id": "BARTON LC, 2012, INT J ENTREP INNOV", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "SMALL FIRMS CRAFTING GROWTH NICHES IN THE FRENCH WINE INDUSTRY: THE ROLE OF ENTREPRENEURIAL MARKETING", "year": 2012, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURSHIP AND INNOVATION", "source_title": "INT J ENTREP INNOV", "doi": "10.5367/ijei.2012.0087", "internal_indegree": 0.0, "internal_outdegree": 12.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS CASE STUDY FOCUSES ON DOMAINE DE MOURCHON, A NICHE PRODUCER OF COTES DU RHONE VILLAGES, SEGURET WINES IN FRANCE, OWNED BY THE SCOTTISH MCKINLAY FAMILY. THE CASE EXPLORES THE ROLE OF ENTREPRENEURIAL MARKETING IN HELPING SMALL INDEPENDENT WINE PRODUCERS TO CRAFT STRONG NICHE POSITIONS IN A MATURE INDUSTRY. OVER THE LAST TWO DECADES, FRENCH WINE PRODUCERS HAVE BEEN FACED WITH CHANGING CONSUMPTION AND PRODUCTION PATTERNS AND FIERCER COMPETITION, PARTICULARLY FROM THE NEW WORLD WINE PRODUCERS. MCKINLAY ENTERED WINE PRODUCTION IN 1998 AT THE HEIGHT OF THE INDUSTRY DECLINE IN FRANCE. THE CASE ALLOWS FOR THE EXPLORATION OF HOW A SMALL INDEPENDENT DOMAINE HAS BEEN PROACTIVE IN INTEGRATING CUSTOMER PREFERENCES, COMPETITOR INTELLIGENCE AND PRODUCT KNOWLEDGE INTO THE PROCESS OF CREATING AND DELIVERING SUPERIOR VALUE TO CUSTOMERS IN AN ATTEMPT TO ACHIEVE A STRONG MARKET POSITIONING. THE ACTIVITIES OF MCKINLAY HIGHLIGHT SOME OF THE IMPORTANT CONSIDERATIONS FOR SUCCESSFUL ENTREPRENEURIAL MARKETING IN AN INDUSTRY FACING SEVERE MARKETING PROBLEMS.", "author": "BARTON LC;PAINBENI S;BARTON H", "author_full_names": "LISA BARTON; S. PAINBENI; H BARTON", "country": "FRANCE; FRANCE; UNITED KINGDOM"}, {"id": "SZABO RZ, 2011, INT J ENTREP VENTUR", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "THE ROLE OF KNOWLEDGE IN ENTREPRENEURIAL MARKETING", "year": 2011, "journal": "INTERNATIONAL JOURNAL OF ENTREPRENEURIAL VENTURING", "source_title": "INT J ENTREP VENTUR", "doi": "10.1504/IJEV.2011.039338", "internal_indegree": 0.0, "internal_outdegree": 23.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "THIS PAPER AIMS TO EXPLAIN HOW THE TWO SOURCES OF KNOWLEDGE (KNOW-HOW, KNOW-WHO) INFLUENCE THE USE OF INNOVATIVE MARKETING TECHNIQUES AND THEIR IMPACT ON COMPETITIVE ADVANTAGE. THE PROPOSITION IS STUDIED THROUGH CASE-STUDY METHODOLOGY. ENTREPRENEURIAL BEHAVIOUR IS GENERALLY ASSOCIATED WITH THE ABILITY TO INNOVATE, INITIATE CHANGE, AND PERPETUATE THE STRENGTHS OF FLEXIBILITY AND RESPONSIVENESS. CONSEQUENTLY, ENTREPRENEURIAL MARKETING MANAGERS ALSO SEARCH FOR CREATING NEW OPPORTUNITIES BY COMING UP WITH NEW COMBINATIONS OF THE MARKETING TOOLS, ALLOCATING RESOURCES IN ANOTHER WAY, OR JUST LOOKING AT THE VALUE CREATION PROCESS FROM A DIFFERENT POINT OF VIEW. WHILE CONVENTIONAL MARKETERS USE THE TRADITIONAL MARKET RESEARCH TO ADAPT TO THE ENVIRONMENT, ENTREPRENEURIAL MARKETERS RATHER BUILD ON EXPERIENCE, IMMERSION, AND INTUITION FOR MAKING THEIR DECISIONS.", "author": "SZABO RZ;HORTOVANYI L;TARODY DF;FERINCZ A;DOBAK M", "author_full_names": "ROLAND Z. SZABO; LILLA HORTOVANYI; DAVID TARODY; ADRIENN FERINCZ; MIKLOS DOBAK", "country": "HUNGARY; HUNGARY"}, {"id": "ZS. SZABO R, 2011, INT J ENTREP VENTURING", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ZS. SZABO R, 2011, INT J ENTREP VENTURING", "year": 2011, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 22.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "PELTIER JW, 2010, J SMALL BUS ENTERP D", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "ENHANCING ENTREPRENEURIAL MARKETING EDUCATION: THE STUDENT PERSPECTIVE", "year": 2010, "journal": "JOURNAL OF SMALL BUSINESS AND ENTERPRISE DEVELOPMENT", "source_title": "J SMALL BUS ENTERP D", "doi": "10.1108/14626001011088705", "internal_indegree": 0.0, "internal_outdegree": 25.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "PURPOSE - THIS PAPER AIMS TO REPORT THE FINDINGS OF A LARGE-SCALE MULTINATIONAL STUDY OF STUDENTS IN A MARKETING ORGANIZATION THAT INVESTIGATES THE NEED TO EXPAND ENTREPRENEURSHIP EDUCATION IN THE MARKETING CURRICULUM. KEY QUESTIONS INCLUDE WHAT IS THE ENTREPRENEURIAL MINDSET OF STUDENTS INTERESTED IN MARKETING, WHAT DO THEY THINK THEY NEED TO KNOW, SHOULD THEY SOME DAY DECIDE TO PURSUE ENTREPRENEURIAL OPPORTUNITIES, AND HOW SATISFIED ARE THEY WITH THEIR CURRENT EXPOSURE TO ENTREPRENEURIAL MARKETING EXPERIENCES? DESIGN/METHODOLOGY/APPROACH - VIA E-MAIL, A MAJOR INTERNATIONAL COLLEGIATE MARKETING ASSOCIATION HEADQUARTERED IN THE USA SENT THE ONLINE QUESTIONNAIRE TO A RANDOM SAMPLE OF 4,300 STUDENTS. CONTENT AREAS INCLUDED ENTREPRENEURIAL MINDSET, DESIRED ENTREPRENEURIAL MARKETING LEARNING AND EXPERIENTIAL ACTIVITIES, AND DEMOGRAPHICS. A TOTAL OF 605 STUDENTS PARTICIPATED IN THE STUDY. FINDINGS - THE FINDINGS SHOW THAT THERE IS A LARGE SEGMENT OF MARKETING STUDENTS WHO DESIRE TO BE AN ENTREPRENEUR AND FEEL STRONGLY ABOUT ENTREPRENEURIAL EDUCATION. EXPOSURE TO ENTREPRENEURIAL MARKETING TOOLS, EXPERIENTIAL LEARNING ACTIVITIES, AND NETWORKING OPPORTUNITIES WERE DEEMED TO BE ESPECIALLY IMPORTANT. RESEARCH LIMITATIONS/IMPLICATIONS - THE STUDY FOCUSED ON STUDENTS IN MARKETING ORGANIZATIONS. ADDITIONAL RESEARCH IS NEEDED AT THE COURSE LEVEL. PRACTICAL IMPLICATIONS - THE FINDINGS SUGGEST THAT ENTREPRENEURIAL MARKETING EDUCATION IS NEEDED IN THE BUSINESS CURRICULUM. TRAINING IN ENTREPRENEURIAL MARKETING WILL BETTER PREPARE STUDENTS INTERESTED IN BEING AN ENTREPRENEUR OR SMALL BUSINESS OWNER. ORIGINALITY/VALUE - ENTREPRENEURIAL MARKETING HAS RECEIVED LITTLE ATTENTION IN THE BUSINESS EDUCATION LITERATURE. THE STUDY IS THE FIRST OF ITS KIND TO STUDY ENTREPRENEURIAL MARKETING CURRICULUM NEEDS FROM THE PERSPECTIVE OF STUDENTS IN A NEARLY 11,000 STRONG INTERNATIONAL MARKETING ORGANIZATION.", "author": "PELTIER JW;SCOVOTTI C", "author_full_names": "JAMES W. PELTIER; CAROL SCOVOTTI", "country": "UNITED STATES; UNITED STATES"}, {"id": "SCHULTE R, 2010, INT J ENTREPRENEURSHIP INNOV MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "SCHULTE R, 2010, INT J ENTREPRENEURSHIP INNOV MANAGE", "year": 2010, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 15.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SCHINDEHUTTE M, 2010, INT J ENTREPRENEURSHIP INNOV MANAGE", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "SCHINDEHUTTE M, 2010, INT J ENTREPRENEURSHIP INNOV MANAGE", "year": 2010, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 9.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "MARTIN D, 2009, QUAL MARK RES", "role": "leaf", "role_label": "Leaves", "visual_symbol": "leaf", "subgroup": "dormant frontier paper", "subgroup_label": "dormant frontier paper", "title": "MARTIN D, 2009, QUAL MARK RES", "year": 2009, "journal": "", "source_title": "", "doi": "", "internal_indegree": 0.0, "internal_outdegree": 14.0, "sap_rank": 0.0, "notes": "Leaf-like frontier paper: internal indegree = 0 and internal outdegree >= 1.", "abstract": "", "author": "", "author_full_names": "", "country": ""}, {"id": "SULAIMAN MABA, 2024, DISCOV SUSTAIN", "role": "fruit", "role_label": "Fruits", "visual_symbol": "apple", "subgroup": "external_fruit_underabsorbed", "subgroup_label": "High external-attention paper", "title": "ENTREPRENEURIAL MARKETING AND PERFORMANCE: CONTINGENT ROLE OF MARKET TURBULENCE", "year": 2024, "journal": "DISCOVER SUSTAINABILITY", "source_title": "DISCOV SUSTAIN", "doi": "10.1007/s43621-024-00710-8", "cited_by": 26.0, "internal_indegree": 0.0, "external_citation_velocity": 8.666666666666666, "fruit_score": 0.7171071516764498, "color": "#A32314", "notes": "Fruit candidate with external citation attention and weak local absorption.", "abstract": "IN DEVELOPING COUNTRIES, ENTREPRENEURIAL FIRMS ARE INCREASINGLY ADVOCATING A SHIFT FROM CONVENTIONAL MARKETING STRATEGIES, PAVING THE WAY FOR INNOVATIVE APPROACHES LIKE ENTREPRENEURIAL MARKETING. THIS PAPER INVESTIGATES THE MODERATING ROLE OF MARKET TURBULENCE OVER THE IMPACT OF ENTREPRENEURIAL MARKETING OVER PERFORMANCE OF ENTREPRENEURIAL FIRMS. WE HAVE DEVELOPED THE FRAMEWORK WHILE TAKING THE SUPPORT OF CONTINGENCY PERSPECTIVE. WE ADOPTED A QUANTITATIVE RESEARCH METHODOLOGY AND COLLECTED THE DATA USING SURVEY TECHNIQUE FROM 384 ENTREPRENEURIAL FIRMS, AND THE MANAGERS AND OWNERS WERE CONTACTED FOR THE RESPONSES. THE COLLECTED DATA, AFTER ENSURING THE RELIABILITY AND VALIDITY HAS BEEN EVALUATED USING SMART PLS 3. STRUCTURAL EQUATION MODELLING HAS BEEN APPLIED TO EVALUATE THE RESEARCH FRAMEWORK. THE FINDINGS REVEALED THAT SIX OUT OF SEVEN IDENTIFIED CONSTRUCTS OF ENTREPRENEURIAL MARKETING HOLD A SIGNIFICANT IMPACT OVER PERFORMANCE OF ENTREPRENEURIAL FIRMS. ADDITIONALLY, THE MODERATING ROLE OF MARKET TURBULENCE HAS ALSO FOUND SIGNIFICANT WHICH IS THE MAJOR SIGNIFICANCE OF THE STUDY. THE PAPER ENDS UP BY IDENTIFYING THE LIMITATIONS FACED WHILE CONDUCTING RESEARCH AND GIVING RECOMMENDATIONS FOR FUTURE RESEARCHERS.", "author": "SULAIMAN MABA;ASAD M;AWAIN AMSB;ASIF MU;AL SHANFARI KS", "author_full_names": "MOHAMMED ALI BAIT ALI SULAIMAN; MUZAFFAR ASAD; ALI MOHSIN SALIM BA AWAIN; MUHAMMAD ASIF; KHALID SALIM AL SHANFARI", "country": "OMAN; MEXICO; OMAN; MALAYSIA"}, {"id": "KAKEESH DF, 2025, J MARK ANAL", "role": "fruit", "role_label": "Fruits", "visual_symbol": "apple", "subgroup": "external_fruit_underabsorbed", "subgroup_label": "High external-attention paper", "title": "ENTREPRENEURIAL MARKETING AND BUSINESS PERFORMANCE IN SMES: THE MEDIATING ROLE OF COMPETITIVE AGGRESSIVENESS", "year": 2025, "journal": "JOURNAL OF MARKETING ANALYTICS", "source_title": "J MARK ANAL", "doi": "10.1057/s41270-024-00310-5", "cited_by": 8.0, "internal_indegree": 0.0, "external_citation_velocity": 4.0, "fruit_score": 0.5548111904213547, "color": "#E4988C", "notes": "Fruit candidate with external citation attention and weak local absorption.", "abstract": "THIS STUDY EXAMINES THE INTERPLAY BETWEEN ENTREPRENEURIAL MARKETING ORIENTATION AND BUSINESS PERFORMANCE AMONG SMES IN THE SERVICES SECTOR, WITH A PARTICULAR FOCUS ON COMPETITIVE AGGRESSIVENESS AS A MEDIATING FACTOR. DRAWING FROM A SAMPLE OF 320 SERVICE-BASED COMPANIES VIA BOTH ONLINE AND PAPER-BASED SURVEYS, THE RESEARCH EMPLOYS STRUCTURAL EQUATION MODELLING USING AMOS SOFTWARE TO ANALYSE THE DATA. THE RESULTS UNDERSCORE A SIGNIFICANT POSITIVE RELATIONSHIP BETWEEN ENTREPRENEURIAL MARKETING ORIENTATION AND BUSINESS PERFORMANCE AMONG SERVICE-BASED SMES IN JORDAN. BY DELVING INTO THE UNIQUE MARKETING CHALLENGES AND OPPORTUNITIES FACED BY THESE ENTERPRISES, THIS RESEARCH NOT ONLY OFFERS ACTIONABLE INSIGHTS FOR PRACTITIONERS BUT ALSO ENRICHES THE ENTREPRENEURIAL MARKETING DISCOURSE. THIS EXPLORATION DELVES INTO THE DOMAIN OF ENTREPRENEURIAL MARKETING ORIENTATION, EMPHASIZING ITS CRITICAL ROLE IN ENHANCING SME COMPETITIVENESS AND GROWTH WITHIN A DEVELOPING ECONOMY. INCORPORATING MARKETING ANALYTICS, THE STUDY OFFERS A DETAILED UNDERSTANDING THAT ENRICHES ACADEMIC LITERATURE AND INFORMS POLICY DEVELOPMENT FOR SUSTAINABLE ECONOMIC PROGRESS.", "author": "KAKEESH DF;AL-WESHAH GA;ALALWAN AA", "author_full_names": "DANA KAKEESH; GHAZI A. AL-WESHAH; ALI ABDALLAH ALALWAN", "country": "JORDAN; JORDAN; QATAR"}, {"id": "HANAYSHA JR, 2022, SUSTAINABILITY-BASEL", "role": "fruit", "role_label": "Fruits", "visual_symbol": "apple", "subgroup": "external_fruit_underabsorbed", "subgroup_label": "High external-attention paper", "title": "AN EXAMINATION OF ENTREPRENEURIAL MARKETING DIMENSIONS AND FIRM PERFORMANCE IN SMALL AND MEDIUM ENTERPRISES", "year": 2022, "journal": "SUSTAINABILITY", "source_title": "SUSTAINABILITY-BASEL", "doi": "10.3390/su141811444", "cited_by": 11.0, "internal_indegree": 0.0, "external_citation_velocity": 2.2, "fruit_score": 0.5422630417748703, "color": "#E9A195", "notes": "Fruit candidate with external citation attention and weak local absorption.", "abstract": "THE PURPOSE OF THIS STUDY WAS TO TEST THE IMPACT OF ENTREPRENEURIAL MARKETING DIMENSIONS ON FIRM PERFORMANCE IN SMALL AND MEDIUM ENTERPRISES. REQUIRED DATA WAS GATHERED USING THE QUANTITATIVE RESEARCH APPROACH. PARTICULARLY, THE PRIMARY DATA WAS OBTAINED THROUGH A STRUCTURED SURVEY FROM 153 SMES OPERATING IN SAUDI ARABIA. THE OBTAINED DATA WAS THEN ANALYZED THROUGH SPSS AND PARTIAL LEAST SQUARE (PLS-SEM) APPROACH TO CALCULATE THE VALIDITY AND RELIABILITY FOR THE MEASUREMENT ITEMS, AND ALSO TO VERIFY THE IMPACT OF ENTREPRENEURIAL MARKETING DIMENSIONS ON FIRM PERFORMANCE. THE RESULTS SHOWED THAT CUSTOMER INTENSITY AND VALUE CREATION HAVE POSITIVE EFFECTS ON FIRM PERFORMANCE. THE FINDINGS ALSO CONFIRMED THAT INNOVATIVENESS AND RESOURCE LEVERAGING ARE POSITIVELY CORRELATED WITH FIRM PERFORMANCE. HOWEVER, THE EFFECT OF RISK TAKING ON FIRM PERFORMANCE WAS FOUND INSIGNIFICANT. FINALLY, IT WAS FOUND THAT PROACTIVENESS AND OPPORTUNITY FOCUS HAVE SIGNIFICANT POSITIVE EFFECTS ON FIRM PERFORMANCE. THIS PAPER CONTRIBUTES TO RESOURCE-ADVANTAGE THEORY AND EMPIRICAL LITERATURE BY ADDRESSING EXISTING RESEARCH GAPS BETWEEN THE SELECTED DIMENSIONS OF ENTREPRENEURIAL MARKETING AND FIRM PERFORMANCE. IT ALSO CONTRIBUTES TO THE THEORY BY BRINGING NEW INSIGHTS FROM A MIDDLE EASTERN COUNTRY OWING TO THE LACK OF RESEARCH ON THIS TOPIC, PARTICULARLY IN THIS REGION.", "author": "HANAYSHA JR;AL-SHAIKH ME", "author_full_names": "JALAL RAJEH HANAYSHA; MOHAMMED EMAD AL-SHAIKH", "country": "U ARAB EMIRATES; SAUDI ARABIA"}];
    const counts = {"root": 16, "trunk": 20, "branch": 45, "leaf": 118, "fruit": 3};
    const state = { role: "all", subgroup: "", query: "", selectedId: "" };
    const roleLabels = {
      root: "Roots",
      trunk: "Trunk",
      branch: "Branches",
      leaf: "Leaves",
      fruit: "Fruits"
    };

    const search = document.getElementById("search");
    const list = document.getElementById("list");
    const details = document.getElementById("details");
    const stats = document.getElementById("stats");
    const chips = document.getElementById("chips");

    function compactNumber(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return Number.isInteger(n) ? String(n) : n.toFixed(3);
    }

    function doiLink(doi) {
      if (!doi) return "";
      const clean = String(doi).replace(/^https?:\/\/doi.org\//i, "");
      return `<a href="https://doi.org/${encodeURIComponent(clean)}" target="_blank" rel="noreferrer">${clean}</a>`;
    }

    function matches(record) {
      if (state.role !== "all" && record.role !== state.role) return false;
      if (state.subgroup && record.subgroup !== state.subgroup) return false;
      if (!state.query) return true;
      const haystack = [
        record.id, record.title, record.role_label, record.subgroup_label,
        record.journal, record.source_title, record.doi, record.year,
        record.branch_member_role
      ].join(" ").toLowerCase();
      return haystack.includes(state.query.toLowerCase());
    }

    function filteredRecords() {
      return records.filter(matches).sort((a, b) => {
        const roleOrder = { root: 1, trunk: 2, branch: 3, leaf: 4, fruit: 5 };
        if (roleOrder[a.role] !== roleOrder[b.role]) return roleOrder[a.role] - roleOrder[b.role];
        return (Number(b.year || 0) - Number(a.year || 0)) || String(a.id).localeCompare(String(b.id));
      });
    }

    function renderStats() {
      stats.innerHTML = ["root", "trunk", "branch", "leaf", "fruit"].map(role => `
        <button class="stat" data-role="${role}" title="Filter ${roleLabels[role]}">
          <strong>${counts[role] || 0}</strong>
          <span>${roleLabels[role]}</span>
        </button>
      `).join("");
      stats.querySelectorAll(".stat").forEach(button => {
        button.addEventListener("click", () => setRole(button.dataset.role));
      });
    }

    function renderList() {
      const items = filteredRecords();
      if (!items.length) {
        list.innerHTML = `<div class="empty">No records match the current filter.</div>`;
        return;
      }
      list.innerHTML = items.map(record => `
        <button class="item ${record.id === state.selectedId ? "active" : ""}" data-id="${escapeHtml(record.id)}">
          <span class="item-title">${escapeHtml(record.id)}</span>
          <span class="item-meta">${escapeHtml(record.role_label || "")}${record.subgroup_label ? " - " + escapeHtml(record.subgroup_label) : ""}${record.year ? " - " + record.year : ""}</span>
        </button>
      `).join("");
      list.querySelectorAll(".item").forEach(button => {
        button.addEventListener("click", () => selectRecord(button.dataset.id));
      });
    }

    function field(label, value) {
      if (value === null || value === undefined || value === "") return "";
      return `<div class="field"><b>${label}</b><span>${value}</span></div>`;
    }

    function selectRecord(id) {
      const record = records.find(item => item.id === id);
      if (!record) return;
      state.selectedId = id;
      details.innerHTML = `
        <h2>${escapeHtml(record.title || record.id)}</h2>
        <p class="meta">${escapeHtml(record.id)}${record.year ? " - " + record.year : ""}</p>
        ${field("Role", escapeHtml(record.role_label || ""))}
        ${field("Group", escapeHtml(record.subgroup_label || record.subgroup || ""))}
        ${field("Journal", escapeHtml(record.journal || record.source_title || ""))}
        ${field("DOI", doiLink(record.doi))}
        ${field("Citations", compactNumber(record.citations_received ?? record.cited_by))}
        ${field("Velocity", compactNumber(record.citation_velocity ?? record.external_citation_velocity))}
        ${field("Core score", compactNumber(record.branch_core_score))}
        ${field("Fruit score", compactNumber(record.fruit_score))}
        ${field("Outdegree", compactNumber(record.internal_outdegree))}
        ${field("Notes", escapeHtml(record.notes || ""))}
        ${record.abstract ? `<div class="abstract">${escapeHtml(record.abstract).slice(0, 1100)}</div>` : ""}
      `;
      renderList();
    }

    function setRole(role, subgroup = "") {
      state.role = role;
      state.subgroup = subgroup;
      document.querySelectorAll(".chip").forEach(chip => chip.classList.toggle("active", chip.dataset.role === role || (role === "all" && chip.dataset.role === "all")));
      document.querySelectorAll(".hotspot").forEach(hotspot => {
        const active = hotspot.dataset.role === role && (!subgroup || hotspot.dataset.subgroup === subgroup);
        hotspot.classList.toggle("active", active);
      });
      renderList();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    search.addEventListener("input", event => {
      state.query = event.target.value;
      renderList();
    });

    chips.addEventListener("click", event => {
      const button = event.target.closest("[data-role]");
      if (!button) return;
      setRole(button.dataset.role);
    });

    document.querySelectorAll(".hotspot").forEach(hotspot => {
      hotspot.addEventListener("click", () => {
        setRole(hotspot.dataset.role || "all", hotspot.dataset.subgroup || "");
      });
    });

    renderStats();
    renderList();
  </script>
</body>
</html>
